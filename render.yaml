services:
  - type: web
    name: micmonitor-server
    runtime: node
    plan: free
    region: singapore
    rootDir: server
    buildCommand: npm install && cd ../frontend && npm install && npm run build
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: STUN_URL
        value: stun:stun.l.google.com:19302
