services:
  - type: web
    name: micmonitor-server
    runtime: node
    plan: free
    region: singapore
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: STUN_URL
        value: stun:stun.l.google.com:19302
