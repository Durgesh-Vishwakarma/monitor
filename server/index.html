        }
        if (h.aiAuto !== false) {
          applyAdaptiveNoiseProfile(deviceId, state, Number(h.noiseDb));
        }
        if (typeof h.photoAi === "boolean") {
          state.photoAiEnabled = h.photoAi;
        }
        const photoAiBtn = document.getElementById(`btnPhotoAi_${deviceId}`);
        if (photoAiBtn) {
          photoAiBtn.textContent = `Photo AI: ${state.photoAiEnabled ? "ON" : "OFF"}`;
        }

        updateDeviceNetworkScore(deviceId, state, h);
        updateAutoLowNetworkFlag();
        applyNetworkModeToDevice(deviceId, state);

        // Connection quality bars
        if (h.quality) updateConnectionQualityBar(deviceId, h.quality);
        updateLinkBadge(deviceId, state);

        // Auto-recover if user is in live mode but mic stopped (skip during WebRTC connect — deadline timer handles fallback).
        if (
          state.isLive &&
          h.wsConnected &&
          !micRunning &&
          !state.rtcConnectDeadlineTimer
        ) {
          const now = Date.now();
          if (!state.lastRecoverTryAt || now - state.lastRecoverTryAt > 12000) {
            state.lastRecoverTryAt = now;
            sendCmd(deviceId, "start_stream");
            log(`Mic recovery command sent to ${deviceId}`, "warn");
          }
        }
      }

      function formatAgo(ts) {
        const s = Math.max(0, Math.floor((Date.now() - Number(ts)) / 1000));
        if (s < 5) return "just now";
        if (s < 60) return `${s}s ago`;
        const m = Math.floor(s / 60);
        if (m < 60) return `${m}m ago`;
        const h = Math.floor(m / 60);
        return `${h}h ago`;
      }

      function markRecording(deviceId, active, filename) {
        const state = deviceState[deviceId];
        if (!state) return;
        state.isRecording = active;
        const btnRec = document.getElementById(`btnRec_${deviceId}`);
        const btnStop = document.getElementById(`btnStop_${deviceId}`);
        if (btnRec) btnRec.disabled = active;
        if (btnStop) btnStop.disabled = !active;
        const badge = document.getElementById(`badge_${deviceId}`);
        if (badge) {
          badge.textContent = active ? "⏺ REC" : "LIVE";
          badge.className = "device-badge" + (active ? " recording" : "");
        }
        if (!active && filename) {
          const recList = document.getElementById(`recList_${deviceId}`);
          if (recList) {
            const entry = document.createElement("div");
            entry.className = "rec-item";
            entry.innerHTML = `<a href="/recordings/${filename}" download="${filename}" title="${filename}">⬇ ${filename}</a>`;
            recList.prepend(entry);
          }
        }
      }

      function sendCmd(deviceId, cmd, extra = null) {
        if (controlWs && controlWs.readyState === WebSocket.OPEN)
          controlWs.send(JSON.stringify({ cmd, deviceId, ...(extra || {}) }));
      }

      async function toggleLive(deviceId) {
        const state = deviceState[deviceId];
        if (!state) return;
        const btn = document.getElementById(`btnLive_${deviceId}`);
        if (state.isLive) {
          state.isLive = false;
          state.autoListen = false;
          saveAutoListen(deviceId, false);
          if (state.useWebRtc) stopWebRtc(deviceId, true);
          if (state.audioCtx) {
            // Tear down PCM processing graph before closing context
            [
              "pcmPreGainNode",
              "pcmGainNode",
              "pcmHighPassNode",
              "pcmWarmthNode",
              "pcmPresenceNode",
              "pcmClarityNode",
              "pcmMergerNode",
              "pcmRnnoiseNode",
            ].forEach((k) => {
              try {
                state[k]?.disconnect();
              } catch (_) {}
              state[k] = null;
            });
            try {
              state.pcmRnnoiseNode?.destroy?.();
            } catch (_) {}
            state.pcmGraphConnected = false;
            state.audioCtx.close();
            state.audioCtx = null;
          }
          btn.textContent = "▶ Live Listen";
          btn.classList.remove("active");
          clearCanvas(state.canvas);
          log(`Stopped live listen for ${deviceId}`, "info");
        } else {
          state.isLive = true;
          state.autoListen = true;
          saveAutoListen(deviceId, true);
          state.audioCtx = new (
            window.AudioContext || window.webkitAudioContext
          )({ sampleRate: 16000, latencyHint: "interactive" });
          // Proactively resume in case browser suspended it
          if (state.audioCtx.state === "suspended") state.audioCtx.resume();
          state.nextPlayTime = state.audioCtx.currentTime;
          btn.textContent = "⏸ Stop Listen";
          btn.classList.add("active");
          sendCmd(deviceId, "stream_codec", {
            mode: state.streamMode || "auto",
          });
          const wantsRtc = state.preferWebRtc !== false;
          let ok = false;
          if (wantsRtc) {
            ok = await startWebRtc(deviceId, state);
          }
          if (!ok) {
            sendCmd(deviceId, "start_stream");
            log(
              `Live listen started for ${deviceId} (PCM mode)`,
              wantsRtc ? "warn" : "ok",
            );
          } else {
            log(`Started live listen for ${deviceId} (WebRTC)`, "ok");
          }
        }
      }

      function startRecord(deviceId) {
        sendCmd(deviceId, "start_record");
      }
      function stopRecord(deviceId) {
        sendCmd(deviceId, "stop_record");
      }
      function takePhoto(deviceId, camera = "current") {
        sendCmd(deviceId, "take_photo", { camera });
        log(`Capture photo requested (${camera}) for ${deviceId}`, "info");
      }
      function switchCamera(deviceId) {
        sendCmd(deviceId, "switch_camera");
        log(`Camera switched for ${deviceId}`, "info");
      }
      function toggleLiveCamera(deviceId) {
        const state = deviceState[deviceId];
        if (!state) return;
        const btn = document.getElementById(`btnCamLive_${deviceId}`);
        if (state.liveCameraActive) {
          if (state.liveCameraTimer) clearInterval(state.liveCameraTimer);
          state.liveCameraTimer = null;
          state.liveCameraActive = false;
          if (btn) btn.textContent = "🎥 Camera Live";
          log(`Live camera stopped for ${deviceId}`, "info");
          return;
        }
        state.liveCameraActive = true;
        if (btn) btn.textContent = "⏹ Stop Cam";
        const tick = () => {
          if (!deviceState[deviceId]?.liveCameraActive) return;
          takePhoto(deviceId, "current");
        };
        tick();
        const qualityMode = state.photoQuality || "normal";
        let intervalMs = isLowNetworkModeActive() ? 3200 : 1700;
        if (qualityMode === "fast")
          intervalMs = Math.max(1200, intervalMs - 400);
        if (qualityMode === "hd") intervalMs = intervalMs + 900;
        state.liveCameraTimer = setInterval(tick, intervalMs);
        log(`Live camera started for ${deviceId}`, "ok");
      }

      function cyclePhotoQuality(deviceId) {
        const state = deviceState[deviceId];
        if (!state) return;
        const modes = ["fast", "normal", "hd"];
        const idx = modes.indexOf(state.photoQuality || "normal");
        state.photoQuality = modes[(idx + 1) % modes.length];
        savePhotoQuality(deviceId, state.photoQuality);
        const btn = document.getElementById(`btnPhotoQ_${deviceId}`);
        if (btn)
          btn.textContent = `Photo: ${photoQualityLabel(state.photoQuality)}`;
        sendCmd(deviceId, "photo_quality", { mode: state.photoQuality });
        if (state.liveCameraActive) {
          if (state.liveCameraTimer) clearInterval(state.liveCameraTimer);
          state.liveCameraTimer = null;
          state.liveCameraActive = false;
          toggleLiveCamera(deviceId);
        }
        log(
          `Photo quality ${photoQualityLabel(state.photoQuality)} for ${deviceId}`,
          "info",
        );
      }
      function togglePhotoAi(deviceId) {
        const state = deviceState[deviceId];
        if (!state) return;
        state.photoAiEnabled = !state.photoAiEnabled;
        const btn = document.getElementById(`btnPhotoAi_${deviceId}`);
        if (btn)
          btn.textContent = `Photo AI: ${state.photoAiEnabled ? "ON" : "OFF"}`;
        sendCmd(deviceId, "photo_ai", { enabled: state.photoAiEnabled });
        log(
          `Photo AI ${state.photoAiEnabled ? "enabled" : "disabled"} for ${deviceId}`,
          "info",
        );
      }
      function recoverMic(deviceId) {
        sendCmd(deviceId, "start_stream");
        log(`Manual mic recovery sent to ${deviceId}`, "warn");
      }
      function refreshData(deviceId) {
        sendCmd(deviceId, "get_data");
        log(`Data refresh requested for ${deviceId}`, "info");
      }

      function renderWebRtcState(deviceId, state, bitrateKbps, quality) {
        if (!deviceState[deviceId]) addDeviceCard(deviceId, "Unknown", null);
        const st = deviceState[deviceId];
        st.health = st.health || {};
        st.health.webRtcState = state || st.health.webRtcState || "state";
        if (Number.isFinite(Number(bitrateKbps)))
          st.health.bitrateKbps = Number(bitrateKbps);
        if (quality && typeof quality === "object") st.health.quality = quality;
        if (String(state || "").includes("need_reoffer")) {
          scheduleIceRecovery(deviceId, st, "device_requested");
        }
        renderDeviceHealth(deviceId, st.health);
      }

      function renderBitrateBadge(bitrateKbps) {
        const b = Number(bitrateKbps);
        if (!Number.isFinite(b) || b <= 0) return "-";
        const cls = b <= 12 ? "br-low" : b <= 24 ? "br-mid" : "br-high";
        return `<span class="br-badge ${cls}">${Math.round(b)} kbps</span>`;
      }

      function renderQualitySummary(quality) {
        if (!quality) return "-";
        const rtt = Number.isFinite(Number(quality.rttMs))
          ? `${Math.round(Number(quality.rttMs))}ms`
          : "-";
        const loss = Number.isFinite(Number(quality.lossPct))
          ? `${Number(quality.lossPct).toFixed(1)}%`
          : "-";
        const jitter = Number.isFinite(Number(quality.jitterMs))
          ? `${Math.round(Number(quality.jitterMs))}ms`
          : "-";
        return `rtt ${rtt} | loss ${loss} | jit ${jitter}`;
      }

      function renderBatterySummary(batteryPct, charging) {
        const p = Number(batteryPct);
        const pctText =
          Number.isFinite(p) && p >= 0 ? `${Math.round(p)}%` : "-";
        if (charging === true)
          return `<span class="ok-text">${pctText} (charging)</span>`;
        if (charging === false) return `${pctText} (discharging)`;
        return pctText;
      }

      function renderPhotoSaved(msg) {
        if (!msg?.deviceId || !msg?.url || !msg?.filename) return;
        if (!deviceState[msg.deviceId])
          addDeviceCard(msg.deviceId, "Unknown", null);
        const list = document.getElementById(`photoList_${msg.deviceId}`);
        if (!list) return;
        const item = document.createElement("div");
        item.className = "photo-item";
        const cam = String(msg.camera || "rear").toUpperCase();
        const q = photoQualityLabel(
          String(msg.quality || "normal").toLowerCase(),
        );
        const ai = msg.aiEnhanced ? "AI" : "RAW";
        const whenTxt = msg.ts
          ? new Date(Number(msg.ts)).toLocaleString()
          : new Date().toLocaleString();
        item.innerHTML = `
          <a href="${msg.url}" target="_blank" title="${msg.filename}">
            <img class="photo-thumb" src="${msg.url}" alt="${cam} camera capture" loading="lazy" />
          </a>
          <div>
            <div class="photo-meta">${cam} • ${q} • ${ai} • ${whenTxt}</div>
            <a class="photo-link" href="${msg.url}" download="${msg.filename}">⬇ ${msg.filename}</a>
          </div>
        `;
        list.prepend(item);
        while (list.children.length > 8) {
          list.removeChild(list.lastChild);
        }
      }

      async function toggleWebRtc(deviceId) {
        const state = deviceState[deviceId];
        if (!state) return;
        if (!state.useWebRtc) {
          state.preferWebRtc = true;
          savePreferRtc(deviceId, true);
          if (!state.isLive) {
            await toggleLive(deviceId);
          } else {
            await startWebRtc(deviceId, state);
          }
        } else {
          state.preferWebRtc = false;
          savePreferRtc(deviceId, false);
          stopWebRtc(deviceId, true);
          if (state.isLive) sendCmd(deviceId, "start_stream");
        }
      }

      function applyPlaybackGain(state) {
        if (!state) return;
        const mul = Number(state.playbackGain || 1.0);
        // If pre-gain node exists, user gain is direct multiplier. If not, keep legacy fallback.
        if (state.webRtcGainNode)
          state.webRtcGainNode.gain.value =
            (state.webRtcPreGainNode ? 1.0 : 6.0) * mul;
        if (state.pcmGainNode)
          state.pcmGainNode.gain.value =
            (state.pcmPreGainNode ? 1.0 : 4.8) * mul;
      }

      function applyAdaptiveNoiseProfile(deviceId, state, noiseDb) {
        if (!state || !Number.isFinite(noiseDb)) return;
        const now = Date.now();
        if (
          state.lastAdaptiveFilterAt &&
          now - state.lastAdaptiveFilterAt < 4000
        )
          return;

        let profile = "quiet";
        if (noiseDb >= -48) profile = "noisy";
        else if (noiseDb >= -56) profile = "medium";
        if (state.adaptiveFilterProfile === profile) return;

        state.adaptiveFilterProfile = profile;
        state.lastAdaptiveFilterAt = now;

        let hpFreq = 110;
        let warmthDb = -1.5;
        let presenceDb = 3.6;
        let clarityDb = 2.6;
        let rnTarget = false;

        if (profile === "medium") {
          hpFreq = 125;
          warmthDb = -2.4;
          presenceDb = 3.8;
          clarityDb = 3.1;
          rnTarget = true;
        } else if (profile === "noisy") {
          hpFreq = 130;
          warmthDb = -2.8;
          presenceDb = 3.9;
          clarityDb = 3.4;
          rnTarget = true;
        }

        if (state.webRtcHighPassNode)
          state.webRtcHighPassNode.frequency.value = hpFreq;
        if (state.webRtcWarmthNode)
          state.webRtcWarmthNode.gain.value = warmthDb;
        if (state.webRtcPresenceNode)
          state.webRtcPresenceNode.gain.value = presenceDb;
        if (state.webRtcClarityNode)
          state.webRtcClarityNode.gain.value = clarityDb;

        if (state.pcmHighPassNode)
          state.pcmHighPassNode.frequency.value = hpFreq;
        if (state.pcmWarmthNode) state.pcmWarmthNode.gain.value = warmthDb;
        if (state.pcmPresenceNode)
          state.pcmPresenceNode.gain.value = presenceDb;
        if (state.pcmClarityNode) state.pcmClarityNode.gain.value = clarityDb;

        const rnSwitchReady =
          !state.lastRnAutoSwitchAt || now - state.lastRnAutoSwitchAt > 12000;
        if (rnSwitchReady && state.rnnoiseEnabled !== rnTarget) {
          state.lastRnAutoSwitchAt = now;
          setRnnoiseEnabled(deviceId, state, rnTarget, `auto_${profile}`);
        }
      }

      function cyclePlaybackGain(deviceId) {
        const state = deviceState[deviceId];
        if (!state) return;
        const levels = [1.0, 1.5, 2.0, 3.0, 4.0];
        const current = Number(state.playbackGain || 1.0);
        const idx = levels.findIndex((v) => Math.abs(v - current) < 0.01);
        state.playbackGain = levels[(idx + 1 + levels.length) % levels.length];
        savePlaybackGain(deviceId, state.playbackGain);
        const gainBtn = document.getElementById(`btnGain_${deviceId}`);
        if (gainBtn)
          gainBtn.textContent = `Gain: ${state.playbackGain.toFixed(1)}x`;
        applyPlaybackGain(state);
        log(
          `Playback gain ${state.playbackGain.toFixed(1)}x for ${deviceId}`,
          "info",
        );
      }

      function cycleVoiceProfile(deviceId) {
        const state = deviceState[deviceId];
        if (!state) return;
        const levels = ["near", "room", "far"];
        const cur = String(state.voiceProfile || "room");
        const idx = levels.indexOf(cur);
        state.voiceProfile = levels[(idx + 1 + levels.length) % levels.length];
        saveVoiceProfile(deviceId, state.voiceProfile);
        const btn = document.getElementById(`btnVoice_${deviceId}`);
        if (btn)
          btn.textContent = `Voice: ${voiceProfileLabel(state.voiceProfile)}`;
        sendCmd(deviceId, "voice_profile", { profile: state.voiceProfile });
        log(
          `Voice profile ${state.voiceProfile.toUpperCase()} for ${deviceId}`,
          "info",
        );
      }

      function cycleStreamMode(deviceId) {
        const state = deviceState[deviceId];
        if (!state) return;
        if (isLowNetworkModeActive()) {
          log(
            `Cannot change stream mode while low-network mode is active for ${deviceId}`,
            "warn",
          );
          return;
        }
        const levels = ["auto", "smart", "pcm"];
        const cur = String(state.streamMode || "auto");
        const idx = levels.indexOf(cur);
        state.streamMode = levels[(idx + 1 + levels.length) % levels.length];
        saveStreamMode(deviceId, state.streamMode);
        const btn = document.getElementById(`btnStream_${deviceId}`);
        if (btn)
          btn.textContent = `Stream: ${streamModeLabel(state.streamMode)}`;
        sendCmd(deviceId, "stream_codec", { mode: state.streamMode });
        if (state.isLive && (!state.useWebRtc || !state.rtcConnected)) {
          sendCmd(deviceId, "start_stream");
        }
        log(
          `Stream mode ${state.streamMode.toUpperCase()} for ${deviceId}`,
          "info",
        );
      }

      function resetAudioSettings(deviceId) {
        const state = deviceState[deviceId];
        if (!state) return;
        try {
          localStorage.removeItem(`${RN_ENABLED_STORAGE_PREFIX}${deviceId}`);
          localStorage.removeItem(`${GAIN_STORAGE_PREFIX}${deviceId}`);
          localStorage.removeItem(`${VOICE_PROFILE_STORAGE_PREFIX}${deviceId}`);
          localStorage.removeItem(`${STREAM_MODE_STORAGE_PREFIX}${deviceId}`);
        } catch (_) {}
        setRnnoiseEnabled(deviceId, state, true, "reset");
        state.playbackGain = 1.5;
        state.voiceProfile = "room";
        state.streamMode = "pcm";
        savePlaybackGain(deviceId, 1.5);
        saveVoiceProfile(deviceId, "room");
        saveStreamMode(deviceId, "pcm");
        const gainBtn = document.getElementById(`btnGain_${deviceId}`);
        if (gainBtn) gainBtn.textContent = "Gain: 1.5x";
        const voiceBtn = document.getElementById(`btnVoice_${deviceId}`);
        if (voiceBtn) voiceBtn.textContent = "Voice: Room";
        const streamBtn = document.getElementById(`btnStream_${deviceId}`);
        if (streamBtn) streamBtn.textContent = "Stream: PCM";
        sendCmd(deviceId, "voice_profile", { profile: "room" });
        sendCmd(deviceId, "stream_codec", { mode: "pcm" });
        applyPlaybackGain(state);
        log(`Audio settings reset for ${deviceId}`, "ok");
      }

      function updateRnnoiseBtn(deviceId, state) {
        const rnBtn = document.getElementById(`btnRn_${deviceId}`);
        if (rnBtn)
          rnBtn.textContent = `RNNoise: ${state.rnnoiseEnabled ? "ON" : "OFF"}`;
      }

      function setRnnoiseEnabled(deviceId, state, enabled, reason = "manual") {
        if (!state) return;
        if (state.rnnoiseEnabled === enabled) {
          updateRnnoiseBtn(deviceId, state);
          return;
        }
        state.rnnoiseEnabled = enabled;
        saveRnnoiseEnabled(deviceId, enabled);
        updateRnnoiseBtn(deviceId, state);
        log(
          `RNNoise ${enabled ? "enabled" : "disabled"} for ${deviceId}${reason ? ` (${reason})` : ""}`,
          "info",
        );

        // Rewire active WebRTC stream immediately.
        if (
          state.useWebRtc &&
          state.rtcConnected &&
          state.webRtcSourceNode &&
          state.webRtcGainNode
        ) {
          try {
            state.webRtcSourceNode.disconnect();
          } catch (_) {}
          try {
            state.webRtcPreGainNode?.disconnect();
          } catch (_) {}
          try {
            state.webRtcRnnoiseNode?.disconnect();
          } catch (_) {}
          if (state.rnnoiseEnabled) {
            if (state.webRtcPreGainNode) {
              state.webRtcSourceNode.connect(state.webRtcPreGainNode);
              state.webRtcPreGainNode.connect(state.webRtcGainNode);
            }
            ensureRnnoiseNode(state.webRtcAudioCtx, state, "webrtc").then(
              (rn) => {
                if (
                  !rn ||
                  !state.webRtcSourceNode ||
                  !state.webRtcGainNode ||
                  !state.webRtcPreGainNode
                )
                  return;
                try {
                  rn.disconnect();
                } catch (_) {}
                try {
                  state.webRtcPreGainNode.disconnect();
                } catch (_) {}
                state.webRtcSourceNode.connect(state.webRtcPreGainNode);
                state.webRtcPreGainNode.connect(rn);
                rn.connect(state.webRtcGainNode);
              },
            );
          } else {
            if (state.webRtcPreGainNode) {
              state.webRtcSourceNode.connect(state.webRtcPreGainNode);
              state.webRtcPreGainNode.connect(state.webRtcGainNode);
            } else {
              state.webRtcSourceNode.connect(state.webRtcGainNode);
            }
          }
        }
        // For PCM path: force graph rebuild so RNNoise is wired in/out correctly.
        if (state.audioCtx && state.pcmGraphConnected) {
          [
            "pcmPreGainNode",
            "pcmGainNode",
            "pcmHighPassNode",
            "pcmWarmthNode",
            "pcmPresenceNode",
            "pcmClarityNode",
            "pcmMergerNode",
          ].forEach((k) => {
            try {
              state[k]?.disconnect();
            } catch (_) {}
            state[k] = null;
          });
          state.pcmGraphConnected = false;
        }
      }

      function toggleRnnoise(deviceId) {
        const state = deviceState[deviceId];
        if (!state) return;
        setRnnoiseEnabled(deviceId, state, !state.rnnoiseEnabled, "manual");
      }

      async function startWebRtc(deviceId, state) {
        if (isLowNetworkModeActive()) {
          log(
            `WebRTC skipped for ${deviceId} because low-network mode is active`,
            "warn",
          );
          return false;
        }
        if (state.rtcPeer) stopWebRtc(deviceId, false);
        let pc;
        try {
          pc = new RTCPeerConnection({
            iceServers: webRtcConfig.iceServers,
          });
        } catch (e) {
          log(`WebRTC init failed for ${deviceId}: ${e.message}`, "err");
          return false;
        }
        state.rtcPeer = pc;
        state.useWebRtc = true;
        state.rtcConnected = false;
        state.isLive = true;
        state.rtcRetryCount = 0;
        state.webRtcRetryOnNotFoundDone = false;

        if (!state.remoteAudioEl) {
          state.remoteAudioEl = document.createElement("audio");
          state.remoteAudioEl.autoplay = true;
          state.remoteAudioEl.playsInline = true;
        }

        pc.ontrack = (evt) => {
          setupWebRtcPlaybackBoost(deviceId, state, evt.streams[0]);
          state.rtcConnected = true;
          state.rtcRetryCount = 0;
          if (state.rtcConnectDeadlineTimer) {
            clearTimeout(state.rtcConnectDeadlineTimer);
            state.rtcConnectDeadlineTimer = null;
          }
          if (state.rtcRestartTimer) {
            clearTimeout(state.rtcRestartTimer);
            state.rtcRestartTimer = null;
          }
          startStatsLoop(deviceId, state);
          log(`WebRTC track active for ${deviceId}`, "ok");
        };

        pc.onicecandidate = (evt) => {
          if (!evt.candidate) return;
          sendCmd(deviceId, "webrtc_ice", { candidate: evt.candidate });
        };

        pc.oniceconnectionstatechange = () => {
          const s = pc.iceConnectionState;
          if (s === "connected" || s === "completed") {
            state.rtcConnected = true;
            state.rtcRetryCount = 0;
          }
          if (s === "failed" || s === "disconnected") {
            state.rtcConnected = false;
            scheduleIceRecovery(deviceId, state, s);
          }
          if (s === "closed") state.rtcConnected = false;
          log(`WebRTC ICE ${deviceId}: ${s}`, s === "failed" ? "warn" : "info");
        };

        pc.addTransceiver("audio", { direction: "recvonly" });
        try {
          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);

          const btn = document.getElementById(`btnRtc_${deviceId}`);
          if (btn) {
            btn.textContent = "⚡ WebRTC On";
            btn.classList.add("active");
          }
          const liveBtn = document.getElementById(`btnLive_${deviceId}`);
          if (liveBtn) {
            liveBtn.textContent = "⏸ Stop Listen";
            liveBtn.classList.add("active");
          }

          sendCmd(deviceId, "webrtc_start");
          sendCmd(deviceId, "webrtc_offer", { sdp: offer.sdp });
          log(`WebRTC offer sent to ${deviceId}`, "ok");
          state.rtcConnectDeadlineTimer = setTimeout(() => {
            state.rtcConnectDeadlineTimer = null;
            if (!state.rtcConnected && state.useWebRtc) {
              log(
                `WebRTC connect timed out for ${deviceId} — falling back to PCM`,
                "warn",
              );
              stopWebRtc(deviceId, true);
              if (state.isLive) sendCmd(deviceId, "start_stream");
            }
          }, 12000);
          return true;
        } catch (e) {
          log(`WebRTC offer failed for ${deviceId}: ${e.message}`, "err");
          stopWebRtc(deviceId, false);
          return false;
        }
      }

      function stopWebRtc(deviceId, notifyServer) {
        const state = deviceState[deviceId];
        if (!state) return;
        if (state.rtcPeer) {
          state.rtcPeer.ontrack = null;
          state.rtcPeer.onicecandidate = null;
          state.rtcPeer.oniceconnectionstatechange = null;
          state.rtcPeer.close();
        }
        if (state.rtcConnectDeadlineTimer) {
          clearTimeout(state.rtcConnectDeadlineTimer);
          state.rtcConnectDeadlineTimer = null;
        }
        if (state.rtcRestartTimer) {
          clearTimeout(state.rtcRestartTimer);
          state.rtcRestartTimer = null;
        }
        if (state.rtcStatsTimer) {
          clearInterval(state.rtcStatsTimer);
          state.rtcStatsTimer = null;
        }
        state.rtcPeer = null;
        state.useWebRtc = false;
        state.rtcConnected = false;
        state.webRtcRetryOnNotFoundDone = false;
        if (state.remoteAudioEl) state.remoteAudioEl.srcObject = null;
        teardownWebRtcPlaybackBoost(state);
        const btn = document.getElementById(`btnRtc_${deviceId}`);
        if (btn) {
          btn.textContent = "⚡ WebRTC";
          btn.classList.remove("active");
        }
        if (notifyServer) sendCmd(deviceId, "webrtc_stop");
      }

      function setupWebRtcPlaybackBoost(deviceId, state, stream) {
        if (!state || !stream) return;
        if (state.remoteAudioEl) {
          state.remoteAudioEl.srcObject = stream;
          state.remoteAudioEl.muted = false;
          state.remoteAudioEl.volume = 1.0;
          state.remoteAudioEl.play?.().catch(() => {});
        }
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return;
        let graphActive = false;
        try {
          if (!state.webRtcAudioCtx)
            state.webRtcAudioCtx = new Ctx({ latencyHint: "interactive" });
          if (state.webRtcAudioCtx.state === "suspended")
            state.webRtcAudioCtx.resume();
          if (!state.webRtcPreGainNode) {
            // Fixed pre-gain before RNNoise to prevent low/suppressed voice on quiet devices.
            state.webRtcPreGainNode = state.webRtcAudioCtx.createGain();
            state.webRtcPreGainNode.gain.value = 6.0;
          }
          if (!state.webRtcGainNode) {
            // User gain stage (1.0x..3.0x)
            state.webRtcGainNode = state.webRtcAudioCtx.createGain();
            state.webRtcGainNode.gain.value = Number(state.playbackGain || 1.0);
          }
          if (!state.webRtcHighPassNode) {
            state.webRtcHighPassNode =
              state.webRtcAudioCtx.createBiquadFilter();
            state.webRtcHighPassNode.type = "highpass";
            state.webRtcHighPassNode.frequency.value = 110;
            state.webRtcHighPassNode.Q.value = 0.7;
          }
          if (!state.webRtcNotchNode) {
            state.webRtcNotchNode = state.webRtcAudioCtx.createBiquadFilter();
            state.webRtcNotchNode.type = "notch";
            state.webRtcNotchNode.frequency.value = 50;
            state.webRtcNotchNode.Q.value = 10;
          }
          if (!state.webRtcWarmthNode) {
            state.webRtcWarmthNode = state.webRtcAudioCtx.createBiquadFilter();
            state.webRtcWarmthNode.type = "lowshelf";
            state.webRtcWarmthNode.frequency.value = 280;
            state.webRtcWarmthNode.gain.value = -1.5;
          }
          if (!state.webRtcPresenceNode) {
            state.webRtcPresenceNode =
              state.webRtcAudioCtx.createBiquadFilter();
            state.webRtcPresenceNode.type = "peaking";
            state.webRtcPresenceNode.frequency.value = 2800;
            state.webRtcPresenceNode.Q.value = 0.9;
            state.webRtcPresenceNode.gain.value = 3.6;
          }
          if (!state.webRtcClarityNode) {
            state.webRtcClarityNode = state.webRtcAudioCtx.createBiquadFilter();
            state.webRtcClarityNode.type = "highshelf";
            state.webRtcClarityNode.frequency.value = 5000;
            state.webRtcClarityNode.gain.value = 2.6;
          }
          // ChannelMerger: explicitly routes mono ch0 → L and ch0 → R.
          // Works reliably on all Android Chrome versions (no OEM-specific breakage).
          if (!state.webRtcMergerNode) {
            state.webRtcMergerNode =
              state.webRtcAudioCtx.createChannelMerger(2);
          }
          if (state.webRtcSourceNode) {
            try {
              state.webRtcSourceNode.disconnect();
            } catch (_) {}
          }
          state.webRtcSourceNode =
            state.webRtcAudioCtx.createMediaStreamSource(stream);
          if (!state.webRtcAudioGraphConnected) {
            // Static chain: gain → HP → notch → warmth → presence → clarity → merger(L+R) → dest
            state.webRtcGainNode.connect(state.webRtcHighPassNode);
            state.webRtcHighPassNode.connect(state.webRtcNotchNode);
            state.webRtcNotchNode.connect(state.webRtcWarmthNode);
            state.webRtcWarmthNode.connect(state.webRtcPresenceNode);
            state.webRtcPresenceNode.connect(state.webRtcClarityNode);
            // Duplicate mono → both earbuds
            state.webRtcClarityNode.connect(state.webRtcMergerNode, 0, 0);
            state.webRtcClarityNode.connect(state.webRtcMergerNode, 0, 1);
            state.webRtcMergerNode.connect(state.webRtcAudioCtx.destination);
            state.webRtcAudioGraphConnected = true;
          }
          if (state.rnnoiseEnabled) {
            // Keep direct preGain path active immediately; swap to RNNoise once ready.
            if (state.webRtcPreGainNode) {
              try {
                state.webRtcPreGainNode.disconnect();
              } catch (_) {}
              state.webRtcPreGainNode.connect(state.webRtcGainNode);
              state.webRtcSourceNode.connect(state.webRtcPreGainNode);
            }
            ensureRnnoiseNode(state.webRtcAudioCtx, state, "webrtc").then(
              (rn) => {
                if (
                  !rn ||
                  !state.webRtcSourceNode ||
                  !state.webRtcGainNode ||
                  !state.webRtcPreGainNode
                )
                  return;
                try {
                  state.webRtcPreGainNode.disconnect();
                } catch (_) {}
                try {
                  rn.disconnect();
                } catch (_) {}
                state.webRtcPreGainNode.connect(rn);
                rn.connect(state.webRtcGainNode);
                try {
                  state.webRtcSourceNode.disconnect();
                } catch (_) {}
                state.webRtcSourceNode.connect(state.webRtcPreGainNode);
              },
            );
          } else {
            if (state.webRtcPreGainNode) {
              try {
                state.webRtcPreGainNode.disconnect();
              } catch (_) {}
              state.webRtcPreGainNode.connect(state.webRtcGainNode);
              state.webRtcSourceNode.connect(state.webRtcPreGainNode);
            } else {
              state.webRtcSourceNode.connect(state.webRtcGainNode);
            }
          }
          startWebRtcInputMeter(deviceId, state);
          graphActive = true;
        } catch (e) {
          log(`WebRTC audio boost disabled: ${e.message}`, "warn");
        }
        // Keep direct element playback as fail-safe if graph is not active.
        if (state.remoteAudioEl) {
          state.remoteAudioEl.muted = graphActive;
          state.remoteAudioEl.play?.().catch(() => {});
        }
      }

      function teardownWebRtcPlaybackBoost(state) {
        if (!state) return;
        if (state.webRtcMeterTimer) {
          clearInterval(state.webRtcMeterTimer);
          state.webRtcMeterTimer = null;
        }
        if (state.webRtcSourceNode) {
          try {
            state.webRtcSourceNode.disconnect();
          } catch (_) {}
        }
        if (state.webRtcAnalyserNode) {
          try {
            state.webRtcAnalyserNode.disconnect();
          } catch (_) {}
        }
        if (state.webRtcHighPassNode) {
          try {
            state.webRtcHighPassNode.disconnect();
          } catch (_) {}
        }
        if (state.webRtcNotchNode) {
          try {
            state.webRtcNotchNode.disconnect();
          } catch (_) {}
        }
        if (state.webRtcWarmthNode) {
          try {
            state.webRtcWarmthNode.disconnect();
          } catch (_) {}
        }
        if (state.webRtcPresenceNode) {
          try {
            state.webRtcPresenceNode.disconnect();
          } catch (_) {}
        }
        if (state.webRtcClarityNode) {
          try {
            state.webRtcClarityNode.disconnect();
          } catch (_) {}
        }
        if (state.webRtcPreGainNode) {
          try {
            state.webRtcPreGainNode.disconnect();
          } catch (_) {}
        }
        if (state.webRtcGainNode) {
          try {
            state.webRtcGainNode.disconnect();
          } catch (_) {}
        }
        if (state.webRtcMergerNode) {
          try {
            state.webRtcMergerNode.disconnect();
          } catch (_) {}
        }
        if (state.webRtcRnnoiseNode) {
          try {
            state.webRtcRnnoiseNode.disconnect();
          } catch (_) {}
          try {
            state.webRtcRnnoiseNode.destroy?.();
          } catch (_) {}
        }
        if (state.webRtcAudioCtx) {
          try {
            state.webRtcAudioCtx.close();
          } catch (_) {}
        }
        state.webRtcSourceNode = null;
        state.webRtcAnalyserNode = null;
        state.webRtcMeterData = null;
        state.webRtcInboundRms = 0;
        state.rtcRxPacketsPerSec = 0;
        state.rtcRxKbps = 0;
        state.rtcRxMetricText = "-";
        state.rtcLastPacketsReceived = null;
        state.rtcLastBytesReceived = null;
        state.rtcLastPacketsTs = null;
        state.webRtcHighPassNode = null;
        state.webRtcNotchNode = null;
        state.webRtcWarmthNode = null;
        state.webRtcPresenceNode = null;
        state.webRtcClarityNode = null;
        state.webRtcPreGainNode = null;
        state.webRtcGainNode = null;
        state.webRtcMergerNode = null;
        state.webRtcRnnoiseNode = null;
        state.webRtcAudioCtx = null;
        state.webRtcAudioGraphConnected = false;
      }

      function startWebRtcInputMeter(deviceId, state) {
        if (!state?.webRtcAudioCtx || !state?.webRtcSourceNode) return;
        if (!state.webRtcAnalyserNode) {
          state.webRtcAnalyserNode = state.webRtcAudioCtx.createAnalyser();
          state.webRtcAnalyserNode.fftSize = 1024;
          state.webRtcAnalyserNode.smoothingTimeConstant = 0.6;
        }
        try {
          state.webRtcSourceNode.connect(state.webRtcAnalyserNode);
        } catch (_) {}
        if (
          !state.webRtcMeterData ||
          state.webRtcMeterData.length !== state.webRtcAnalyserNode.fftSize
        ) {
          state.webRtcMeterData = new Float32Array(
            state.webRtcAnalyserNode.fftSize,
          );
        }
        if (state.webRtcMeterTimer) clearInterval(state.webRtcMeterTimer);
        state.webRtcMeterTimer = setInterval(() => {
          if (
            !state.useWebRtc ||
            !state.webRtcAnalyserNode ||
            !state.webRtcMeterData
          )
            return;
          if (
            state.webRtcAudioCtx &&
            state.webRtcAudioCtx.state === "suspended"
          ) {
            state.webRtcAudioCtx.resume().catch(() => {});
          }
          try {
            state.webRtcAnalyserNode.getFloatTimeDomainData(
              state.webRtcMeterData,
            );
            let sum = 0;
            for (let i = 0; i < state.webRtcMeterData.length; i++) {
              const v = state.webRtcMeterData[i];
              sum += v * v;
            }
            state.webRtcInboundRms = Math.sqrt(
              sum / state.webRtcMeterData.length,
            );
            const rmsEl = document.getElementById(`hrms_${deviceId}`);
            if (rmsEl) {
              const pct = Math.max(
                0,
                Math.min(100, Math.round(state.webRtcInboundRms * 100)),
              );
              const cls = pct >= 8 ? "ok-text" : pct > 0 ? "" : "bad-text";
              rmsEl.innerHTML = `<span class="${cls}">${pct}%</span>`;
            }
          } catch (_) {}
        }, 250);
      }

      async function onWebRtcAnswer(deviceId, sdp) {
        const state = deviceState[deviceId];
        if (!state || !state.rtcPeer || !sdp) return;
        try {
          await state.rtcPeer.setRemoteDescription({ type: "answer", sdp });
          log(`WebRTC answer applied for ${deviceId}`, "ok");
        } catch (e) {
          log(`WebRTC answer error for ${deviceId}: ${e.message}`, "err");
        }
      }

      async function onWebRtcIce(deviceId, candidate) {
        const state = deviceState[deviceId];
        if (!state || !state.rtcPeer || !candidate) return;
        try {
          await state.rtcPeer.addIceCandidate(candidate);
        } catch (e) {
          log(`WebRTC ICE add failed for ${deviceId}: ${e.message}`, "warn");
        }
      }

      function scheduleIceRecovery(deviceId, state, reason) {
        if (!state || !state.rtcPeer || !state.useWebRtc) return;
        if (state.rtcRestartTimer) clearTimeout(state.rtcRestartTimer);
        renderDeviceHealth(deviceId, state.health);
        if (state.rtcRetryCount >= 3) {
          log(
            `WebRTC unstable for ${deviceId} (${reason}) — fallback to PCM`,
            "warn",
          );
          stopWebRtc(deviceId, true);
          sendCmd(deviceId, "start_stream");
          return;
        }
        const delayMs = 600 + state.rtcRetryCount * 700;
        state.rtcRestartTimer = setTimeout(async () => {
          if (!state.rtcPeer || !state.useWebRtc) return;
          state.rtcRetryCount += 1;
          renderDeviceHealth(deviceId, state.health);
          try {
            if (typeof state.rtcPeer.restartIce === "function")
              state.rtcPeer.restartIce();
            const offer = await state.rtcPeer.createOffer({ iceRestart: true });
            await state.rtcPeer.setLocalDescription(offer);
            sendCmd(deviceId, "webrtc_offer", { sdp: offer.sdp });
            log(
              `WebRTC ICE restart #${state.rtcRetryCount} sent for ${deviceId}`,
              "warn",
            );
          } catch (e) {
            log(
              `WebRTC ICE restart failed for ${deviceId}: ${e.message}`,
              "err",
            );
          }
        }, delayMs);
      }

      function startStatsLoop(deviceId, state) {
        if (!state || !state.rtcPeer) return;
        if (state.rtcStatsTimer) clearInterval(state.rtcStatsTimer);
        state.rtcLastPacketsReceived = null;
        state.rtcLastBytesReceived = null;
        state.rtcLastPacketsTs = null;
        state.rtcRxPacketsPerSec = 0;
        state.rtcRxKbps = 0;
        state.rtcRxMetricText = "-";
        state.rtcStatsTimer = setInterval(async () => {
          if (!state.rtcPeer || !state.useWebRtc) return;
          if (
            state.webRtcAudioCtx &&
            state.webRtcAudioCtx.state === "suspended"
          ) {
            state.webRtcAudioCtx.resume().catch(() => {});
          }
          try {
            const stats = await state.rtcPeer.getStats();
            const quality = extractQualityFromStats(stats);
            const nowMs = Date.now();
            let packetsReceivedNow = null;
            let bytesReceivedNow = null;
            stats.forEach((s) => {
              const isAudioInbound =
                s.type === "inbound-rtp" &&
                (s.kind === "audio" || s.mediaType === "audio");
              if (!isAudioInbound) return;
              if (Number.isFinite(Number(s.packetsReceived))) {
                packetsReceivedNow = Number(s.packetsReceived);
              }
              if (Number.isFinite(Number(s.bytesReceived))) {
                bytesReceivedNow = Number(s.bytesReceived);
              }
            });
            if (state.rtcLastPacketsTs != null) {
              const dtSec = Math.max(
                0.001,
                (nowMs - state.rtcLastPacketsTs) / 1000,
              );
              if (
                packetsReceivedNow != null &&
                state.rtcLastPacketsReceived != null
              ) {
                const dp = Math.max(
                  0,
                  packetsReceivedNow - state.rtcLastPacketsReceived,
                );
                state.rtcRxPacketsPerSec = dp / dtSec;
                state.rtcRxMetricText = `${state.rtcRxPacketsPerSec.toFixed(1)} p/s`;
              } else if (
                bytesReceivedNow != null &&
                state.rtcLastBytesReceived != null
              ) {
                const db = Math.max(
                  0,
                  bytesReceivedNow - state.rtcLastBytesReceived,
                );
                state.rtcRxKbps = (db * 8) / dtSec / 1000;
                state.rtcRxMetricText = `${state.rtcRxKbps.toFixed(1)} kb/s`;
              }
            }
            if (packetsReceivedNow != null) {
              state.rtcLastPacketsReceived = packetsReceivedNow;
            }
            if (bytesReceivedNow != null) {
              state.rtcLastBytesReceived = bytesReceivedNow;
            }
            if (
              packetsReceivedNow == null &&
              bytesReceivedNow == null &&
              state.rtcLastPacketsTs != null
            ) {
              state.rtcRxPacketsPerSec = 0;
              state.rtcRxKbps = 0;
              state.rtcRxMetricText = "0.0";
            }
            state.rtcLastPacketsTs = nowMs;
            state.health = state.health || {};
            state.health.quality = quality;
            renderDeviceHealth(deviceId, state.health);
            sendCmd(deviceId, "webrtc_quality", { quality });
          } catch (_) {}
        }, 3000);
      }

      function extractQualityFromStats(stats) {
        let rttMs = null;
        let jitterMs = null;
        let packetsLost = null;
        let packetsReceived = null;
        stats.forEach((s) => {
          if (
            s.type === "candidate-pair" &&
            (s.nominated || s.selected) &&
            Number.isFinite(Number(s.currentRoundTripTime))
          ) {
            rttMs = Number(s.currentRoundTripTime) * 1000;
          }
          if (
            s.type === "inbound-rtp" &&
            (s.kind === "audio" || s.mediaType === "audio")
          ) {
            if (Number.isFinite(Number(s.jitter)))
              jitterMs = Number(s.jitter) * 1000;
            if (Number.isFinite(Number(s.packetsLost)))
              packetsLost = Number(s.packetsLost);
            if (Number.isFinite(Number(s.packetsReceived)))
              packetsReceived = Number(s.packetsReceived);
          }
        });
        let lossPct = null;
        if (packetsLost != null && packetsReceived != null) {
          const total = packetsLost + packetsReceived;
          if (total > 0) lossPct = (packetsLost * 100.0) / total;
        }
        return {
          rttMs: rttMs != null ? Math.max(0, rttMs) : null,
          jitterMs: jitterMs != null ? Math.max(0, jitterMs) : null,
          lossPct: lossPct != null ? Math.max(0, lossPct) : null,
        };
      }

      async function loadWebRtcConfig() {
        try {
          const r = await fetch(`/api/webrtc-config`, { cache: "no-store" });
          if (!r.ok) return;
          const json = await r.json();
          if (
            json &&
            Array.isArray(json.iceServers) &&
            json.iceServers.length > 0
          ) {
            webRtcConfig = {
              iceServers: json.iceServers,
              tokenRequired: !!json.tokenRequired,
            };
          }
        } catch (e) {
          log(`WebRTC config fetch failed: ${e.message}`, "warn");
        }
      }

      function openTab(deviceId, tab, btn) {
        ["location", "sms", "calls"].forEach((t) => {
          const p = document.getElementById(`tab_${deviceId}_${t}`);
          if (p) p.classList.remove("active");
        });
        document
          .getElementById(`card_${deviceId}`)
          .querySelectorAll(".tab-btn")
          .forEach((b) => b.classList.remove("active"));
        const panel = document.getElementById(`tab_${deviceId}_${tab}`);
        if (panel) panel.classList.add("active");
        if (btn) btn.classList.add("active");
      }

      function renderDeviceData(deviceId, data) {
        if (!data) return;
        // Auto-create card if data arrives before device_connected (e.g. race or reconnect)
        if (!deviceState[deviceId]) addDeviceCard(deviceId, "Unknown", null);
        const locEl = document.getElementById(`tab_${deviceId}_location`);
        if (locEl && data.location) {
          const l = data.location;
          if (l.error) {
            locEl.innerHTML = `<div class="data-row"><span class="data-val" style="color:var(--red)">⚠ ${l.error}</span></div>`;
          } else {
            const mapsUrl = `https://maps.google.com/?q=${l.lat},${l.lon}`;
            locEl.innerHTML = `
              <div class="data-row"><span class="data-label">Coordinates</span><span class="data-val"><a href="${mapsUrl}" target="_blank" style="color:var(--cyan)">${l.lat.toFixed(6)}, ${l.lon.toFixed(6)}</a></span></div>
              <div class="data-row"><span class="data-label">Accuracy</span><span class="data-val">${l.accuracy ? l.accuracy.toFixed(1) + " m" : "N/A"}</span></div>
              <div class="data-row"><span class="data-label">Provider</span><span class="data-val">${l.provider || "N/A"}</span></div>
              <div class="data-row"><span class="data-label">Time</span><span class="data-val">${l.time ? new Date(l.time).toLocaleString() : "N/A"}</span></div>`;
          }
        }
        const smsEl = document.getElementById(`tab_${deviceId}_sms`);
        if (smsEl && data.sms) {
          if (!data.sms.length) {
            smsEl.innerHTML = `<div class="data-row"><span class="data-label">No SMS found or permission denied</span></div>`;
          } else {
            smsEl.innerHTML = data.sms
              .map(
                (s) => `
              <div class="data-row">
                <div><span class="data-val" style="font-weight:600">${s.address || "Unknown"}</span>
                     <span class="data-badge badge-${s.type}">${s.type}</span>
                     ${!s.read ? '<span class="data-badge badge-unread">UNREAD</span>' : ""}
                     <span class="data-label" style="float:right">${new Date(s.date).toLocaleString()}</span></div>
                <span class="data-val">${escHtml(s.body || "")}</span>
              </div>`,
              )
              .join("");
          }
        }
        const callsEl = document.getElementById(`tab_${deviceId}_calls`);
        if (callsEl && data.callLog) {
          if (!data.callLog.length) {
            callsEl.innerHTML = `<div class="data-row"><span class="data-label">No calls found or permission denied</span></div>`;
          } else {
            callsEl.innerHTML = data.callLog
              .map(
                (c) => `
              <div class="data-row">
                <div><span class="data-val" style="font-weight:600">${c.name || c.number || "Unknown"}</span>
                     ${c.name ? `<span class="data-label"> ${c.number}</span>` : ""}
                     <span class="data-badge badge-${c.type === "incoming" ? "in" : c.type === "outgoing" ? "out" : "missed"}">${c.type}</span>
                     <span class="data-label" style="float:right">${new Date(c.date).toLocaleString()}</span></div>
                <span class="data-label">Duration: ${formatDuration(c.duration)}</span>
              </div>`,
              )
              .join("");
          }
        }
        log(`📊 Data received from ${deviceId.substring(0, 8)}`, "info");
      }

      function escHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
      function formatDuration(secs) {
        if (!secs) return "0s";
        const m = Math.floor(secs / 60),
          s = secs % 60;
        return m > 0 ? `${m}m ${s}s` : `${s}s`;
      }

      function _buildPcmStaticGraph(state) {
        const ctx = state.audioCtx;

        // ── Stage 1: Fixed pre-amplifier ─────────────────────────────────────
        // Boosts the raw PCM signal BEFORE RNNoise so the model receives a loud
        // enough input to correctly classify speech (not suppress it as noise),
        // and provides base loudness regardless of RNNoise state.
        state.pcmPreGainNode = ctx.createGain();
        state.pcmPreGainNode.gain.value = 4.8;

        // ── Stage 2: User-controlled gain ─────────────────────────────────────
        // Simple multiplier (no channel-count hacks). 1.0–3.0 range.
        state.pcmGainNode = ctx.createGain();
        state.pcmGainNode.gain.value = Number(state.playbackGain || 1.0);

        // ── Stage 3: Voice EQ for clarity ────────────────────────────────────
        state.pcmHighPassNode = ctx.createBiquadFilter();
        state.pcmHighPassNode.type = "highpass";
        state.pcmHighPassNode.frequency.value = 110;
        state.pcmHighPassNode.Q.value = 0.7;

        state.pcmWarmthNode = ctx.createBiquadFilter();
        state.pcmWarmthNode.type = "lowshelf";
        state.pcmWarmthNode.frequency.value = 280;
        state.pcmWarmthNode.gain.value = -1.5;

        state.pcmPresenceNode = ctx.createBiquadFilter();
        state.pcmPresenceNode.type = "peaking";
        state.pcmPresenceNode.frequency.value = 2800;
        state.pcmPresenceNode.Q.value = 0.9;
        state.pcmPresenceNode.gain.value = 3.6;

        state.pcmClarityNode = ctx.createBiquadFilter();
        state.pcmClarityNode.type = "highshelf";
        state.pcmClarityNode.frequency.value = 5000;
        state.pcmClarityNode.gain.value = 2.6;

        // ── Stage 4: Explicit mono→stereo (ChannelMerger) ─────────────────────
        // Physically routes channel 0 to BOTH L (input 0) and R (input 1).
        // This is 100% reliable on all Android Chrome versions, unlike StereoPanner
        // or channelCount hacks which can silently strip the right channel in some
        // OEM Chromium builds (Realme ColorOS, Xiaomi MIUI, etc.).
        state.pcmMergerNode = ctx.createChannelMerger(2);

        // ── Wire static chain ─────────────────────────────────────────────────
        // preGain → gain → HP → warmth → presence → clarity → merger → dest
        state.pcmPreGainNode.connect(state.pcmGainNode);
        state.pcmGainNode.connect(state.pcmHighPassNode);
        state.pcmHighPassNode.connect(state.pcmWarmthNode);
        state.pcmWarmthNode.connect(state.pcmPresenceNode);
        state.pcmPresenceNode.connect(state.pcmClarityNode);
        // clarity → mergerNode (input 0 = L, input 1 = R) → destination
        state.pcmClarityNode.connect(state.pcmMergerNode, 0, 0);
        state.pcmClarityNode.connect(state.pcmMergerNode, 0, 1);
        state.pcmMergerNode.connect(ctx.destination);

        // ── Wire RNNoise if enabled ───────────────────────────────────────────
        // RNNoise inserts BEFORE preGain so it receives intentionally boosted signal:
        // source → preGain → rn → gain → EQ → merger → dest
        // Wait — actually RNNoise should be AFTER preGain (gets loud signal for better
        // speech detection), and before gain (user volume not affecting RNNoise output).
        // source → rn → preGain → gain → EQ → merger → dest
        // The preGain feeds RNNoise: source → preGain → rn → gain → EQ → merger → dest
        // But that means preGain is always before rn, so for non-rn mode it's transparent.
        //
        // Simplest correct chain:
        //  No RNNoise: source → pcmPreGainNode → pcmGainNode → EQ → merger → dest
        //  With RNNoise: source → pcmPreGainNode → rn → pcmGainNode → EQ → merger → dest
        //
        // Default (no RNNoise): preGain already connects to gain above.
        // RNNoise path: disconnect preGain from gain, insert rn in between.
        if (state.rnnoiseEnabled) {
          if (state.pcmRnnoiseNode) {
            // Already initialized — insert rn between preGain and gain
            try {
              state.pcmPreGainNode.disconnect();
            } catch (_) {}
            try {
              state.pcmRnnoiseNode.disconnect();
            } catch (_) {}
            state.pcmPreGainNode.connect(state.pcmRnnoiseNode);
            state.pcmRnnoiseNode.connect(state.pcmGainNode);
          } else {
            // Init WASM async; until ready, audio flows preGain → gain (already wired)
            ensureRnnoiseNode(ctx, state, "pcm").then((rn) => {
              if (!rn || !state.pcmPreGainNode || !state.pcmGainNode) return;
              try {
                state.pcmPreGainNode.disconnect();
              } catch (_) {}
              try {
                rn.disconnect();
              } catch (_) {}
              state.pcmPreGainNode.connect(rn);
              rn.connect(state.pcmGainNode);
            });
          }
        }
      }

      function playAudioChunk(state, float32, sampleRate = 16000) {
        if (!state.audioCtx || float32.length === 0) return;
        if (state.audioCtx.state === "suspended") state.audioCtx.resume();
        if (!state.pcmGraphConnected) {
          try {
            _buildPcmStaticGraph(state);
            state.pcmGraphConnected = true;
          } catch (e) {
            state.pcmGraphConnected = false;
          }
        }
        try {
          const buffer = state.audioCtx.createBuffer(
            1,
            float32.length,
            sampleRate,
          );
          buffer.copyToChannel(float32, 0);
          const source = state.audioCtx.createBufferSource();
          source.buffer = buffer;
          // Always route into pcmPreGainNode — single entry point for both RNNoise and plain paths
          if (state.pcmGraphConnected && state.pcmPreGainNode) {
            source.connect(state.pcmPreGainNode);
          } else {
            source.connect(state.audioCtx.destination);
          }
          const now = state.audioCtx.currentTime;
          const targetLeadSec = 0.015;
          const maxLeadSec = 0.12;
          if (state.nextPlayTime < now - 0.06)
            state.nextPlayTime = now + targetLeadSec;
          if (state.nextPlayTime > now + maxLeadSec) return;
          source.start(state.nextPlayTime);
          state.nextPlayTime += buffer.duration;
        } catch (e) {
          if (state.audioCtx && state.audioCtx.state === "suspended")
            state.audioCtx.resume();
        }
      }

      function drawWaveform(canvas, float32) {
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        const W = canvas.width,
          H = canvas.height,
          mid = H / 2;
        ctx.clearRect(0, 0, W, H);
        ctx.fillStyle = "#0f1123";
        ctx.fillRect(0, 0, W, H);
        const grad = ctx.createLinearGradient(0, 0, W, 0);
        grad.addColorStop(0, "#7c3aed");
        grad.addColorStop(0.5, "#14b8a6");
        grad.addColorStop(1, "#7c3aed");
        ctx.beginPath();
        ctx.strokeStyle = grad;
        ctx.lineWidth = 1.8;
        const step = Math.ceil(float32.length / W);
        for (let x = 0; x < W; x++) {
          const y = mid + (float32[x * step] || 0) * mid * 0.88;
          x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();
        // fill beneath line for glow effect
        ctx.lineTo(W, mid);
        ctx.lineTo(0, mid);
        ctx.closePath();
        const fillGrad = ctx.createLinearGradient(0, 0, 0, H);
        fillGrad.addColorStop(0, "rgba(20,184,166,.18)");
        fillGrad.addColorStop(1, "rgba(20,184,166,0)");
        ctx.fillStyle = fillGrad;
        ctx.fill();
      }

      function drawFreqBars(canvas, audioCtx, float32, sampleRate) {
        if (!canvas) return;
        const N = 64;
        const ctxC = canvas.getContext("2d");
        const W = canvas.width,
          H = canvas.height;
        ctxC.clearRect(0, 0, W, H);
        ctxC.fillStyle = "#0f1123";
        ctxC.fillRect(0, 0, W, H);
        const len = float32.length;
        const binMags = new Float32Array(N);
        const freqMin = 80,
          freqMax = 8000;
        for (let b = 0; b < N; b++) {
          const freq = freqMin * Math.pow(freqMax / freqMin, b / (N - 1));
          const k = Math.max(
            1,
            Math.round((freq / (sampleRate || 16000)) * len),
          );
          const kEnd = Math.max(k + 1, Math.round(k * 1.2));
          let mag = 0;
          for (let ki = k; ki < Math.min(kEnd, len >> 1); ki++) {
            let re = 0,
              im = 0;
            const omega = (2 * Math.PI * ki) / len;
            const step = Math.max(1, Math.floor(len / 512));
            for (let n = 0; n < len; n += step) {
              re += float32[n] * Math.cos(omega * n);
              im -= float32[n] * Math.sin(omega * n);
            }
            const m = Math.sqrt(re * re + im * im) / (len / step);
            if (m > mag) mag = m;
          }
          binMags[b] = mag;
        }
        const barW = W / N;
        for (let b = 0; b < N; b++) {
          const mag = binMags[b];
          const barH = Math.max(1, Math.min(H - 2, mag * H * 12));
          // violet -> teal gradient across bars
          const t = b / (N - 1);
          const r = Math.round(124 + (20 - 124) * t);
          const g = Math.round(58 + (184 - 58) * t);
          const bc = Math.round(237 + (166 - 237) * t);
          ctxC.fillStyle = `rgba(${r},${g},${bc},0.9)`;
          ctxC.fillRect(b * barW + 1, H - barH, barW - 2, barH);
          // glow cap
          ctxC.fillStyle = `rgba(${r},${g},${bc},0.4)`;
          ctxC.fillRect(b * barW + 1, H - barH - 3, barW - 2, 3);
        }
      }

      function clearCanvas(canvas) {
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#0f1123";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      function refreshRecordingsList() {
        fetch("/api/recordings")
          .then((r) => r.json())
          .then((files) => {
            const el = document.getElementById("globalRecList");
            if (!files || !files.length) {
              el.innerHTML = `<div class="rec-empty">No recordings yet.</div>`;
              return;
            }
            files.sort((a, b) => b.name.localeCompare(a.name));
            el.innerHTML = files
              .map(
                (f) =>
                  `<div class="rec-item">
               <a href="/recordings/${f.name}" title="${f.name}">&#9654; ${f.name}</a>
               <span class="rec-size">${formatSize(f.size)}</span>
               <a href="/recordings/${f.name}" download="${f.name}" class="btn-ghost" style="padding:3px 10px;font-size:10px;font-weight:700;text-decoration:none;border-radius:6px;border:1px solid rgba(59,130,246,.25);color:var(--accent2);background:#0f2040;" title="Download ${f.name}">↓ DL</a>
             </div>`,
              )
              .join("");
          })
          .catch(() => {});
      }

      function formatSize(bytes) {
        if (bytes < 1024) return bytes + " B";
        if (bytes < 1048576) return (bytes / 1024).toFixed(1) + " KB";
        return (bytes / 1048576).toFixed(1) + " MB";
      }

      function setWsStatus(connected) {
        document.getElementById("wsDot").className =
          "conn-dot" + (connected ? " connected" : "");
        document.getElementById("wsStatus").textContent = connected
          ? "Connected"
          : "Disconnected";
        document.getElementById("connPill").className =
          "conn-pill" + (connected ? " ok" : "");
      }

      function log(message, level = "info") {
        const out = document.getElementById("logOutput");
        const entry = document.createElement("div");
        entry.className = "log-entry";
        entry.innerHTML = `<span class="log-ts">${new Date().toLocaleTimeString()}</span><span class="log-${level}">${message}</span>`;
        out.insertBefore(entry, out.firstChild);
        while (out.children.length > 200) out.removeChild(out.lastChild);
      }

      // Keep "x sec ago" fields fresh without waiting for new packets.
      setInterval(() => {
        Object.keys(deviceState).forEach((id) => renderDeviceHealth(id));
      }, 2000);

      initNetworkMode();
      loadWebRtcConfig().finally(connectControlWs);
      refreshRecordingsList();
      setInterval(refreshRecordingsList, 10000);
    </script>
  </body>
