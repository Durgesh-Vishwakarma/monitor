services:
  - type: web
    name: micmonitor-server
    runtime: node
    region: singapore # change to: oregon / frankfurt / ohio — whichever is closest
    plan: free
    rootDir: . # run from the server/ folder (point Render root here)
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: STUN_URL
        value: stun:stun.l.google.com:19302
      - key: TURN_URL
        value: ""
      - key: TURN_USERNAME
        value: ""
      - key: TURN_PASSWORD
        value: ""
      - key: WS_AUTH_TOKEN
        generateValue: true
